<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GURU</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;height:100vh;display:flex;flex-direction:column;padding:10px}
        #auth{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
        #auth h1{background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:48px}
        #auth input{padding:12px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;font-size:18px;text-align:center;width:80%;max-width:300px;margin:8px 0}
        #auth button{padding:12px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:18px;cursor:pointer;width:80%;max-width:300px;margin:4px 0}
        #app{display:none;flex-direction:column;height:100vh}
        #header{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2a3a}
        #header h1{background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px}
        #tabs{display:flex;gap:4px;padding:8px 0;border-bottom:1px solid #2a2a3a}
        #tabs button{flex:1;padding:8px;border:none;background:transparent;color:#888;font-size:14px;cursor:pointer;border-radius:8px}
        #tabs button.active{background:#1e2a4a;color:#fff}
        #content{flex:1;overflow-y:auto;padding:10px 0}
        .contact{padding:12px 16px;background:#1a1a2e;margin:4px 0;border-radius:12px;cursor:pointer}
        .chat-area{display:none;flex-direction:column;height:100%}
        .chat-area.active{display:flex}
        #messages{flex:1;overflow-y:auto;padding:10px 0}
        .msg{padding:8px 14px;border-radius:16px;max-width:70%;margin:4px 0;background:#1e2a4a;align-self:flex-start}
        .msg.my{background:#0084ff;align-self:flex-end}
        .msg .time{font-size:9px;color:#aaa;margin-left:8px}
        #bottom{display:flex;gap:8px;padding:10px 0}
        #bottom input{flex:1;padding:12px 16px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;font-size:16px;outline:none}
        #bottom button{padding:12px 20px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:16px;cursor:pointer}
        .back-btn{background:transparent;color:#ffd200;border:none;font-size:16px;cursor:pointer;padding:4px 8px}
        #info{text-align:center;font-size:11px;color:#444;padding:4px 0}
    </style>
</head>
<body>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div id="auth">
        <h1>GURU</h1>
        <div style="color:#888;font-size:13px;margin-bottom:20px;">твой приватный мир</div>
        <input id="codeInput" placeholder="Код" />
        <button id="loginBtn">Войти</button>
        <button id="newCodeBtn" style="background:#1e2a4a;">Создать аккаунт</button>
        <div style="color:#666;font-size:12px;margin-top:20px;text-align:center;">💡 Придумай код, который не забудешь!</div>
    </div>

    <!-- ===== ОСНОВНОЙ ЭКРАН ===== -->
    <div id="app">
        <div id="header">
            <h1>GURU</h1>
            <span id="myCodeDisplay" style="color:#888;font-size:12px;background:#1a1a2e;padding:4px 12px;border-radius:12px;">Код: ----</span>
        </div>

        <div id="tabs">
            <button class="active" data-tab="chats">💬 Чаты</button>
            <button data-tab="contacts">📇 Контакты</button>
        </div>

        <div id="content">
            <!-- Чаты -->
            <div id="tab-chats">
                <div id="chatList"></div>
                <div id="chatView" class="chat-area">
                    <button class="back-btn" id="backToChats">← Назад</button>
                    <div id="chatHeader" style="font-weight:bold;padding:8px 0;"></div>
                    <div id="messages"></div>
                    <div id="bottom">
                        <input id="msgInput" placeholder="Сообщение..." />
                        <button id="sendBtn">➤</button>
                    </div>
                </div>
            </div>

            <!-- Контакты -->
            <div id="tab-contacts" style="display:none;">
                <div style="padding:10px 0;">
                    <input id="contactSearch" placeholder="Поиск по коду..." style="width:100%;padding:10px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;outline:none;" />
                    <button id="addContactBtn" style="margin-top:8px;padding:10px 20px;border-radius:24px;border:none;background:#e94560;color:#fff;cursor:pointer;width:100%;">Добавить</button>
                </div>
                <div id="contactList"></div>
            </div>
        </div>

        <div id="info">👀 Жёлтые галочки — прочитано</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        // =========================================================
        // 1. FIREBASE
        // =========================================================
        const FIREBASE_URL = "https://guromessenger-ef076-default-rtdb.firebaseio.com/"; // ⚠️ ЗАМЕНИ НА СВОЮ ССЫЛКУ
        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();

        // =========================================================
        // 2. ПЕРЕМЕННЫЕ
        // =========================================================
        let myCode = null;
        let currentChat = null;

        // =========================================================
        // 3. АВТОРИЗАЦИЯ
        // =========================================================
        function loadMyCode() {
            const saved = localStorage.getItem('myCode');
            if (saved) { myCode = saved; return true; }
            return false;
        }
        function saveMyCode(code) {
            localStorage.setItem('myCode', code);
            myCode = code;
        }

        const auth = document.getElementById('auth');
        const app = document.getElementById('app');
        const codeInput = document.getElementById('codeInput');
        const loginBtn = document.getElementById('loginBtn');
        const newCodeBtn = document.getElementById('newCodeBtn');

        function showAuth() {
            auth.style.display = 'flex';
            app.style.display = 'none';
        }
        function showApp() {
            auth.style.display = 'none';
            app.style.display = 'flex';
            document.getElementById('myCodeDisplay').textContent = 'Код: ' + myCode;
            loadChats();
            loadContacts();
        }

        loginBtn.addEventListener('click', function() {
            const code = codeInput.value.trim();
            if (!code) return alert('Введи код!');
            db.ref('users/' + code).once('value').then(snap => {
                if (snap.exists()) {
                    myCode = code;
                    saveMyCode(code);
                    showApp();
                } else {
                    alert('❌ Аккаунт не найден!');
                }
            }).catch(() => alert('Ошибка соединения!'));
        });

        newCodeBtn.addEventListener('click', function() {
            const newCode = codeInput.value.trim();
            if (!newCode) return alert('Придумай код!');
            if (newCode.length < 3) return alert('Минимум 3 символа!');
            db.ref('users/' + newCode).once('value').then(snap => {
                if (snap.exists()) {
                    alert('❌ Код занят!');
                    return;
                }
                db.ref('users/' + newCode).set({
                    code: newCode,
                    username: 'user_' + newCode.substring(0, 4),
                    contacts: {},
                    createdAt: Date.now()
                }).then(() => {
                    myCode = newCode;
                    saveMyCode(newCode);
                    showApp();
                    alert('✅ Аккаунт создан!');
                });
            }).catch(() => alert('Ошибка соединения!'));
        });

        if (loadMyCode()) {
            db.ref('users/' + myCode).once('value').then(snap => {
                if (snap.exists()) {
                    showApp();
                } else {
                    showAuth();
                }
            }).catch(() => { showAuth(); });
        } else {
            showAuth();
        }

        // =========================================================
        // 4. ЧАТЫ
        // =========================================================
        const chatList = document.getElementById('chatList');
        const chatView = document.getElementById('chatView');
        const messages = document.getElementById('messages');
        const chatHeader = document.getElementById('chatHeader');
        const backToChats = document.getElementById('backToChats');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        function loadChats() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                chatList.innerHTML = '';
                for (let code in contacts) {
                    const div = document.createElement('div');
                    div.className = 'contact';
                    div.textContent = code;
                    div.addEventListener('click', function() {
                        openChat('user', code);
                    });
                    chatList.appendChild(div);
                }
                if (Object.keys(contacts).length === 0) {
                    chatList.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Нет контактов</div>';
                }
            });
        }

        function openChat(type, id) {
            currentChat = { type, id };
            chatView.classList.add('active');
            chatList.style.display = 'none';
            chatHeader.textContent = id;
            loadMessages(id);
        }

        backToChats.addEventListener('click', function() {
            chatView.classList.remove('active');
            chatList.style.display = 'block';
            currentChat = null;
        });

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });

        function sendMessage() {
            if (!currentChat) return;
            const text = msgInput.value.trim();
            if (!text) return;
            const chatId = getChatId(myCode, currentChat.id);
            db.ref('chats/' + chatId).push({
                from: myCode,
                to: currentChat.id,
                text: text,
                time: Date.now()
            });
            msgInput.value = '';
        }

        function getChatId(code1, code2) {
            return [code1, code2].sort().join('_');
        }

        function loadMessages(id) {
            const chatId = getChatId(myCode, id);
            messages.innerHTML = '';
            db.ref('chats/' + chatId).orderByChild('time').on('child_added', function(snap) {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = 'msg';
                if (data.from === myCode) div.classList.add('my');
                div.innerHTML = `${data.text} <span class="time">${new Date(data.time).getHours()}:${String(new Date(data.time).getMinutes()).padStart(2,'0')}</span>`;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            });
        }

        // =========================================================
        // 5. КОНТАКТЫ
        // =========================================================
        const contactSearch = document.getElementById('contactSearch');
        const addContactBtn = document.getElementById('addContactBtn');
        const contactList = document.getElementById('contactList');

        function loadContacts() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                contactList.innerHTML = '';
                for (let code in contacts) {
                    const div = document.createElement('div');
                    div.className = 'contact';
                    div.textContent = code;
                    contactList.appendChild(div);
                }
                if (Object.keys(contacts).length === 0) {
                    contactList.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Нет контактов</div>';
                }
            });
        }

        addContactBtn.addEventListener('click', function() {
            const query = contactSearch.value.trim();
            if (!query) return alert('Введи код!');
            if (query === myCode) return alert('Это ты!');
            db.ref('users/' + query).once('value').then(snap => {
                if (snap.exists()) {
                    db.ref('users/' + myCode + '/contacts/' + query).set(true);
                    contactSearch.value = '';
                    loadContacts();
                    alert('✅ Контакт добавлен!');
                } else {
                    alert('❌ Пользователь не найден!');
                }
            });
        });

        // =========================================================
        // 6. ТАБЫ
        // =========================================================
        document.querySelectorAll('#tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('#content > div').forEach(d => d.style.display = 'none');
                document.getElementById('tab-' + tab).style.display = 'block';
                if (tab === 'chats') loadChats();
                if (tab === 'contacts') loadContacts();
            });
        });

        // =========================================================
        // 7. ИНИЦИАЛИЗАЦИЯ
        // =========================================================
        console.log('🔥 GURU запущен! Код: ' + myCode);
    </script>
</body>
</html>
