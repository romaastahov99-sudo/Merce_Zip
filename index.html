</head>

    <script>
        // =============================================
        //  КОНФИГУРАЦИЯ FIREBASE
        // =============================================
        const firebaseConfig = { 
            databaseURL: "https://guromessenger-ef076-default-rtdb.firebaseio.com/",
            storageBucket: "guromessenger-ef076.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();

        // --- Элементы ---
        const burgerBtn = document.getElementById('burgerBtn');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const authContainer = document.getElementById('authContainer');
        const chatList = document.getElementById('chatList');
        const bottomNav = document.getElementById('bottomNav');
        const searchArea = document.getElementById('searchArea');
        const pageContainer = document.getElementById('pageContainer');
        const pageTitle = document.getElementById('pageTitle');
        const pageContent = document.getElementById('pageContent');
        const pageBack = document.getElementById('pageBack');
        const chatItems = document.getElementById('chatItems');
        const emptyChats = document.getElementById('emptyChats');
        const chatWindow = document.getElementById('chatWindow');
        const chatWindowTitle = document.getElementById('chatWindowTitle');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatWindowBack = document.getElementById('chatWindowBack');
        const createGroupBtn = document.getElementById('createGroupBtn');
        const chatInfoBtn = document.getElementById('chatInfoBtn');
        const chatDeleteBtn = document.getElementById('chatDeleteBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceTimer = document.getElementById('voiceTimer');
        const voiceControls = document.getElementById('voiceControls');
        const voiceCancelBtn = document.getElementById('voiceCancelBtn');
        const voiceSendBtn = document.getElementById('voiceSendBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('modalBox');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');

        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const authBtn = document.getElementById('authBtn');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        const authSwitchLink = document.getElementById('authSwitchLink');

        const menuUsername = document.getElementById('menuUsername');
        const menuStatus = document.getElementById('menuStatus');
        const menuAvatar = document.getElementById('menuAvatar');
        const contactsBadge = document.getElementById('contactsBadge');

        let isLoginMode = true;
        let currentUser = null;
        let currentPage = null;
        let currentChatId = null;
        let isDarkTheme = true;
        let messageListener = null;
        let currentChatData = null;
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingInterval = null;
        let recordingSeconds = 0;
        let recordedBlob = null;

        // --- Firebase функции ---
        function checkUserExists(username) {
            return new Promise((resolve) => {
                database.ref('users/' + username).once('value', (snapshot) => { resolve(snapshot.exists()); });
            });
        }

        function registerUser(username, password) {
            return new Promise((resolve, reject) => {
                database.ref('users/' + username).set({ password: password, created: Date.now(), chats: {} })
                    .then(resolve).catch(reject);
            });
        }

        function checkPassword(username, password) {
            return new Promise((resolve, reject) => {
                database.ref('users/' + username + '/password').once('value', (snapshot) => {
                    resolve(snapshot.exists() && snapshot.val() === password);
                }).catch(reject);
            });
        }

        function saveSession(username) {
            database.ref('sessions/' + username).set({ lastLogin: Date.now(), active: true });
        }

        function checkSession() {
            return new Promise((resolve) => {
                const sessionKey = localStorage.getItem('guru_session');
                if (!sessionKey) { resolve(null); return; }
                database.ref('sessions/' + sessionKey).once('value', (snapshot) => {
                    resolve(snapshot.exists() && snapshot.val().active ? sessionKey : null);
                });
            });
        }

        function clearSession(username) {
            if (username) database.ref('sessions/' + username).remove();
            localStorage.removeItem('guru_session');
        }

        function loadContacts(username) {
            return new Promise((resolve) => {
                database.ref('users/' + username + '/contacts').once('value', (snapshot) => {
                    resolve(snapshot.exists() ? snapshot.val() : {});
                });
            });
        }

        function addContact(username, contactName) {
            return new Promise((resolve, reject) => {
                database.ref('users/' + username + '/contacts/' + contactName).set({ added: Date.now() })
                    .then(resolve).catch(reject);
            });
        }

        function loadUserChats(username) {
            return new Promise((resolve) => {
                database.ref('users/' + username + '/chats').once('value', (snapshot) => {
                    if (!snapshot.exists()) { resolve({}); return; }
                    const chatIds = Object.keys(snapshot.val());
                    if (chatIds.length === 0) { resolve({}); return; }
                    const chatsData = {};
                    let loaded = 0;
                    chatIds.forEach(chatId => {
                        database.ref('chats/' + chatId).once('value', (snap) => {
                            if (snap.exists()) { chatsData[chatId] = snap.val(); }
                            loaded++;
                            if (loaded === chatIds.length) { resolve(chatsData); }
                        });
                    });
                });
            });
        }

        function createPrivateChat(user1, user2) {
            return new Promise((resolve, reject) => {
                const chatId = 'private_' + [user1, user2].sort().join('_');
                database.ref('chats/' + chatId).once('value', (snapshot) => {
                    if (snapshot.exists()) { resolve(chatId); return; }
                    database.ref('chats/' + chatId).set({
                        participants: [user1, user2],
                        created: Date.now(),
                        isGroup: false,
                        messages: {
                            first: { text: 'Чат создан!', from: 'system', time: Date.now() }
                        }
                    }).then(() => {
                        const updates = {};
                        updates['users/' + user1 + '/chats/' + chatId] = true;
                        updates['users/' + user2 + '/chats/' + chatId] = true;
                        return database.ref().update(updates);
                    }).then(() => { resolve(chatId); }).catch(reject);
                });
            });
        }

        function createGroup(creator, memberNames, groupName) {
            return new Promise((resolve, reject) => {
                const chatId = 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                const allMembers = [creator, ...memberNames.filter(m => m !== creator)];
                const uniqueMembers = [...new Set(allMembers)];
                
                database.ref('chats/' + chatId).set({
                    participants: uniqueMembers,
                    created: Date.now(),
                    isGroup: true,
                    creator: creator,
                    groupName: groupName || 'Группа',
                    messages: {
                        first: { text: '🎉 Группа "' + (groupName || 'Группа') + '" создана!', from: 'system', time: Date.now() }
                    }
                }).then(() => {
                    const updates = {};
                    uniqueMembers.forEach(user => {
                        updates['users/' + user + '/chats/' + chatId] = true;
                    });
                    return database.ref().update(updates);
                }).then(() => { resolve(chatId); }).catch(reject);
            });
        }

        function deleteChat(chatId, username) {
            return new Promise((resolve, reject) => {
                database.ref('chats/' + chatId).once('value', (snapshot) => {
                    if (!snapshot.exists()) { reject('Чат не найден'); return; }
                    const chat = snapshot.val();
                    if (!chat.participants.includes(username)) {
                        reject('Вы не участник этого чата');
                        return;
                    }
                    const updates = {};
                    chat.participants.forEach(user => {
                        updates['users/' + user + '/chats/' + chatId] = null;
                    });
                    updates['chats/' + chatId] = null;
                    database.ref().update(updates).then(resolve).catch(reject);
                });
            });
        }

        // =============================================
        //  АВАТАРКИ (ДОБАВЛЕНО)
        // =============================================
        function uploadAvatar(user, file) {
            return new Promise((resolve, reject) => {
                const ref = storage.ref('avatars/' + user + '/' + Date.now() + '.jpg');
                ref.put(file).then((snapshot) => {
                    return snapshot.ref.getDownloadURL();
                }).then((url) => {
                    return database.ref('users/' + user + '/avatar').set(url);
                }).then(() => {
                    return database.ref('users/' + user + '/avatar').once('value');
                }).then((snapshot) => {
                    resolve(snapshot.val());
                }).catch(reject);
            });
        }

        function getUserAvatar(user) {
            return new Promise((resolve) => {
                database.ref('users/' + user + '/avatar').once('value', (snapshot) => {
                    resolve(snapshot.exists() ? snapshot.val() : null);
                });
            });
        }

        // --- Меню ---
        function toggleMenu() { if (!currentUser) return; sideMenu.classList.toggle('open'); menuOverlay.classList.toggle('active'); }
        function closeMenu() { sideMenu.classList.remove('open'); menuOverlay.classList.remove('active'); }
        burgerBtn.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', closeMenu);

        // --- Уведомления ---
        function showError(msg) {
            authError.textContent = msg;
            authError.style.display = 'block';
            authSuccess.style.display = 'none';
            setTimeout(() => { authError.style.display = 'none'; }, 4000);
        }

        function showSuccess(msg) {
            authSuccess.textContent = msg;
            authSuccess.style.display = 'block';
            authError.style.display = 'none';
            setTimeout(() => { authSuccess.style.display = 'none'; }, 3000);
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
                background: #2b6b9c; color: white; padding: 12px 20px;
                border-radius: 12px; font-size: 14px; z-index: 200;
                box-shadow: 0 4px 20px rgba(0,0,0,0.4);
                animation: slideDown 0.3s ease;
                max-width: 90%;
                text-align: center;
            `;
            notif.textContent = msg;
            document.getElementById('app').appendChild(notif);
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transition = '0.3s';
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        // --- Модальное окно ---
        function showModal(title, content) {
            modalTitle.textContent = title;
            modalContent.innerHTML = content;
            modalOverlay.classList.add('active');
        }

        function closeModal() { modalOverlay.classList.remove('active'); }
        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // --- Переключение темы ---
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle('light-theme', !isDarkTheme);
            document.querySelector('.telegram-clone').classList.toggle('light', !isDarkTheme);
            localStorage.setItem('guru_theme', isDarkTheme ? 'dark' : 'light');
        }

        // --- Переключение режима ---
        function toggleMode() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authBtn.textContent = 'Войти';
                authSwitchLink.textContent = 'Создать';
                document.querySelector('.subtitle').textContent = 'Войдите в свой аккаунт';
                document.querySelector('.auth-form .input-group:last-child label').textContent = '🔐 Код-пароль';
                document.querySelector('.auth-form .input-group:last-child input').placeholder = 'Введите код';
            } else {
                authBtn.textContent = 'Зарегистрироваться';
                authSwitchLink.textContent = 'Войти';
                document.querySelector('.subtitle').textContent = 'Создайте новый аккаунт';
                document.querySelector('.auth-form .input-group:last-child label').textContent = '🔐 Придумайте код';
                document.querySelector('.auth-form .input-group:last-child input').placeholder = 'Придумайте код';
            }
            usernameInput.value = '';
            passwordInput.value = '';
            authError.style.display = 'none';
            authSuccess.style.display = 'none';
        }
        authSwitchLink.addEventListener('click', toggleMode);

        // --- Выход ---
        function logout() {
            if (currentUser) clearSession(currentUser.username);
            currentUser = null;
            showApp(false);
            usernameInput.value = '';
            passwordInput.value = '';
            authError.style.display = 'none';
            authSuccess.style.display = 'none';
            if (!isLoginMode) toggleMode();
            closeMenu();
            pageContainer.classList.remove('active');
            chatWindow.classList.remove('active');
            if (messageListener) { database.ref('chats/' + currentChatId + '/messages').off(); messageListener = null; }
            currentChatId = null;
            chatList.style.display = 'block';
            bottomNav.style.display = 'flex';
            searchArea.style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector('[data-tab="chats"]').classList.add('active');
            chatItems.innerHTML = '';
            emptyChats.style.display = 'flex';
            burgerBtn.classList.add('disabled');
        }

        // --- Показать страницу ---
        function showPage(page) {
            if (!currentUser) return;
            currentPage = page;
            chatList.style.display = 'none';
            bottomNav.style.display = 'none';
            searchArea.style.display = 'none';
            chatWindow.classList.remove('active');
            pageContainer.classList.add('active');
            closeMenu();

            const pages = {
                profile: {
                    title: 'Мой профиль',
                    content: `
                        <div id="avatarPreview" class="avatar-preview">${currentUser.username.charAt(0).toUpperCase()}</div>
                        <div style="text-align:center;margin-bottom:16px;">
                            <button class="avatar-upload-btn" id="uploadAvatarBtn"><i class="fas fa-camera"></i> Сменить аватар</button>
                            <input type="file" id="avatarInput" accept="image/*" style="display:none;">
                            <div id="avatarStatus" class="avatar-status"></div>
                        </div>
                        <div class="page-item"><i class="fas fa-user-circle"></i> ${currentUser.username}</div>
                        <div class="page-item"><i class="fas fa-calendar"></i> Аккаунт создан</div>
                        <div class="page-item" style="color:#ff6b6b;cursor:pointer;" id="logoutPageBtn"><i class="fas fa-sign-out-alt"></i> Выйти</div>
                    `
                },
                contacts: {
                    title: 'Контакты',
                    content: `
                        <div class="page-item" style="cursor:pointer;" id="addContactBtn"><i class="fas fa-user-plus"></i> Добавить контакт</div>
                        <div id="contactsList"></div>
                    `
                },
                calls: { title: 'Звонки', content: `<div class="page-item"><i class="fas fa-phone"></i> История звонков</div>` },
                channels: { title: 'Каналы', content: `<div class="page-item"><i class="fas fa-broadcast"></i> GURU Channel</div>` },
                saved: { title: 'Сохранённое', content: `<div class="page-item"><i class="fas fa-bookmark"></i> Сохранённые сообщения</div>` },
                settings: {
                    title: 'Настройки',
                    content: `
                        <div class="page-item" id="themeToggle">
                            <i class="fas fa-moon"></i> Тёмная тема
                            <div class="toggle-switch ${isDarkTheme ? 'active' : ''}" id="themeSwitch"><div class="toggle-knob"></div></div>
                        </div>
                        <div class="page-item" id="privacyItem"><i class="fas fa-lock"></i> Конфиденциальность</div>
                    `
                },
                faq: { title: 'Вопросы', content: `
                    <div class="page-item"><i class="fas fa-question-circle"></i> Как создать аккаунт?</div>
                    <div class="page-item"><i class="fas fa-question-circle"></i> Как добавить контакт?</div>
                    <div class="page-item"><i class="fas fa-headset"></i> Поддержка</div>
                `}
            };

            if (pages[page]) {
                pageTitle.textContent = pages[page].title;
                pageContent.innerHTML = pages[page].content;

                if (page === 'profile') {
                    getUserAvatar(currentUser.username).then(url => {
                        const preview = document.getElementById('avatarPreview');
                        if (url) {
                            preview.innerHTML = `<img src="${url}" alt="avatar">`;
                        }
                    });
                    document.getElementById('logoutPageBtn')?.addEventListener('click', logout);
                    const uploadBtn = document.getElementById('uploadAvatarBtn');
                    const input = document.getElementById('avatarInput');
                    const status = document.getElementById('avatarStatus');
                    if (uploadBtn && input) {
                        uploadBtn.addEventListener('click', () => input.click());
                        input.addEventListener('change', function(e) {
                            const file = e.target.files[0];
                            if (file) {
                                if (file.size > 5 * 1024 * 1024) {
                                    status.className = 'avatar-status error';
                                    status.textContent = '❌ Файл больше 5МБ';
                                    return;
                                }
                                status.className = 'avatar-status loading';
                                status.textContent = '⏳ Загрузка...';
                                uploadAvatar(currentUser.username, file).then((url) => {
                                    const preview = document.getElementById('avatarPreview');
                                    preview.innerHTML = `<img src="${url}" alt="avatar">`;
                                    status.className = 'avatar-status success';
                                    status.textContent = '✅ Аватар обновлён!';
                                    updateAllAvatars();
                                    setTimeout(() => { 
                                        status.className = 'avatar-status';
                                        status.textContent = ''; 
                                    }, 3000);

        // --- Загрузка контактов ---
        function loadContactsList() {
            if (!currentUser) return;
            loadContacts(currentUser.username).then((contacts) => {
                const list = document.getElementById('contactsList');
                if (!list) return;
                const count = Object.keys(contacts).length;

                        div.style.cursor = 'pointer';

                                loadChatsList();

        // --- Загрузка чатов (ДОБАВЛЕНЫ АВАТАРКИ) ---
        function loadChatsList() {
            if (!currentUser) return;
            loadUserChats(currentUser.username).then((chats) => {
                chatItems.innerHTML = '';
                if (Object.keys(chats).length === 0) {
                    emptyChats.style.display = 'flex';
                    return;
                }
                emptyChats.style.display = 'none';
                
                let hasToday = false, hasYesterday = false, hasEarlier = false;
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                for (const [chatId, chat] of Object.entries(chats)) {
                    const isGroup = chat.isGroup || false;
                    const participants = chat.participants || [];
                    const otherUser = participants.find(p => p !== currentUser.username);
                    const chatDate = new Date(chat.created);
                    
                    let divider = '';
                    if (chatDate.toDateString() === today.toDateString()) {
                        if (!hasToday) { divider = '<div class="chat-divider">СЕГОДНЯ</div>'; hasToday = true; }
                    } else if (chatDate.toDateString() === yesterday.toDateString()) {
                        if (!hasYesterday) { divider = '<div class="chat-divider">ВЧЕРА</div>'; hasYesterday = true; }
                    } else {
                        if (!hasEarlier) { divider = '<div class="chat-divider">РАНЕЕ</div>'; hasEarlier = true; }
                    }

                    let displayName;
                    if (isGroup) {
                        displayName = '👥 ' + (chat.groupName || participants.join(', '));
                    } else {
                        displayName = otherUser || 'Чат';
                    }
                    
                    const firstLetter = isGroup ? '👥' : (otherUser ? otherUser.charAt(0).toUpperCase() : '?');
                    const colors = ['avatar-1', 'avatar-2', 'avatar-3', 'avatar-4', 'avatar-5', 'avatar-6', 'avatar-7', 'avatar-8'];
                    const colorClass = colors[Math.floor(Math.random() * colors.length)];

                    const messages = chat.messages || {};
                    const lastMessage = Object.values(messages).pop() || { text: 'Нет сообщений', from: otherUser };
                    let previewText = lastMessage.text;
                    if (lastMessage.type === 'voice') {
                        const mins = Math.floor(lastMessage.duration / 60);
                        const secs = Math.floor(lastMessage.duration % 60);
                        previewText = '🎤 Голосовое (' + mins + ':' + String(secs).padStart(2, '0') + ')';
                    }
                    if (lastMessage.from === 'system') previewText = '📢 ' + previewText;
                    if (lastMessage.from === currentUser.username) previewText = 'Вы: ' + previewText;

                    const chatDiv = document.createElement('div');
                    chatDiv.innerHTML = `
                        ${divider}
                        <div class="chat-item" data-chat="${chatId}">
                            <div class="chat-avatar ${colorClass}" id="avatar_${chatId}">${firstLetter}</div>
                            <div class="chat-info">
                                <div class="chat-name">
                                    <span class="name">${displayName}</span>
                                    <span class="time">${new Date(chat.created).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div class="chat-preview">
                                    <span class="message">${previewText}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    chatItems.appendChild(chatDiv);

                    // ЗАГРУЗКА АВАТАРА ДЛЯ СОБЕСЕДНИКА (ДОБАВЛЕНО)
                    if (!isGroup && otherUser) {
                        getUserAvatar(otherUser).then(url => {
                            const el = document.getElementById('avatar_' + chatId);
                            if (el && url) {
                                el.innerHTML = `<img src="${url}" alt="avatar">`;
                                el.style.background = 'none';
                            }
                        });
                    }
                }

                document.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const chatId = this.dataset.chat;
                        if (chatId) openChat(chatId);
                    });
                });
            });
        }

        // --- Открыть чат ---
        function openChat(chatId) {
            if (messageListener) {
                database.ref('chats/' + currentChatId + '/messages').off();
                messageListener = null;
            }
            
            currentChatId = chatId;
            chatWindow.classList.add('active');
            chatList.style.display = 'none';
            bottomNav.style.display = 'none';
            searchArea.style.display = 'none';
            pageContainer.classList.remove('active');

            database.ref('chats/' + chatId).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    currentChatData = snapshot.val();
                    const isGroup = currentChatData.isGroup || false;
                    const participants = currentChatData.participants || [];
                    let displayName;
                    if (isGroup) {
                        displayName = '👥 ' + (currentChatData.groupName || participants.join(', '));
                    } else {
                        const otherUser = participants.find(p => p !== currentUser.username);
                        displayName = otherUser || 'Чат';
                    }
                    chatWindowTitle.textContent = displayName;
                }
            });

            chatMessages.innerHTML = '';
            loadMessages(chatId, (messages) => {
                chatMessages.innerHTML = '';
                if (Object.keys(messages).length === 0) {
                    const empty = document.createElement('div');
                    empty.style.cssText = 'color:#6a6a6a;text-align:center;padding:20px;';
                    empty.textContent = 'Нет сообщений. Напишите первое!';
                    chatMessages.appendChild(empty);
                    return;
                }
                const sorted = Object.values(messages).sort((a, b) => a.time - b.time);
                sorted.forEach((msg) => {
                    const bubble = document.createElement('div');
                    if (msg.from === 'system') {
                        bubble.className = 'message-bubble system';
                        bubble.textContent = msg.text;
                    } else if (msg.type === 'voice') {
                        bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                        if (msg.from !== currentUser.username) {
                            const sender = document.createElement('div');
                            sender.className = 'message-sender';
                            sender.textContent = msg.from;
                            bubble.appendChild(sender);
                        }
                        const voiceDiv = document.createElement('div');
                        voiceDiv.className = 'message-voice';
                        
                        const playBtn = document.createElement('button');
                        playBtn.className = 'play-btn';
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        let audio = null;
                        playBtn.addEventListener('click', function() {
                            if (audio && !audio.paused) {
                                audio.pause();
                                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                                return;
                            }
                            if (audio) {
                                audio.play();
                                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                                return;
                            }
                            audio = playVoice(msg.url, voiceDiv);
                            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        });
                        
                        const progress = document.createElement('div');
                        progress.className = 'voice-progress';
                        progress.innerHTML = '<div class="fill"></div>';
                        
                        const duration = document.createElement('span');
                        duration.className = 'voice-duration';
                        const mins = Math.floor(msg.duration / 60);
                        const secs = Math.floor(msg.duration % 60);
                        duration.textContent = mins + ':' + String(secs).padStart(2, '0');
                        
                        voiceDiv.appendChild(playBtn);
                        voiceDiv.appendChild(progress);
                        voiceDiv.appendChild(duration);
                        bubble.appendChild(voiceDiv);
                        
                        const time = document.createElement('div');
                        time.className = 'message-time';
                        time.textContent = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        bubble.appendChild(time);
                    } else {
                        bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                        if (msg.from !== currentUser.username) {
                            const sender = document.createElement('div');
                            sender.className = 'message-sender';
                            sender.textContent = msg.from;
                            bubble.appendChild(sender);
                        }
                        const text = document.createElement('div');
                        text.textContent = msg.text;
                        bubble.appendChild(text);
                        const time = document.createElement('div');
                        time.className = 'message-time';
                        time.textContent = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        bubble.appendChild(time);
                    }
                    chatMessages.appendChild(bubble);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        function loadMessages(chatId, callback) {
            if (messageListener) {
                database.ref('chats/' + currentChatId + '/messages').off();
                messageListener = null;
            }
            const ref = database.ref('chats/' + chatId + '/messages');
            ref.on('value', (snapshot) => {
                callback(snapshot.exists() ? snapshot.val() : {});
            });
            messageListener = ref;
        }

        function playVoice(url, element) {
            const audio = new Audio(url);
            audio.play();
            const progress = element.querySelector('.fill');
            const durationEl = element.querySelector('.voice-duration');
            
            audio.addEventListener('timeupdate', () => {
                if (progress && audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progress.style.width = Math.min(percent, 100) + '%';
                }
                if (durationEl && audio.duration) {
                    const left = Math.floor(audio.duration - audio.currentTime);
                    const mins = Math.floor(left / 60);
                    const secs = Math.floor(left % 60);
                    durationEl.textContent = mins + ':' + String(secs).padStart(2, '0');
                }
            });
            
            audio.addEventListener('ended', () => {
                if (progress) progress.style.width = '0%';
                if (durationEl) {
                    const total = Math.floor(audio.duration || 0);
                    const mins = Math.floor(total / 60);
                    const secs = Math.floor(total % 60);
                    durationEl.textContent = mins + ':' + String(secs).padStart(2, '0');
                }
                const playBtn = element.querySelector('.play-btn');
                if (playBtn) playBtn.innerHTML = '<i class="fas fa-play"></i>';
            });
            
            return audio;
        }

        // --- Отправить сообщение ---
        function sendMessageHandler() {
            const text = chatInput.value.trim();
            if (!text || !currentChatId || !currentUser) return;
            const msgId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            database.ref('chats/' + currentChatId + '/messages/' + msgId).set({
                text: text,
                from: currentUser.username,
                time: Date.now()
            }).then(() => {
                chatInput.value = '';
            });
        }

        chatSendBtn.addEventListener('click', sendMessageHandler);
        chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessageHandler(); });

        chatWindowBack.addEventListener('click', function() {
            chatWindow.classList.remove('active');
            chatList.style.display = 'block';
            bottomNav.style.display = 'flex';
            searchArea.style.display = 'block';
            if (messageListener) {
                database.ref('chats/' + currentChatId + '/messages').off();
                messageListener = null;
            }
            currentChatId = null;
            loadChatsList();
        });

        // =============================================
        //  ГОЛОСОВЫЕ СООБЩЕНИЯ
        // =============================================
        voiceBtn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            if (!currentChatId || !currentUser) return;
            
            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                isRecording = true;
                recordingSeconds = 0;
                audioChunks = [];
                recordedBlob = null;
                voiceControls.classList.add('active');
                voiceTimer.textContent = '00:00';
                voiceBtn.style.display = 'none';
                chatInput.style.display = 'none';
                
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    stream.getTracks().forEach(track => track.stop());
                    if (recordedBlob.size < 5000 || recordingSeconds < 1) {
                        showNotification('Слишком короткое сообщение');
                        resetVoiceUI();
                    }
                };
                mediaRecorder.start();
                
                recordingInterval = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60);
                    const secs = Math.floor(recordingSeconds % 60);
                    voiceTimer.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
                }, 1000);
            }).catch(() => {
                showError('Нет доступа к микрофону');
            });
        });

        voiceBtn.addEventListener('mouseup', function(e) {
            e.preventDefault();
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingInterval);
            }
        });

        voiceBtn.addEventListener('mouseleave', function(e) {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingInterval);
                resetVoiceUI();
            }
        });

        function resetVoiceUI() {
            voiceControls.classList.remove('active');
            voiceBtn.style.display = 'flex';
            chatInput.style.display = 'flex';
            recordedBlob = null;
            audioChunks = [];
            recordingSeconds = 0;
            if (mediaRecorder) {
                mediaRecorder = null;
            }
        }

        voiceCancelBtn.addEventListener('click', function() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingInterval);
            }
            resetVoiceUI();
            showNotification('❌ Запись отменена');
        });

        voiceSendBtn.addEventListener('click', function() {
            if (recordedBlob && recordedBlob.size > 5000 && recordingSeconds >= 1) {
                sendVoiceMessage(currentChatId, currentUser.username, recordedBlob, recordingSeconds).then(() => {
                    showNotification('🎤 Голосовое отправлено! (' + recordingSeconds + 'с)');
                    resetVoiceUI();
                }).catch((err) => {
                    showError('Ошибка отправки: ' + err.message);
                    resetVoiceUI();
                });
            } else {
                showNotification('Слишком короткое сообщение');
                resetVoiceUI();
            }
        });

        function sendVoiceMessage(chatId, from, audioBlob, duration) {
            return new Promise((resolve, reject) => {
                const msgId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                const ref = storage.ref('voices/' + chatId + '/' + msgId + '.webm');
                ref.put(audioBlob).then((snapshot) => {
                    return snapshot.ref.getDownloadURL();
                }).then((url) => {
                    return database.ref('chats/' + chatId + '/messages/' + msgId).set({
                        type: 'voice',
                        url: url,
                        duration: duration,
                        from: from,
                        time: Date.now()
                    });
                }).then(() => { resolve(); }).catch(reject);
            });
        }

        // --- Информация о чате ---
        chatInfoBtn.addEventListener('click', function() {
            if (!currentChatId || !currentChatData) {
                showNotification('Нет информации о чате');
                return;
            }
            const isGroup = currentChatData.isGroup || false;
            const participants = currentChatData.participants || [];
            const creator = currentChatData.creator || '';
            const groupName = currentChatData.groupName || 'Группа';

            if (isGroup) {
                let html = `<div style="margin-bottom:12px;color:#6a6a6a;">👥 Название: <strong style="color:#f0f0f0;">${groupName}</strong></div>`;
                html += `<div style="margin-bottom:12px;color:#6a6a6a;">👤 Создатель: <strong style="color:#f0f0f0;">${creator}</strong></div>`;
                html += `<div style="margin-bottom:8px;color:#6a6a6a;">Участники (${participants.length}):</div>`;
                participants.forEach(user => {
                    const isOwner = user === creator;
                    html += `
                        <div class="participant-item">
                            <div class="participant-avatar" id="pavatar_${user}">${user.charAt(0).toUpperCase()}</div>
                            <span class="participant-name">${user}</span>
                            ${isOwner ? '<span class="participant-owner">👑 Создатель</span>' : ''}
                        </div>
                    `;
                });
                showModal('👥 Участники группы', html);
                participants.forEach(user => {
                    getUserAvatar(user).then(url => {
                        const el = document.getElementById('pavatar_' + user);
                        if (el && url) {
                            el.innerHTML = `<img src="${url}" alt="avatar">`;
                            el.style.background = 'none';
                        }
                    });
                });
            } else {
                const otherUser = participants.find(p => p !== currentUser.username);
                getUserAvatar(otherUser).then(url => {
                    let avatarHtml = otherUser.charAt(0).toUpperCase();
                    if (url) avatarHtml = `<img src="${url}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">`;
                    showModal('ℹ️ Информация', `
                        <div style="text-align:center;margin-bottom:12px;">
                            <div style="width:60px;height:60px;border-radius:50%;background:#2b6b9c;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;margin:0 auto;overflow:hidden;">${avatarHtml}</div>
                        </div>
                        <div style="color:#6a6a6a;">👤 Чат с: <strong style="color:#f0f0f0;">${otherUser}</strong></div>
                        <div style="color:#6a6a6a;margin-top:8px;">📱 Личный чат</div>
                    `);
                });
            }
        });

        // --- Удаление чата ---
        chatDeleteBtn.addEventListener('click', function() {
            if (!currentChatId) return;
            if (confirm('Удалить этот чат для всех участников?')) {
                deleteChat(currentChatId, currentUser.username).then(() => {
                    showNotification('🗑️ Чат удалён');
                    chatWindow.classList.remove('active');
                    chatList.style.display = 'block';
                    bottomNav.style.display = 'flex';
                    searchArea.style.display = 'block';
                    if (messageListener) {
                        database.ref('chats/' + currentChatId + '/messages').off();
                        messageListener = null;
                    }
                    currentChatId = null;
                    loadChatsList();
                }).catch((err) => {
                    showError('Ошибка: ' + err);
                });
            }
        });

        // --- Создание группы ---
        createGroupBtn.addEventListener('click', function() {
            if (!currentUser) return;
            
            const groupName = prompt('Введите название группы:');
            if (groupName === null) return;
            if (!groupName.trim()) {
                showError('Название не может быть пустым');
                return;
            }
            
            const membersInput = prompt('Введите ники участников через запятую (включая вас):');
            if (!membersInput || !membersInput.trim()) return;
            
            const members = membersInput.split(',').map(s => s.trim()).filter(s => s);
            if (members.length < 2) {
                showError('Минимум 2 участника (включая вас)');
                return;
            }
            
            const allMembers = [currentUser.username, ...members.filter(m => m !== currentUser.username)];
            const uniqueMembers = [...new Set(allMembers)];
            
            const checkPromises = uniqueMembers.map(name => checkUserExists(name));
            Promise.all(checkPromises).then((results) => {
                const missing = uniqueMembers.filter((_, i) => !results[i]);
                if (missing.length > 0) {
                    showError('Пользователи не найдены: ' + missing.join(', '));
                    return;
                }
                
                createGroup(currentUser.username, members, groupName.trim()).then((chatId) => {
                    showSuccess('🎉 Группа "' + groupName.trim() + '" создана!');
                    loadChatsList();
                    openChat(chatId);
                }).catch((error) => {
                    showError('Ошибка: ' + error.message);
                });
            });
        });

        // --- Авторизация ---
        async function handleAuth() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) { showError('Заполните все поля'); return; }
            if (username.length < 2) { showError('Ник минимум 2 символа'); return; }
            if (password.length < 4) { showError('Код минимум 4 символа'); return; }

            authBtn.disabled = true;
            authBtn.textContent = 'Загрузка...';

            try {
                const exists = await checkUserExists(username);

                if (isLoginMode) {
                    if (!exists) { showError('Пользователь не найден'); authBtn.disabled = false; authBtn.textContent = 'Войти'; return; }
                    const correct = await checkPassword(username, password);
                    if (!correct) { showError('Неверный пароль'); authBtn.disabled = false; authBtn.textContent = 'Войти'; return; }
                    currentUser = { username: username };
                    localStorage.setItem('guru_session', username);
                    saveSession(username);
                    showSuccess('Добро пожаловать, ' + username + '!');
                    setTimeout(() => { showApp(true); loadChatsList(); updateAllAvatars(); }, 300);
                } else {
                    if (exists) { showError('Пользователь уже существует'); authBtn.disabled = false; authBtn.textContent = 'Зарегистрироваться'; return; }
                    await registerUser(username, password);
                    currentUser = { username: username };
                    localStorage.setItem('guru_session', username);
                    saveSession(username);
                    showSuccess('Аккаунт создан! Добро пожаловать, ' + username + '!');
                    setTimeout(() => { showApp(true); loadChatsList(); updateAllAvatars(); }, 300);
                }
            } catch (error) {
                showError('Ошибка: ' + error.message);
            }

            authBtn.disabled = false;
            authBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
        }

        authBtn.addEventListener('click', handleAuth);
        passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAuth(); });

        // --- Показать интерфейс ---
        function showApp(show) {
            if (show) {
                authContainer.style.display = 'none';
                chatList.style.display = 'block';
                bottomNav.style.display = 'flex';
                searchArea.style.display = 'block';
                pageContainer.classList.remove('active');
                burgerBtn.classList.remove('disabled');
                
                if (currentUser) {
                    menuUsername.textContent = currentUser.username;
                    menuStatus.textContent = 'В сети';
                    
                    const headerLeft = document.querySelector('.header-left');
                    const oldProfile = document.querySelector('.user-profile');
                    if (oldProfile) oldProfile.remove();
                    
                    const profile = document.createElement('div');
                    profile.className = 'user-profile';
                    const firstLetter = currentUser.username.charAt(0).toUpperCase() || '?';
                    profile.innerHTML = `
                        <div class="avatar">${firstLetter}</div>
                        <span class="username">${currentUser.username}</span>
                        <button class="logout-btn" id="logoutBtn">Выйти</button>
                    `;
                    headerLeft.appendChild(profile);
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                    
                    getUserAvatar(currentUser.username).then(url => {
                        if (url) {
                            menuAvatar.innerHTML = `<img src="${url}" alt="avatar">`;
                            const profAvatar = document.querySelector('.user-profile .avatar');
                            if (profAvatar) profAvatar.innerHTML = `<img src="${url}" alt="avatar">`;
                        }
                    });
                }
            } else {
                authContainer.style.display = 'flex';
                chatList.style.display = 'none';
                bottomNav.style.display = 'none';
                searchArea.style.display = 'none';
                pageContainer.classList.remove('active');
                chatWindow.classList.remove('active');
                burgerBtn.classList.add('disabled');
                
                const profile = document.querySelector('.user-profile');
                if (profile) profile.remove();
                menuUsername.textContent = 'Гость';
                menuStatus.textContent = 'Не авторизован';
                menuAvatar.textContent = 'G';
            }
        }

        // --- Табы ---
        document.querySelectorAll('.nav-item').forEach(tab => {
            tab.addEventListener('click', function() {
                if (!currentUser) return;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                const tabName = this.dataset.tab;
                
                if (pageContainer.classList.contains('active')) pageContainer.classList.remove('active');
                chatWindow.classList.remove('active');
                
                if (tabName === 'chats') {
                    chatList.style.display = 'block';
                    searchArea.style.display = 'block';
                    bottomNav.style.display = 'flex';
                    loadChatsList();
                } else {
                    chatList.style.display = 'none';
                    searchArea.style.display = 'none';
                    showPage(tabName);
                }
            });
        });

        // --- Назад ---
        pageBack.addEventListener('click', function() {
            pageContainer.classList.remove('active');
            chatList.style.display = 'block';
            bottomNav.style.display = 'flex';
            searchArea.style.display = 'block';
            currentPage = null;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector('[data-tab="chats"]').classList.add('active');
            loadChatsList();
        });

        // --- Меню пункты ---
        document.querySelectorAll('.side-menu-item').forEach(item => {
            item.addEventListener('click', function() {
                const page = this.dataset.page;
                if (page && currentUser) showPage(page);
            });
        });

        // --- Проверка сессии и темы ---
        async function initApp() {
            const savedTheme = localStorage.getItem('guru_theme');
            if (savedTheme === 'light') {
                isDarkTheme = false;
                document.body.classList.add('light-theme');
                document.querySelector('.telegram-clone').classList.add('light');
            }

            try {
                const sessionUser = await checkSession();
                if (sessionUser) {
                    currentUser = { username: sessionUser };
                    showApp(true);
                    loadChatsList();
                    updateAllAvatars();
                } else {
                    showApp(false);
                }
            } catch (error) {
                showApp(false);
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);

        document.addEventListener('click', function(e) {
            if (sideMenu.classList.contains('open')) {
                if (!sideMenu.contains(e.target) && e.target !== burgerBtn && !burgerBtn.contains(e.target)) {
                    closeMenu();
                }
            }
        });

        const style = document.createElement('style');
        style.textContent = `@keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
