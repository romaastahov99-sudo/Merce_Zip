<body>
    <div class="telegram-clone" id="app">
        <!-- SIDE MENU -->
        <div class="side-menu-overlay" id="menuOverlay"></div>
        <div class="side-menu" id="sideMenu">

            </div>

                <button class="side-menu-item" data-page="calls"><i class="fas fa-phone"></i> Звонки</button>

                <div class="side-menu-divider"></div>
                <button class="side-menu-item" data-page="settings"><i class="fas fa-cog"></i> Настройки</button>
                <button class="side-menu-item" data-page="faq"><i class="fas fa-question-circle"></i> Вопросы</button>

            <div class="side-menu-footer">GURU v3.2</div>

        <!-- HEADER -->

            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-area" id="searchArea">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Поиск" id="searchInput"></div>

        </div>

            <div id="pageContent"></div>

        <!-- CALL MODAL -->

    function encryptMessage(text) {
        let result = '';
        const key = 'GURU_SECRET_KEY_2024';
        for (let i = 0; i < text.length; i++) {
            result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return btoa(result);
    }

    function decryptMessage(encrypted) {
        try {
            const text = atob(encrypted);
            let result = '';
            const key = 'GURU_SECRET_KEY_2024';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        } catch(e) {
            return encrypted;
        }
    }

    function startVideoRecording() {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then((stream) => {
                isRecordingVideo = true;
                videoChunks = [];
                videoRecordedBlob = null;
                recordingVideoStream = stream;
                recordingVideoSeconds = 0;
                
                recordingOverlay.classList.add('active');
                recordingPreview.srcObject = stream;
                recordingTimer.textContent = '0:00';
                
                recordingVideoInterval = setInterval(() => {
                    recordingVideoSeconds++;
                    const mins = Math.floor(recordingVideoSeconds / 60);
                    const secs = Math.floor(recordingVideoSeconds % 60);
                    recordingTimer.textContent = mins + ':' + String(secs).padStart(2, '0');
                    
                    if (recordingVideoSeconds >= 60) {
                        stopVideoRecording();
                    }
                }, 1000);

                videoRecorder = new MediaRecorder(stream);
                videoRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) videoChunks.push(e.data);
                };
                
                videoRecorder.onstop = () => {
                    clearInterval(recordingVideoInterval);
                    recordingOverlay.classList.remove('active');
                    recordingPreview.srcObject = null;
                    
                    if (videoChunks.length > 0) {
                        videoRecordedBlob = new Blob(videoChunks, { type: 'video/mp4' });
                        console.log('✅ Видео записано, размер:', videoRecordedBlob.size);
                    } else {
                        videoRecordedBlob = null;
                        console.log('❌ Нет данных видео');
                    }
                    
                    stream.getTracks().forEach(t => t.stop());
                    isRecordingVideo = false;
                    recordingVideoStream = null;
                    videoRecorder = null;
                    
                    if (videoRecordedBlob && videoRecordedBlob.size > 1000) {
                        sendVideoRound(currentChatId, currentUser.username, videoRecordedBlob, recordingVideoSeconds);
                    } else {
                        showNotification('❌ Запись отменена или слишком короткая');
                    }
                };
                
                videoRecorder.start(100);
            })
            .catch((err) => {
                console.error('Video error:', err);
                showNotification('❌ Ошибка доступа к камере');
                videoMsgInput.click();
            });
    }

    function sendVideoRound(chatId, from, blob, duration) {

            database.ref('chats/' + chatId + '/messages/' + msgId).set({

                from: from,
                time: Date.now(),
                read: false,
                readBy: {},
                duration: duration
            }).then(() => {

                loadChatsList();
            }).catch((err) => {
                showError('❌ Ошибка отправки: ' + err.message);
            });
        };
        reader.readAsDataURL(blob);
    }

                loadMessages(currentChatId, (messages) => {

                });
            }

        isSearching = true;
        database.ref('chats/' + currentChatId + '/messages').once('value', (snap) => {
            const messages = snap.val() || {};
            const results = [];
            const keys = Object.keys(messages);
            keys.forEach(key => {
                const msg = messages[key];
                if (msg.text && msg.text.toLowerCase().includes(query)) {
                    results.push({ id: key, data: msg });
                }
            });
            searchResults = results;
            renderSearchResults(results);
        });
    });

    function renderSearchResults(results) {
        chatMessages.innerHTML = '';
        if (results.length === 0) {
            const empty = document.createElement('div');
            empty.style.cssText = 'color:#6a6a6a;text-align:center;padding:20px;';
            empty.textContent = '🔍 Ничего не найдено';
            chatMessages.appendChild(empty);
            return;
        }

        results.forEach(({ id, data: msg }) => {
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
            bubble.style.border = '2px solid #2b6b9c';
            bubble.dataset.msgId = id;
            
            if (msg.from !== currentUser.username && msg.from !== 'system') {
                const sender = document.createElement('div');
                sender.className = 'message-sender';
                sender.textContent = msg.from;
                bubble.appendChild(sender);
            }
            
            const text = document.createElement('div');
            text.className = 'message-text';
            text.innerHTML = formatMessageText(msg.text || '');
            bubble.appendChild(text);
            
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            bubble.appendChild(time);
            
            bubble.onclick = () => {
                searchChat.classList.remove('active');
                searchChatInput.value = '';
                isSearching = false;
                if (currentChatId) {
                    loadMessages(currentChatId, (messages) => {
                        renderMessages(messages);
                        const bubbles = chatMessages.querySelectorAll('.message-bubble');
                        bubbles.forEach(b => {
                            if (b.dataset.msgId === id) {
                                b.style.border = '2px solid #f1c40f';
                                b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                setTimeout(() => {
                                    b.style.border = '';
                                }, 3000);
                            }
                        });
                    });
                }
            };
            
            chatMessages.appendChild(bubble);
        });
    }

    // =============================================
    //  FORMAT LAST SEEN
    // =============================================
    function formatLastSeen(timestamp) {
        if (!timestamp) return 'недавно';
        const now = Date.now();
        const diff = now - timestamp;
        const seconds = Math.floor(diff / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);

        if (seconds < 5) return 'только что';
        if (seconds < 60) return seconds + ' сек. назад';
        if (minutes < 60) return minutes + ' мин. назад';
        if (hours < 24) return hours + ' ч. назад';
        if (days < 7) return days + ' дн. назад';
        return new Date(timestamp).toLocaleDateString();
    }

    // --- НАЧАТЬ ЗВОНОК ---
    async function startCall(targetUser, video = false) {
        if (!currentUser) return showNotification('❌ Войдите в аккаунт');
        if (!targetUser) return showNotification('❌ Нет собеседника');
        if (currentCallId) return showNotification('❌ Уже в звонке');

        try {
            // Получаем медиа
            const constraints = video ? { 
                audio: true, 
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
            } : { audio: true };
            
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            console.log('✅ Медиа получено');
            
            // Показываем локальное видео
            if (video) {
                localVideoCall.srcObject = localStream;
                callVideoContainer.classList.add('active');
            }
            document.getElementById('localVideo').srcObject = localStream;

            // Показываем модалку
            callModal.classList.add('active');
            callAvatar.textContent = targetUser.charAt(0).toUpperCase();
            callName.textContent = targetUser;
            callStatus.textContent = '🔄 Вызов...';
            callAnswerBtn.style.display = 'none';
            callVideoToggle.style.display = 'none';
            document.querySelector('.call-sub').textContent = video ? 'Видеозвонок' : 'Аудиозвонок';
            isCaller = true;
            isVideoCall = video;

            // Создаем PeerConnection
            peerConnection = new RTCPeerConnection(rtcConfig);
            
            // Добавляем треки
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
                console.log('📤 Добавлен трек:', track.kind);
            });

            // Обработка входящего потока
            peerConnection.ontrack = (event) => {
                console.log('📥 Получен трек:', event.track.kind);
                
                if (event.track.kind === 'audio') {
                    // Аудио
                    if (audioElement) {
                        audioElement.pause();
                        audioElement.srcObject = null;
                        audioElement.remove();
                    }
                    audioElement = new Audio();
                    audioElement.srcObject = event.streams[0];
                    audioElement.autoplay = true;
                    audioElement.volume = 1.0;
                    audioElement.play().catch(e => console.log('Audio play error:', e));
                    console.log('🔊 Аудио воспроизводится');
                }
                
                if (event.track.kind === 'video') {
                    // Видео
                    remoteVideoCall.srcObject = event.streams[0];
                    callVideoContainer.classList.add('active');
                    console.log('🎥 Видео получено');
                }
                
                callStatus.textContent = '🔊 В разговоре';
                startCallTimer();
            };

            // ICE кандидаты
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && signalRef) {
                    signalRef.update({
                        type: 'candidate',
                        candidate: event.candidate
                    });
                    console.log('📤 ICE кандидат отправлен');
                }
            };

            // Создаем Offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            console.log('📤 Offer создан');

            // Сохраняем в Firebase
            currentCallId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            signalRef = database.ref('calls/' + currentCallId);
            await signalRef.set({
                from: currentUser.username,
                to: targetUser,
                type: 'offer',
                sdp: offer,
                status: 'calling',
                time: Date.now(),
                video: video
            });

            // Слушаем ответ
            signalRef.on('value', async (snap) => {
                const data = snap.val();
                if (!data) return;

                if (data.type === 'answer' && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                    callStatus.textContent = '🔊 В разговоре';
                    startCallTimer();
                    console.log('📥 Answer получен');
                }

                if (data.type === 'candidate' && peerConnection) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                        console.log('✅ ICE кандидат добавлен');
                    } catch(e) {
                        console.log('❌ ICE ошибка:', e);
                    }
                }

                if (data.status === 'ended' || data.status === 'rejected') {
                    const duration = Math.floor((Date.now() - callStartTime) / 1000);
                    if (duration > 0 && isCaller) {
                        saveCallHistory(currentUser.username, targetUser, duration);
                        showNotification('📞 Звонок: ' + duration + ' сек');
                    }
                    endCall('Звонок завершён');
                }
            });

            callData = { ref: signalRef, callId: currentCallId };

        } catch (e) {
            console.error('❌ Call error:', e);
            showNotification('❌ Ошибка звонка: ' + e.message);
            endCall();
        }
    }

            });

            // Слушаем дальше
            ref.on('value', async (snap) => {

        } catch (e) {

    // --- ЗАВЕРШИТЬ ЗВОНОК ---
    function endCall(message = 'Звонок завершён') {
        if (signalRef) {
            signalRef.update({ status: 'ended' });
            signalRef.off();
            signalRef = null;
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (remoteStream) {
            remoteStream.getTracks().forEach(track => track.stop());
            remoteStream = null;
        }
        if (audioElement) {
            audioElement.pause();
            audioElement.srcObject = null;
            audioElement.remove();
            audioElement = null;
        }
        callModal.classList.remove('active');
        callVideoContainer.classList.remove('active');
        callIncoming.classList.remove('active');
        if (callTimerInterval) {
            clearInterval(callTimerInterval);
            callTimerInterval = null;
        }
        document.getElementById('localVideo').srcObject = null;
        remoteVideoCall.srcObject = null;
        localVideoCall.srcObject = null;
        if (message) showNotification('📞 ' + message);
        currentCallId = null;
        callData = null;
        isVideoCall = false;
        incomingCallData = null;
    }

    function startCallTimer() {
        callSecondsTimer = 0;
        callStartTime = Date.now();
        if (callTimerInterval) clearInterval(callTimerInterval);
        callTimerInterval = setInterval(() => {
            callSecondsTimer++;
            const mins = Math.floor(callSecondsTimer / 60);
            const secs = Math.floor(callSecondsTimer % 60);
            callStatus.textContent = '⏱ ' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }, 1000);
    }

    function saveCallHistory(from, to, duration) {
        const callId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        const data = {
            from: from,
            to: to,
            duration: duration,
            time: Date.now(),
            type: isVideoCall ? 'video' : 'audio'
        };
        database.ref('calls_history/' + from + '/' + callId).set(data);
        database.ref('calls_history/' + to + '/' + callId).set(data);
    }

    // --- СЛУШАТЬ ВХОДЯЩИЕ ЗВОНКИ ---
    function listenForCalls() {
        if (!currentUser) return;

        const callsRef = database.ref('calls');
        callsRef.orderByChild('to').equalTo(currentUser.username).on('child_added', (snap) => {
            const data = snap.val();
            if (!data || data.status === 'ended' || data.status === 'rejected') return;
            if (data.to !== currentUser.username) return;
            if (currentCallId) return;

            // Сохраняем данные звонка
            incomingCallData = { callId: snap.key, ref: snap.ref };
            
            // Показываем входящий звонок
            showIncomingCall(data.from, data.video || false);
            
            // Уведомление
            const type = data.video ? 'Видеозвонок' : 'Аудиозвонок';
            sendNotification('📞 ' + type + ' от ' + data.from, 'Входящий вызов...');
            
            // Автоотказ через 30 секунд
            setTimeout(() => {
                if (callIncoming.classList.contains('active')) {
                    snap.ref.update({ status: 'rejected' });
                    hideIncomingCall();
                    showNotification('❌ Звонок не отвечен');
                }
            }, 30000);
        });
    }

    function checkUserExists(username) {

            database.ref('users/' + username).once('value', (snapshot) => { resolve(snapshot.exists()); });
        });
    }

    function registerUser(username, password) {
        return new Promise((resolve, reject) => {
            database.ref('users/' + username).set({ 
                password: password, 
                created: Date.now(), 
                chats: {},
                online: false,
                lastSeen: Date.now()
            }).then(resolve).catch(reject);
        });
    }

    function checkPassword(username, password) {
        return new Promise((resolve, reject) => {
            database.ref('users/' + username + '/password').once('value', (snapshot) => {
                resolve(snapshot.exists() && snapshot.val() === password);
            }).catch(reject);
        });
    }

    function saveSession(username) {
        database.ref('sessions/' + username).set({ lastLogin: Date.now(), active: true });
    }

    function checkSession() {
        return new Promise((resolve) => {
            const sessionKey = localStorage.getItem('guru_session');
            if (!sessionKey) { resolve(null); return; }
            database.ref('sessions/' + sessionKey).once('value', (snapshot) => {
                resolve(snapshot.exists() && snapshot.val().active ? sessionKey : null);
            });
        });
    }

    function clearSession(username) {
        if (username) database.ref('sessions/' + username).remove();
        localStorage.removeItem('guru_session');
    }

    function loadContacts(username) {
        return new Promise((resolve) => {
            database.ref('users/' + username + '/contacts').once('value', (snapshot) => {
                resolve(snapshot.exists() ? snapshot.val() : {});
            });
        });
    }

    function addContact(username, contactName) {
        return new Promise((resolve, reject) => {
            database.ref('users/' + username + '/contacts/' + contactName).set({ added: Date.now() })
                .then(resolve).catch(reject);
        });
    }

    function loadUserChats(username) {
        return new Promise((resolve) => {
            database.ref('users/' + username + '/chats').once('value', (snapshot) => {
                if (!snapshot.exists()) { resolve({}); return; }
                const chatIds = Object.keys(snapshot.val());
                if (chatIds.length === 0) { resolve({}); return; }
                const chatsData = {};
                let loaded = 0;
                chatIds.forEach(chatId => {
                    database.ref('chats/' + chatId).once('value', (snap) => {
                        if (snap.exists()) { chatsData[chatId] = snap.val(); }
                        loaded++;
                        if (loaded === chatIds.length) { resolve(chatsData); }
                    });
                });
            });
        });
    }

        return new Promise((resolve, reject) => {
            const chatId = 'private_' + [user1, user2].sort().join('_');
            database.ref('chats/' + chatId).once('value', (snapshot) => {
                if (snapshot.exists()) { resolve(chatId); return; }
                database.ref('chats/' + chatId).set({

                    created: Date.now(),
                    isGroup: false,
                    isChannel: false,

                }).then(() => {

                    updates['users/' + user2 + '/chats/' + chatId] = true;

                }).then(() => { resolve(chatId); }).catch(reject);

    function createGroup(creator, memberNames, groupName) {
        return new Promise((resolve, reject) => {
            const isChannel = groupName.startsWith('#');
            const chatId = (isChannel ? 'channel_' : 'group_') + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const allMembers = [creator, ...memberNames.filter(m => m !== creator)];
            const uniqueMembers = [...new Set(allMembers)];
            
            const data = {
                participants: uniqueMembers,
                created: Date.now(),
                isGroup: !isChannel,
                isChannel: isChannel,
                creator: creator,
                groupName: groupName.replace('#', ''),
                admins: [creator],
                messages: {
                    first: { 
                        text: isChannel ? '📢 Канал "' + groupName.replace('#', '') + '" создан!' : '🎉 Группа "' + groupName.replace('#', '') + '" создана!', 
                        from: 'system', 
                        time: Date.now(), 
                        read: true 
                    }
                }
            };
            
            database.ref('chats/' + chatId).set(data).then(() => {
                const updates = {};
                uniqueMembers.forEach(user => {
                    updates['users/' + user + '/chats/' + chatId] = true;
                });
                return database.ref().update(updates);
            }).then(() => { resolve(chatId); }).catch(reject);
        });
    }

    function addMemberToGroup(groupId, newMember) {
        return new Promise((resolve, reject) => {
            checkUserExists(newMember).then((exists) => {
                if (!exists) { 
                    reject('❌ Пользователь не найден'); 
                    return; 
                }
                database.ref('chats/' + groupId + '/participants').once('value', (snapshot) => {
                    let participants = snapshot.exists() ? snapshot.val() : [];
                    if (participants.includes(newMember)) {
                        reject('❌ Пользователь уже в группе');
                        return;
                    }
                    participants.push(newMember);
                    database.ref('chats/' + groupId + '/participants').set(participants).then(() => {
                        database.ref('users/' + newMember + '/chats/' + groupId).set(true);
                        const msgId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                        database.ref('chats/' + groupId + '/messages/' + msgId).set({
                            text: '👤 ' + newMember + ' присоединился к группе!',
                            from: 'system',
                            time: Date.now(),
                            read: true
                        });
                        resolve('✅ ' + newMember + ' добавлен в группу!');
                    }).catch((err) => reject('❌ Ошибка: ' + err.message));
                });
            }).catch((err) => reject('❌ Ошибка: ' + err.message));
        });
    }

    function uploadAvatar(user, file) {
        return new Promise((resolve, reject) => {

            reader.onload = async (e) => {

                    await database.ref('users/' + user + '/avatar').set(base64);

    function uploadFile(chatId, from, file, type) {

    function playVoice(base64, element) {
        const audio = new Audio(base64);
        audio.play().catch(e => console.log('Play error:', e));
        const progress = element.querySelector('.fill');
        const durationEl = element.querySelector('.voice-duration');
        
        audio.addEventListener('timeupdate', () => {
            if (progress && audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progress.style.width = Math.min(percent, 100) + '%';
            }
            if (durationEl && audio.duration) {
                const left = Math.floor(audio.duration - audio.currentTime);
                const mins = Math.floor(left / 60);
                const secs = Math.floor(left % 60);
                durationEl.textContent = mins + ':' + String(secs).padStart(2, '0');
            }
        });
        
        audio.addEventListener('ended', () => {
            if (progress) progress.style.width = '0%';
            if (durationEl) {
                const total = Math.floor(audio.duration || 0);
                const mins = Math.floor(total / 60);
                const secs = Math.floor(total % 60);
                durationEl.textContent = mins + ':' + String(secs).padStart(2, '0');
            }
            const playBtn = element.querySelector('.play-btn');
            if (playBtn) playBtn.innerHTML = '<i class="fas fa-play"></i>';
        });
        
        return audio;
    }

                            showSuccess('Контакт добавлен!');
                            loadContactsList();
                        }).catch(() => showError('Ошибка'));
                    }
                });
            }
            if (page === 'settings') {
                document.getElementById('themeSwitch')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleTheme();
                    this.classList.toggle('active');
                });
                document.getElementById('privacyItem')?.addEventListener('click', () => {
                    showNotification('🔒 Ваши данные защищены!');
                });
                document.getElementById('notifItem')?.addEventListener('click', () => {
                    requestNotificationPermission();
                    showNotification('🔔 Уведомления включены!');
                });
                document.getElementById('encryptionItem')?.addEventListener('click', () => {
                    showModal('🔒 Шифрование', 'Все сообщения в GURU шифруются с помощью XOR шифрования. Ваши данные в безопасности!');
                });
            }
        }
    }

    function updateAllAvatars() {
        loadChatsList();
        if (currentUser) {
            getUserAvatar(currentUser.username).then(url => {
                if (url) {
                    menuAvatar.innerHTML = `<img src="${url}" alt="avatar">`;
                } else {
                    menuAvatar.textContent = currentUser.username.charAt(0).toUpperCase();
                }
                const profileAvatar = document.querySelector('.user-profile .avatar');
                if (profileAvatar) {
                    if (url) {
                        profileAvatar.innerHTML = `<img src="${url}" alt="avatar">`;
                    } else {
                        profileAvatar.textContent = currentUser.username.charAt(0).toUpperCase();
                    }
                }
            });
        }
    }

    function loadContactsList() {
        if (!currentUser) return;
        loadContacts(currentUser.username).then((contacts) => {
            const list = document.getElementById('contactsList');
            if (!list) return;
            const count = Object.keys(contacts).length;
            if (contactsBadge) contactsBadge.textContent = count;
            if (count === 0) {
                list.innerHTML = '<div class="page-item" style="color:#6a6a6a;">Нет контактов</div>';
            } else {
                list.innerHTML = '';
                for (const [contact, data] of Object.entries(contacts)) {
                    const div = document.createElement('div');
                    div.className = 'page-item';
                    div.innerHTML = `<i class="fas fa-user"></i> ${contact} <span style="margin-left:auto;color:#4a4a4a;">${new Date(data.added).toLocaleDateString()}</span>`;
                    div.style.cursor = 'pointer';
                    div.addEventListener('click', function() {
                        createPrivateChat(currentUser.username, contact).then((chatId) => {
                            showNotification('Чат с ' + contact + ' создан!');
                            loadChatsList();
                            openChat(chatId);
                        });
                    });
                    list.appendChild(div);
                }
            }
        });
    }

    function loadChatsList() {
        if (!currentUser) return;
        loadUserChats(currentUser.username).then((chats) => {
            chatItems.innerHTML = '';
            if (Object.keys(chats).length === 0) {
                emptyChats.style.display = 'flex';
                return;
            }
            emptyChats.style.display = 'none';
            
            let hasToday = false, hasYesterday = false, hasEarlier = false;
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            for (const [chatId, chat] of Object.entries(chats)) {
                const isGroup = chat.isGroup || false;
                const isChannel = chat.isChannel || false;
                const participants = chat.participants || [];
                const otherUser = participants.find(p => p !== currentUser.username);
                const chatDate = new Date(chat.created);
                
                let divider = '';
                if (chatDate.toDateString() === today.toDateString()) {
                    if (!hasToday) { divider = '<div class="chat-divider">СЕГОДНЯ</div>'; hasToday = true; }
                } else if (chatDate.toDateString() === yesterday.toDateString()) {
                    if (!hasYesterday) { divider = '<div class="chat-divider">ВЧЕРА</div>'; hasYesterday = true; }
                } else {
                    if (!hasEarlier) { divider = '<div class="chat-divider">РАНЕЕ</div>'; hasEarlier = true; }
                }

                let displayName;
                let icon = '';
                if (isChannel) {
                    icon = '📢 ';
                    displayName = icon + (chat.groupName || 'Канал');
                } else if (isGroup) {
                    icon = '👥 ';
                    displayName = icon + (chat.groupName || participants.join(', '));
                } else {
                    displayName = otherUser || 'Чат';
                }
                
                const firstLetter = isChannel ? '📢' : isGroup ? '👥' : (otherUser ? otherUser.charAt(0).toUpperCase() : '?');
                const colors = ['avatar-1', 'avatar-2', 'avatar-3', 'avatar-4', 'avatar-5', 'avatar-6', 'avatar-7', 'avatar-8'];
                const colorClass = colors[Math.floor(Math.random() * colors.length)];

                const messages = chat.messages || {};
                const messageKeys = Object.keys(messages);
                let lastMessage = { text: 'Нет сообщений', from: otherUser };
                let unreadCount = 0;
                
                if (messageKeys.length > 0) {
                    const sortedKeys = messageKeys.sort((a, b) => (messages[a].time || 0) - (messages[b].time || 0));
                    const lastKey = sortedKeys[sortedKeys.length - 1];
                    lastMessage = messages[lastKey] || { text: 'Нет сообщений', from: otherUser };
                    
                    messageKeys.forEach(key => {
                        const msg = messages[key];
                        if (msg.from !== currentUser.username && !msg.read && !msg.deleted) {
                            unreadCount++;
                        }
                    });
                }
                
                let previewText = lastMessage.text;
                if (lastMessage.deleted) {
                    previewText = '🗑️ Сообщение удалено';
                } else if (lastMessage.type === 'voice') {
                    const mins = Math.floor(lastMessage.duration / 60);
                    const secs = Math.floor(lastMessage.duration % 60);
                    previewText = '🎤 Голосовое (' + mins + ':' + String(secs).padStart(2, '0') + ')';
                } else if (lastMessage.type === 'image') {
                    previewText = '📷 Фото';
                } else if (lastMessage.type === 'video') {
                    previewText = '🎬 Видео';
                } else if (lastMessage.type === 'video_round') {
                    previewText = '🎬 Видеосообщение';
                } else if (lastMessage.type === 'sticker') {
                    previewText = '😊 Стикер';
                }
                if (lastMessage.from === 'system') previewText = '📢 ' + previewText;
                if (lastMessage.from === currentUser.username) previewText = 'Вы: ' + previewText;

                const chatDiv = document.createElement('div');
                chatDiv.innerHTML = `
                    ${divider}
                    <div class="chat-item" data-chat="${chatId}">
                        <div class="chat-avatar ${colorClass}" id="avatar_${chatId}">${firstLetter}</div>
                        <div class="chat-info">
                            <div class="chat-name">
                                <span class="name">${displayName}</span>
                                <span class="time">${new Date(chat.created).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="chat-preview">
                                <span class="message">${previewText}</span>
                                ${!isGroup && !isChannel && otherUser ? `<div class="chat-status" id="status_${chatId}">⏳</div>` : ''}
                                ${isChannel ? `<div class="chat-status" style="color:#f1c40f;">📢 Канал</div>` : ''}
                                ${unreadCount > 0 ? `<span class="badge-unread">${unreadCount}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                chatItems.appendChild(chatDiv);

                if (!isGroup && !isChannel && otherUser) {
                    getUserAvatar(otherUser).then(url => {
                        const el = document.getElementById('avatar_' + chatId);
                        if (el && url) {
                            el.innerHTML = `<img src="${url}" alt="avatar">`;
                            el.style.background = 'none';
                        }
                    });
                    getUserStatus(otherUser).then(status => {
                        const statusEl = document.getElementById('status_' + chatId);
                        if (statusEl) {
                            if (status.online) {
                                statusEl.textContent = '🟢 Онлайн';
                                statusEl.className = 'chat-status online';
                            } else if (status.lastSeen) {
                                statusEl.textContent = '🕒 ' + formatLastSeen(status.lastSeen);
                                statusEl.className = 'chat-status';
                            } else {
                                statusEl.textContent = '🕒 недавно';
                                statusEl.className = 'chat-status';
                            }
                        }
                    });
                }
            }

            document.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', function() {
                    const chatId = this.dataset.chat;
                    if (chatId) openChat(chatId);
                });
            });
        });
    }

    let currentOtherUser = null;

    function renderMessages(messages) {
        const typingEl = document.getElementById('typingIndicator');
        chatMessages.innerHTML = '';
        if (typingEl) chatMessages.appendChild(typingEl);
        
        if (Object.keys(messages).length === 0) {
            const empty = document.createElement('div');
            empty.style.cssText = 'color:#6a6a6a;text-align:center;padding:20px;';
            empty.textContent = 'Нет сообщений. Напишите первое!';
            chatMessages.appendChild(empty);
            return;
        }
        
        const sorted = Object.values(messages).sort((a, b) => a.time - b.time);
        const keys = Object.keys(messages).sort((a, b) => messages[a].time - messages[b].time);
        
        const isChannel = currentChatData && currentChatData.isChannel === true;
        const isAdmin = currentChatData && currentChatData.admins && currentChatData.admins.includes(currentUser.username);
        const isCreator = currentChatData && currentChatData.creator === currentUser.username;
        const canWrite = !isChannel || isAdmin || isCreator;
        
        if (isChannel && !canWrite) {
            chatInput.disabled = true;
            chatInput.placeholder = '⛔ Только админы могут писать в канале';
            chatSendBtn.disabled = true;
            chatSendBtn.style.opacity = '0.5';
        } else {
            chatInput.disabled = false;
            chatInput.placeholder = 'Сообщение...';
            chatSendBtn.disabled = false;
            chatSendBtn.style.opacity = '1';
        }
        
        sorted.forEach((msg, index) => {
            const msgId = keys[index];
            
            const deletedForSelf = msg.deletedFor && msg.deletedFor[currentUser.username];
            if (deletedForSelf) return;
            
            const bubble = document.createElement('div');
            bubble.dataset.msgId = msgId;
            
            if (msg.deleted === true) {
                bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other') + ' deleted';
                bubble.textContent = '🗑️ Сообщение удалено';
                chatMessages.appendChild(bubble);
                return;
            }
            
            if (msg.from === 'system') {
                bubble.className = 'message-bubble system';
                bubble.textContent = msg.text;
            } else if (msg.type === 'sticker') {
                bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                bubble.style.fontSize = '48px';
                bubble.style.padding = '8px 12px';
                bubble.textContent = msg.data;
                const time = document.createElement('div');
                time.className = 'message-time';
                time.innerHTML = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                bubble.appendChild(time);
            } else if (msg.type === 'video_round') {
                bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                if (msg.from !== currentUser.username) {
                    const sender = document.createElement('div');
                    sender.className = 'message-sender';
                    sender.textContent = msg.from;
                    if (currentChatData && currentChatData.admins && currentChatData.admins.includes(msg.from)) {
                        sender.classList.add('admin');
                    }
                    bubble.appendChild(sender);
                }
                const video = document.createElement('video');
                video.className = 'message-video-round';
                video.src = msg.data;
                video.muted = true;
                video.playsInline = true;
                video.loop = true;
                
                video.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.paused) {
                        this.play();
                    } else {
                        this.pause();
                    }
                });
                
                video.addEventListener('dblclick', function(e) {
                    e.stopPropagation();
                    showFullscreenVideo(msg.data);
                });
                
                video.addEventListener('mouseenter', function() {
                    if (this.paused) {
                        this.play();
                    }
                });
                video.addEventListener('mouseleave', function() {
                    this.pause();
                });
                
                bubble.appendChild(video);
                
                const duration = document.createElement('div');
                duration.className = 'video-indicator';
                const totalSecs = msg.duration || 60;
                const mins = Math.floor(totalSecs / 60);
                const secs = Math.floor(totalSecs % 60);
                duration.textContent = mins + ':' + String(secs).padStart(2, '0');
                bubble.appendChild(duration);
                
                const time = document.createElement('div');
                time.className = 'message-time';
                const readStatus = (msg.read && msg.from === currentUser.username) ? ' ✓✓' : (msg.from === currentUser.username ? ' ✓' : '');
                time.innerHTML = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + 
                    (msg.from === currentUser.username ? `<span class="read-status ${msg.read ? 'read' : ''}">${msg.read ? ' ✓✓' : ' ✓'}</span>` : '');
                bubble.appendChild(time);
            } else if (msg.type === 'voice') {
                bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                if (msg.from !== currentUser.username) {
                    const sender = document.createElement('div');
                    sender.className = 'message-sender';
                    sender.textContent = msg.from;
                    if (currentChatData && currentChatData.admins && currentChatData.admins.includes(msg.from)) {
                        sender.classList.add('admin');
                    }
                    bubble.appendChild(sender);
                }
                const voiceDiv = document.createElement('div');
                voiceDiv.className = 'message-voice';
                
                const playBtn = document.createElement('button');
                playBtn.className = 'play-btn';
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                let audio = null;
                playBtn.addEventListener('click', function() {
                    if (audio && !audio.paused) {
                        audio.pause();
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        return;
                    }
                    if (audio) {
                        audio.play().catch(e => console.log('Play error:', e));
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        return;
                    }
                    audio = playVoice(msg.data, voiceDiv);
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                });
                
                const progress = document.createElement('div');
                progress.className = 'voice-progress';
                progress.innerHTML = '<div class="fill"></div>';
                
                const duration = document.createElement('span');
                duration.className = 'voice-duration';
                const mins = Math.floor(msg.duration / 60);
                const secs = Math.floor(msg.duration % 60);
                duration.textContent = mins + ':' + String(secs).padStart(2, '0');
                
                voiceDiv.appendChild(playBtn);
                voiceDiv.appendChild(progress);
                voiceDiv.appendChild(duration);
                bubble.appendChild(voiceDiv);
                
                const time = document.createElement('div');
                time.className = 'message-time';
                const readStatus = (msg.read && msg.from === currentUser.username) ? ' ✓✓' : (msg.from === currentUser.username ? ' ✓' : '');
                time.innerHTML = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + 
                    (msg.from === currentUser.username ? `<span class="read-status ${msg.read ? 'read' : ''}">${msg.read ? ' ✓✓' : ' ✓'}</span>` : '');
                bubble.appendChild(time);
            } else if (msg.type === 'image' || msg.type === 'video') {
                bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                if (msg.from !== currentUser.username) {
                    const sender = document.createElement('div');
                    sender.className = 'message-sender';
                    sender.textContent = msg.from;
                    if (currentChatData && currentChatData.admins && currentChatData.admins.includes(msg.from)) {
                        sender.classList.add('admin');
                    }
                    bubble.appendChild(sender);
                }
                if (msg.type === 'image') {
                    const img = document.createElement('img');
                    img.className = 'message-img';
                    img.src = msg.data;
                    img.alt = 'Фото';
                    img.addEventListener('click', function() {
                        showModal('📷 Фото', `<img src="${msg.data}" style="max-width:100%;border-radius:12px;">`);
                    });
                    bubble.appendChild(img);
                } else {
                    const video = document.createElement('video');
                    video.className = 'message-img';
                    video.src = msg.data;
                    video.controls = true;
                    video.style.maxHeight = '300px';
                    video.style.maxWidth = '100%';
                    video.style.borderRadius = '12px';
                    bubble.appendChild(video);
                }
                const time = document.createElement('div');
                time.className = 'message-time';
                const readStatus = (msg.read && msg.from === currentUser.username) ? ' ✓✓' : (msg.from === currentUser.username ? ' ✓' : '');
                time.innerHTML = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + 
                    (msg.from === currentUser.username ? `<span class="read-status ${msg.read ? 'read' : ''}">${msg.read ? ' ✓✓' : ' ✓'}</span>` : '');
                bubble.appendChild(time);
            } else {
                bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                if (msg.from !== currentUser.username) {
                    const sender = document.createElement('div');
                    sender.className = 'message-sender';
                    sender.textContent = msg.from;
                    if (currentChatData && currentChatData.admins && currentChatData.admins.includes(msg.from)) {
                        sender.classList.add('admin');
                    }
                    bubble.appendChild(sender);
                }
                
                if (msg.replyTo) {
                    const replyDiv = document.createElement('div');
                    replyDiv.className = 'message-reply';
                    replyDiv.innerHTML = `<span class="reply-to">${msg.replyTo.from || 'Кто-то'}:</span> ${(msg.replyTo.text || '').substring(0, 50)}`;
                    bubble.appendChild(replyDiv);
                }
                
                const text = document.createElement('div');
                text.className = 'message-text';
                let displayText = msg.text || '';
                if (msg.encrypted && msg.text) {
                    try {
                        displayText = decryptMessage(msg.text);
                    } catch(e) {
                        displayText = msg.text;
                    }
                }
                text.innerHTML = formatMessageText(displayText);
                bubble.appendChild(text);
                if (msg.edited) {
                    const editLabel = document.createElement('span');
                    editLabel.style.cssText = 'font-size:10px;opacity:0.5;margin-left:4px;';
                    editLabel.textContent = '(ред.)';
                    bubble.appendChild(editLabel);
                }
                const time = document.createElement('div');
                time.className = 'message-time';
                const readBy = msg.readBy || {};
                const readCount = Object.keys(readBy).length;
                time.innerHTML = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + 
                    (msg.from === currentUser.username ? `<span class="read-status ${msg.read ? 'read' : ''}" onclick="event.stopPropagation();showReadBy('${currentChatId}','${msgId}')">${msg.read ? ' ✓✓' : ' ✓'}</span>` : '') +
                    (readCount > 0 ? ` <span style="font-size:10px;color:#4a4a4a;cursor:pointer;" onclick="event.stopPropagation();showReadBy('${currentChatId}','${msgId}')">👁️${readCount}</span>` : '');
                bubble.appendChild(time);
            }
            
            // Reactions
            const reactions = msg.reactions || {};
            const reactionKeys = Object.keys(reactions);
            if (reactionKeys.length > 0 && !msg.deleted) {
                const reactionsDiv = document.createElement('div');
                reactionsDiv.className = 'message-reactions';
                const grouped = {};
                reactionKeys.forEach(user => {
                    const emoji = reactions[user];
                    if (!grouped[emoji]) grouped[emoji] = [];
                    grouped[emoji].push(user);
                });
                Object.keys(grouped).forEach(emoji => {
                    const span = document.createElement('span');
                    span.className = 'reaction';
                    span.textContent = emoji + ' ' + grouped[emoji].length;
                    span.onclick = (e) => {
                        e.stopPropagation();
                        const users = grouped[emoji];
                        let html = '<div style="color:#6a6a6a;margin-bottom:10px;">Поставили реакцию ' + emoji + ':</div>';
                        users.forEach(user => {
                            html += `<div class="participant-item">
                                <div class="participant-avatar">${user.charAt(0).toUpperCase()}</div>
                                <span class="participant-name">${user}</span>
                            </div>`;
                        });
                        showModal('Реакции', html);
                    };
                    reactionsDiv.appendChild(span);
                });
                bubble.appendChild(reactionsDiv);
            }
            
            if (msg.from !== 'system' && !msg.deleted) {
                bubble.addEventListener('click', function(e) {
                    if (e.target.closest('.message-reactions')) return;
                    if (e.target.closest('.play-btn')) return;
                    if (e.target.closest('.voice-progress')) return;
                    if (e.target.closest('.message-video-round')) return;
                    if (e.target.closest('.message-img')) return;
                    const mid = this.dataset.msgId;
                    if (mid) showReadBy(currentChatId, mid);
                });
                
                bubble.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const rect = this.getBoundingClientRect();
                    const mid = this.dataset.msgId;
                    const msgData = sorted.find((_, i) => keys[i] === mid);
                    if (mid && msgData) {
                        showMessageMenu(e.clientX, e.clientY, currentChatId, mid, msgData);
                    }
                });
                
                let pressTimer = null;
                bubble.addEventListener('mousedown', function(e) {
                    if (e.button !== 0) return;
                    if (e.target.closest('.message-reactions')) return;
                    if (e.target.closest('.play-btn')) return;
                    if (e.target.closest('.voice-progress')) return;
                    if (e.target.closest('.message-video-round')) return;
                    if (e.target.closest('.message-img')) return;
                    pressTimer = setTimeout(() => {
                        const rect = this.getBoundingClientRect();
                        const mid = this.dataset.msgId;
                        const msgData = sorted.find((_, i) => keys[i] === mid);
                        if (mid && msgData) {
                            showMessageMenu(rect.left + 20, rect.top - 20, currentChatId, mid, msgData);
                        }
                    }, 500);
                });
                bubble.addEventListener('mouseup', () => clearTimeout(pressTimer));
                bubble.addEventListener('mouseleave', () => clearTimeout(pressTimer));
                
                let touchStartXMsg = 0;
                bubble.addEventListener('touchstart', (e) => {
                    touchStartXMsg = e.touches[0].clientX;
                    clearTimeout(pressTimer);
                    pressTimer = setTimeout(() => {
                        const mid = bubble.dataset.msgId;
                        const msgData = sorted.find((_, i) => keys[i] === mid);
                        if (mid && msgData) {
                            showReactionPicker(currentChatId, mid, e);
                        }
                    }, 500);
                });
                bubble.addEventListener('touchmove', (e) => {
                    const diff = e.touches[0].clientX - touchStartXMsg;
                    if (diff > 60) {
                        clearTimeout(pressTimer);
                        const mid = bubble.dataset.msgId;
                        const msgData = sorted.find((_, i) => keys[i] === mid);
                        if (mid && msgData) {
                            setReplyTo(mid, msgData);
                            showNotification('💬 Ответ на сообщение');
                        }
                        touchStartXMsg = 0;
                    }
                });
                bubble.addEventListener('touchend', () => {
                    clearTimeout(pressTimer);
                });
            }
            
            chatMessages.appendChild(bubble);
        });
        chatMessages.scrollTop = chatMessages.scrollHeight;
        markMessagesRead(currentChatId);
    }

    function openChat(chatId) {
        if (messageListener) {
            database.ref('chats/' + currentChatId + '/messages').off();
            messageListener = null;
        }
        if (typingListener) {
            database.ref('users/' + currentOtherUser + '/typing').off();
            typingListener = null;
        }
        if (onlineListener) {
            database.ref('users/' + currentOtherUser).off();
            onlineListener = null;
        }
        
        currentChatId = chatId;
        chatWindow.classList.add('active');
        chatList.style.display = 'none';
        bottomNav.style.display = 'none';
        searchArea.style.display = 'none';
        pageContainer.classList.remove('active');
        stickerPicker.classList.remove('active');
        searchChat.classList.remove('active');
        searchChatInput.value = '';
        clearReply();

        loadWallpaper(chatId);

        database.ref('chats/' + chatId).once('value', (snapshot) => {
            if (snapshot.exists()) {
                currentChatData = snapshot.val();
                const isGroup = currentChatData.isGroup || false;

    function loadMessages(chatId, callback) {
        if (messageListener) {
            database.ref('chats/' + currentChatId + '/messages').off();
            messageListener = null;
        }
        const ref = database.ref('chats/' + chatId + '/messages');
        ref.on('value', (snapshot) => {
            callback(snapshot.exists() ? snapshot.val() : {});
        });
        messageListener = ref;
    }

    function markMessagesRead(chatId) {
        if (!currentUser || !chatId) return;
        const chatRef = database.ref('chats/' + chatId + '/messages');
        chatRef.once('value', (snapshot) => {
            if (!snapshot.exists()) return;
            const messages = snapshot.val();
            const updates = {};
            const readByUpdates = {};
            for (let key in messages) {
                const msg = messages[key];
                if (msg.from !== currentUser.username && !msg.read && !msg.deleted) {
                    updates[key + '/read'] = true;
                    readByUpdates[key + '/readBy/' + currentUser.username] = Date.now();
                }
            }
            if (Object.keys(updates).length > 0) {
                chatRef.update(updates);
                chatRef.update(readByUpdates);
            }
        });
    }

    function sendMessageHandler() {
        const text = chatInput.value.trim();
        if (!text || !currentChatId || !currentUser) return;
        
        if (currentChatData && currentChatData.isChannel === true) {
            const isAdmin = currentChatData.admins && currentChatData.admins.includes(currentUser.username);
            const isCreator = currentChatData.creator === currentUser.username;
            if (!isAdmin && !isCreator) {
                showNotification('⛔ Только админы могут писать в канале');
                return;
            }
        }
        
        const msgId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
        const encryptedText = encryptMessage(text);
        const data = {
            text: encryptedText,
            from: currentUser.username,
            time: Date.now(),
            read: false,
            readBy: {},
            encrypted: true
        };
        
        if (replyToMessage) {
            data.replyTo = {
                id: replyToMessage.id,
                from: replyToMessage.data.from,
                text: replyToMessage.data.text || replyToMessage.data.data || 'Сообщение'
            };
            clearReply();
        }
        
        database.ref('chats/' + currentChatId + '/messages/' + msgId).set(data).then(() => {
            chatInput.value = '';
            if (currentOtherUser) {
                database.ref('users/' + currentUser.username + '/typing').set(false);

            loadChatsList();

    voiceBtn.addEventListener('mousedown', function(e) {
        e.preventDefault();
        if (!currentChatId || !currentUser) return;
        
        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
            isRecording = true;
            recordingSeconds = 0;
            audioChunks = [];
            recordedBlob = null;
            voiceControls.classList.add('active');
            voiceTimer.textContent = '00:00';
            voiceBtn.style.display = 'none';
            chatInput.style.display = 'none';
            fileBtn.style.display = 'none';
            chatSendBtn.style.display = 'none';
            stickerBtn.style.display = 'none';
            videoMsgBtn.style.display = 'none';
            
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };
            mediaRecorder.onstop = () => {
                if (audioChunks.length > 0) {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    console.log('✅ Запись создана, размер:', recordedBlob.size, 'байт');
                } else {
                    console.log('❌ Нет данных записи');
                    recordedBlob = null;
                }
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start(100);
            
            recordingInterval = setInterval(() => {
                recordingSeconds++;
                const mins = Math.floor(recordingSeconds / 60);
                const secs = Math.floor(recordingSeconds % 60);
                voiceTimer.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
                
                if (recordingSeconds >= 300) {
                    if (mediaRecorder && isRecording) {
                        mediaRecorder.stop();
                        isRecording = false;
                        clearInterval(recordingInterval);
                    }
                }
            }, 1000);
        }).catch((err) => {
            console.error('Microphone error:', err);
            showError('❌ Нет доступа к микрофону');
        });
    });

    voiceBtn.addEventListener('mouseup', function(e) {

            isRecording = false;
            clearInterval(recordingInterval);
        }
    });

        const typeLabel = isChannel ? 'канала' : 'группы';
        
        const groupName = prompt('Введите название ' + typeLabel + (isChannel ? ' (начинайте с #)' : '') + ':');

        if (!groupName.trim()) {
            showError('Название не может быть пустым');
            return;
        }
        
        const membersInput = prompt('Введите ники участников через запятую (включая вас):');
        if (!membersInput || !membersInput.trim()) return;
        
        const members = membersInput.split(',').map(s => s.trim()).filter(s => s);
        if (members.length < 2) {
            showError('Минимум 2 участника (включая вас)');
            return;
        }
        
        const allMembers = [currentUser.username, ...members.filter(m => m !== currentUser.username)];
        const uniqueMembers = [...new Set(allMembers)];
        
        const checkPromises = uniqueMembers.map(name => checkUserExists(name));
        Promise.all(checkPromises).then((results) => {
            const missing = uniqueMembers.filter((_, i) => !results[i]);
            if (missing.length > 0) {
                showError('Пользователи не найдены: ' + missing.join(', '));
                return;

            const finalName = isChannel ? '#' + groupName.trim() : groupName.trim();
            createGroup(currentUser.username, members, finalName).then((chatId) => {
                showSuccess('🎉 ' + (isChannel ? 'Канал' : 'Группа') + ' "' + groupName.trim() + '" создан' + (isChannel ? 'а' : '') + '!');

    // =============================================

    // =============================================
    async function handleAuth() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) { showError('Заполните все поля'); return; }
        if (username.length < 2) { showError('Ник минимум 2 символа'); return; }
        if (password.length < 4) { showError('Код минимум 4 символа'); return; }

        authBtn.disabled = true;
        authBtn.textContent = 'Загрузка...';

        try {
            const exists = await checkUserExists(username);

            if (isLoginMode) {
                if (!exists) { showError('Пользователь не найден'); authBtn.disabled = false; authBtn.textContent = 'Войти'; return; }
                const correct = await checkPassword(username, password);
                if (!correct) { showError('Неверный пароль'); authBtn.disabled = false; authBtn.textContent = 'Войти'; return; }
                currentUser = { username: username };
                localStorage.setItem('guru_session', username);
                saveSession(username);
                updateOnlineStatus(username, true);
                showSuccess('Добро пожаловать, ' + username + '!');
                showApp(true);
                loadChatsList();
                updateAllAvatars();
                listenForCalls();
                initStickers();
                requestNotificationPermission();
            } else {
                if (exists) { showError('Пользователь уже существует'); authBtn.disabled = false; authBtn.textContent = 'Зарегистрироваться'; return; }
                await registerUser(username, password);
                currentUser = { username: username };
                localStorage.setItem('guru_session', username);
                saveSession(username);
                updateOnlineStatus(username, true);
                showSuccess('Аккаунт создан! Добро пожаловать, ' + username + '!');
                showApp(true);
                loadChatsList();
                updateAllAvatars();
                listenForCalls();
                initStickers();
                requestNotificationPermission();
            }
        } catch (error) {
            showError('Ошибка: ' + error.message);
        }

        authBtn.disabled = false;
        authBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
    }

    authBtn.addEventListener('click', handleAuth);
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAuth(); });

                        updateOnlineStatus(currentUser.username, true);
                    }
                }, 30000);
            }
        } else {
            authContainer.style.display = 'flex';
            chatList.style.display = 'none';
            bottomNav.style.display = 'none';
            searchArea.style.display = 'none';
            pageContainer.classList.remove('active');
            chatWindow.classList.remove('active');
            burgerBtn.classList.add('disabled');
            
            const profile = document.querySelector('.user-profile');
            if (profile) profile.remove();
            menuUsername.textContent = 'Гость';
            menuStatus.textContent = 'Не авторизован';
            menuStatus.className = '';
            menuAvatar.textContent = 'G';
        }
    }

    // =============================================
    //  NAVIGATION
    // =============================================
    document.querySelectorAll('.nav-item').forEach(tab => {
        tab.addEventListener('click', function() {
            if (!currentUser) return;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            const tabName = this.dataset.tab;
            
            if (pageContainer.classList.contains('active')) pageContainer.classList.remove('active');
            chatWindow.classList.remove('active');
            stickerPicker.classList.remove('active');
            searchChat.classList.remove('active');
            
            if (tabName === 'chats') {
                chatList.style.display = 'block';
                searchArea.style.display = 'block';
                bottomNav.style.display = 'flex';
                loadChatsList();
            } else {
                chatList.style.display = 'none';
                searchArea.style.display = 'none';
                showPage(tabName);
            }
        });
    });

    pageBack.addEventListener('click', function() {
        pageContainer.classList.remove('active');
        chatList.style.display = 'block';
        bottomNav.style.display = 'flex';
        searchArea.style.display = 'block';
        currentPage = null;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelector('[data-tab="chats"]').classList.add('active');
        loadChatsList();
    });

    document.querySelectorAll('.side-menu-item').forEach(item => {
        item.addEventListener('click', function() {
            const page = this.dataset.page;
            if (page && currentUser) showPage(page);
        });
    });

    // =============================================
    //  INIT
    // =============================================
    async function initApp() {
        const savedTheme = localStorage.getItem('guru_theme');
        if (savedTheme === 'light') {
            isDarkTheme = false;
            document.body.classList.add('light-theme');
            document.querySelector('.telegram-clone').classList.add('light');
        }

        try {
            const sessionUser = await checkSession();
            if (sessionUser) {
                currentUser = { username: sessionUser };
                showApp(true);
                loadChatsList();
                updateAllAvatars();
                updateOnlineStatus(sessionUser, true);
                listenForCalls();
                initStickers();
                requestNotificationPermission();
            } else {
                showApp(false);
            }
        } catch (error) {
            showApp(false);
        }
    }

    document.addEventListener('DOMContentLoaded', initApp);

    document.addEventListener('click', function(e) {
        if (sideMenu.classList.contains('open')) {
            if (!sideMenu.contains(e.target) && e.target !== burgerBtn && !burgerBtn.contains(e.target)) {
                closeMenu();
            }
        }
        if (messageMenu.classList.contains('active')) {
            if (!messageMenu.contains(e.target)) {
                messageMenu.classList.remove('active');
            }
        }
    });

    window.addEventListener('beforeunload', function() {
        if (currentUser) {
            updateOnlineStatus(currentUser.username, false);
        }
        if (currentCallId) {
            endCall('Звонок завершён');
        }
    });

    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    `;
    document.head.appendChild(style);
    </script>
</body>
</html>
