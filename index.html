        <!-- ===== МОДАЛКА ЗВОНКА ===== -->
        <div class="call-modal" id="callModal">
            <div class="call-modal-box">
                <div class="call-avatar" id="callAvatar">?</div>

                <div class="call-buttons">
                    <button class="call-btn end" id="callEndBtn"><i class="fas fa-phone-slash"></i></button>

                <div class="call-sub">Пока только аудио</div>
            </div>
        </div>

        <!-- Видео для звонков (скрыты) -->
        <video id="localVideo" autoplay muted style="display:none;"></video>
        <video id="remoteVideo" autoplay style="display:none;"></video>
    </div>

    <script>
        // =============================================
        //  ТВОЯ ОСНОВНАЯ ЛОГИКА (ВСЁ КАК БЫЛО)
        // =============================================
        const firebaseConfig = { 
            databaseURL: "https://guromessenger-ef076-default-rtdb.firebaseio.com/",
            storageBucket: "guromessenger-ef076.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();

        // --- Элементы ---
        const burgerBtn = document.getElementById('burgerBtn');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const authContainer = document.getElementById('authContainer');
        const chatList = document.getElementById('chatList');
        const bottomNav = document.getElementById('bottomNav');
        const searchArea = document.getElementById('searchArea');
        const pageContainer = document.getElementById('pageContainer');
        const pageTitle = document.getElementById('pageTitle');
        const pageContent = document.getElementById('pageContent');
        const pageBack = document.getElementById('pageBack');
        const chatItems = document.getElementById('chatItems');
        const emptyChats = document.getElementById('emptyChats');
        const chatWindow = document.getElementById('chatWindow');
        const chatWindowTitle = document.getElementById('chatWindowTitle');
        const chatWindowSubtitle = document.getElementById('chatWindowSubtitle');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatWindowBack = document.getElementById('chatWindowBack');
        const createGroupBtn = document.getElementById('createGroupBtn');
        const chatInfoBtn = document.getElementById('chatInfoBtn');
        const chatDeleteBtn = document.getElementById('chatDeleteBtn');
        const callBtn = document.getElementById('callBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceTimer = document.getElementById('voiceTimer');
        const voiceControls = document.getElementById('voiceControls');
        const voiceCancelBtn = document.getElementById('voiceCancelBtn');
        const voiceSendBtn = document.getElementById('voiceSendBtn');
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('modalBox');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');
        const callModal = document.getElementById('callModal');
        const callAvatar = document.getElementById('callAvatar');
        const callName = document.getElementById('callName');
        const callStatus = document.getElementById('callStatus');
        const callEndBtn = document.getElementById('callEndBtn');
        const callAnswerBtn = document.getElementById('callAnswerBtn');

        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const authBtn = document.getElementById('authBtn');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        const authSwitchLink = document.getElementById('authSwitchLink');

        const menuUsername = document.getElementById('menuUsername');
        const menuStatus = document.getElementById('menuStatus');
        const menuAvatar = document.getElementById('menuAvatar');
        const contactsBadge = document.getElementById('contactsBadge');

        let isLoginMode = true;
        let currentUser = null;
        let currentPage = null;
        let currentChatId = null;
        let isDarkTheme = true;
        let messageListener = null;
        let currentChatData = null;
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingInterval = null;
        let recordingSeconds = 0;
        let recordedBlob = null;
        let typingTimeout = null;
        let typingListener = null;
        let onlineListener = null;

        // --- Звонки (WebRTC) ---
        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let callData = null;
        let isCaller = false;
        let callTimerInterval = null;
        let callSecondsTimer = 0;
        let callStartTime = 0;
        let currentCallId = null;
        let signalRef = null;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // =============================================
        //  ИСПРАВЛЕННЫЕ ФУНКЦИИ ЗВОНКОВ
        // =============================================
        function showCallModal(name, avatar, status, showAnswer = false) {
            callModal.classList.add('active');
            callName.textContent = name || 'Неизвестный';
            callAvatar.textContent = avatar || '?';
            callStatus.textContent = status || 'Соединение...';
            callAnswerBtn.style.display = showAnswer ? 'flex' : 'none';
        }

        function hideCallModal() {
            callModal.classList.remove('active');
            if (callTimerInterval) {
                clearInterval(callTimerInterval);
                callTimerInterval = null;
            }
        }

        function startCallTimer() {
            callSecondsTimer = 0;
            callStartTime = Date.now();
            if (callTimerInterval) clearInterval(callTimerInterval);
            callTimerInterval = setInterval(() => {
                callSecondsTimer++;
                const mins = Math.floor(callSecondsTimer / 60);
                const secs = Math.floor(callSecondsTimer % 60);
                callStatus.textContent = '⏱ ' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }, 1000);
        }

        function saveCallHistory(from, to, duration) {
            const callId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const data = {
                from: from,
                to: to,
                duration: duration,
                time: Date.now(),
                type: 'audio'
            };
            database.ref('calls_history/' + from + '/' + callId).set(data);
            database.ref('calls_history/' + to + '/' + callId).set(data);
        }

        // =============================================
        //  ЗВОНКИ - START CALL (ИСПРАВЛЕНО)
        // =============================================
        async function startCall(targetUser) {
            if (!currentUser) return showNotification('❌ Войдите в аккаунт');
            if (!targetUser) return showNotification('❌ Нет собеседника');

            try {
                // ПОЛУЧАЕМ МИКРОФОН
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                document.getElementById('localVideo').srcObject = localStream;

                showCallModal(targetUser, targetUser.charAt(0).toUpperCase(), '🔄 Вызов...');
                isCaller = true;

                peerConnection = new RTCPeerConnection(rtcConfig);
                
                // ДОБАВЛЯЕМ ЛОКАЛЬНЫЙ АУДИОПОТОК
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                // СЛУШАЕМ УДАЛЁННЫЙ АУДИОПОТОК
                peerConnection.ontrack = (event) => {
                    remoteStream = event.streams[0];
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    // ВОСПРОИЗВОДИМ УДАЛЁННЫЙ ЗВУК
                    if (remoteStream) {
                        const audioEl = new Audio();
                        audioEl.srcObject = remoteStream;
                        audioEl.play().catch(e => console.log('Audio play error:', e));
                    }
                    callStatus.textContent = '🔊 В разговоре';
                    startCallTimer();
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                currentCallId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                signalRef = database.ref('calls/' + currentCallId);
                await signalRef.set({
                    from: currentUser.username,
                    to: targetUser,
                    type: 'offer',
                    sdp: offer,
                    status: 'calling',
                    time: Date.now()
                });

                signalRef.on('value', async (snap) => {
                    const data = snap.val();
                    if (!data) return;

                    if (data.type === 'answer' && peerConnection && isCaller) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                        callStatus.textContent = '🔊 В разговоре';
                        startCallTimer();
                    }

                    if (data.type === 'candidate' && peerConnection) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                        } catch(e) {
                            console.log('Candidate error:', e);
                        }
                    }

                    if (data.status === 'ended' || data.status === 'rejected') {
                        const duration = Math.floor((Date.now() - callStartTime) / 1000);
                        if (duration > 0 && isCaller) {
                            saveCallHistory(currentUser.username, targetUser, duration);
                            showNotification('📞 Звонок: ' + duration + ' сек');
                        }
                        endCall('Звонок завершён');
                    }
                });

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && signalRef) {
                        signalRef.update({
                            type: 'candidate',
                            candidate: event.candidate
                        });
                    }
                };

                callData = { ref: signalRef, callId: currentCallId };

            } catch (e) {
                console.error('Call error:', e);
                showNotification('❌ Ошибка звонка: ' + e.message);
                endCall();
            }
        }

        // =============================================
        //  ЗВОНКИ - ANSWER CALL (ИСПРАВЛЕНО)
        // =============================================
        async function answerCall(callId, ref) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                document.getElementById('localVideo').srcObject = localStream;

                showCallModal('Входящий звонок', '📞', '🔄 Соединение...');

                const snap = await ref.once('value');
                const data = snap.val();
                if (!data || data.type !== 'offer') return;

                isCaller = false;
                peerConnection = new RTCPeerConnection(rtcConfig);
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                peerConnection.ontrack = (event) => {
                    remoteStream = event.streams[0];
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    // ВОСПРОИЗВОДИМ УДАЛЁННЫЙ ЗВУК
                    if (remoteStream) {
                        const audioEl = new Audio();
                        audioEl.srcObject = remoteStream;
                        audioEl.play().catch(e => console.log('Audio play error:', e));
                    }
                    callStatus.textContent = '🔊 В разговоре';
                    startCallTimer();
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                await ref.update({
                    type: 'answer',
                    sdp: answer,
                    status: 'connected'
                });

                ref.on('value', async (snap) => {
                    const d = snap.val();
                    if (!d) return;

                    if (d.type === 'candidate' && peerConnection) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(d.candidate));
                        } catch(e) {
                            console.log('Candidate error:', e);
                        }
                    }

                    if (d.status === 'ended') {
                        const duration = Math.floor((Date.now() - callStartTime) / 1000);
                        if (duration > 0) {
                            saveCallHistory(data.from, currentUser.username, duration);
                            showNotification('📞 Звонок: ' + duration + ' сек');
                        }
                        endCall('Звонок завершён');
                    }
                });

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && ref) {
                        ref.update({
                            type: 'candidate',
                            candidate: event.candidate
                        });
                    }
                };

                signalRef = ref;
                currentCallId = callId;
                callData = { ref: ref, callId: callId };

            } catch (e) {
                console.error('Answer error:', e);
                showNotification('❌ Ошибка ответа: ' + e.message);
                endCall();
            }
        }

        // =============================================
        //  ЗВОНКИ - END CALL (ИСПРАВЛЕНО)
        // =============================================
        function endCall(message = 'Звонок завершён') {
            if (signalRef) {
                signalRef.update({ status: 'ended' });
                signalRef.off();
                signalRef = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (remoteStream) {
                remoteStream.getTracks().forEach(track => track.stop());
                remoteStream = null;
            }
            hideCallModal();
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            if (message) showNotification('📞 ' + message);
            currentCallId = null;
            callData = null;
        }

        // =============================================
        //  ЗВОНКИ - LISTEN FOR CALLS (ИСПРАВЛЕНО)
        // =============================================
        function listenForCalls() {
            if (!currentUser) return;

            const callsRef = database.ref('calls');
            callsRef.orderByChild('to').equalTo(currentUser.username).on('child_added', (snap) => {
                const data = snap.val();
                if (!data || data.status === 'ended' || data.status === 'rejected') return;
                if (data.to !== currentUser.username) return;
                if (currentCallId) return; // Уже в звонке

                showCallModal(data.from, data.from.charAt(0).toUpperCase(), '📞 ' + data.from + ' звонит...', true);

                callAnswerBtn.onclick = async function() {
                    this.style.display = 'none';
                    currentCallId = snap.key;
                    await answerCall(snap.key, snap.ref);
                };

                callEndBtn.onclick = function() {
                    snap.ref.update({ status: 'rejected' });
                    endCall('Вы отклонили звонок');
                };

                // Таймаут если не отвечают
                setTimeout(() => {
                    if (callModal.classList.contains('active') && !callData) {
                        snap.ref.update({ status: 'rejected' });
                        endCall('Звонок не отвечен');
                    }
                }, 30000);
            });
        }

        // --- КНОПКА ЗВОНКА ---
        callBtn?.addEventListener('click', function() {
            if (!currentChatId || !currentUser) {
                showNotification('❌ Откройте чат');
                return;
            }
            if (currentCallId) {
                showNotification('❌ Уже в звонке');
                return;
            }
            
            database.ref('chats/' + currentChatId).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const chat = snapshot.val();
                    const participants = chat.participants || [];
                    const targetUser = participants.find(p => p !== currentUser.username);
                    if (targetUser) {
                        getUserStatus(targetUser).then(status => {
                            if (status.online) {
                                startCall(targetUser);
                            } else {
                                showNotification('❌ Пользователь не в сети');
                            }
                        });
                    } else {
                        showNotification('❌ Нет собеседника');
                    }
                }
            });
        });

        callEndBtn?.addEventListener('click', function() {
            const duration = Math.floor((Date.now() - callStartTime) / 1000);
            if (duration > 0 && callData && callData.ref) {
                callData.ref.once('value', (s) => {
                    const data = s.val();
                    if (data) {
                        saveCallHistory(data.from, data.to, duration);
                        showNotification('📞 Звонок: ' + duration + ' сек');
                    }
                });
            }
            endCall('Звонок завершён');
        });

        function loadUserChats(username) {
            return new Promise((resolve) => {
                database.ref('users/' + username + '/chats').once('value', (snapshot) => {
                    if (!snapshot.exists()) { resolve({}); return; }
                    const chatIds = Object.keys(snapshot.val());
                    if (chatIds.length === 0) { resolve({}); return; }
                    const chatsData = {};
                    let loaded = 0;
                    chatIds.forEach(chatId => {
                        database.ref('chats/' + chatId).once('value', (snap) => {
                            if (snap.exists()) { chatsData[chatId] = snap.val(); }
                            loaded++;
                            if (loaded === chatIds.length) { resolve(chatsData); }
                        });
                    });
                });
            });
        }

        function createPrivateChat(user1, user2) {
            return new Promise((resolve, reject) => {
                const chatId = 'private_' + [user1, user2].sort().join('_');
                database.ref('chats/' + chatId).once('value', (snapshot) => {
                    if (snapshot.exists()) { resolve(chatId); return; }
                    database.ref('chats/' + chatId).set({
                        participants: [user1, user2],
                        created: Date.now(),
                        isGroup: false,
                        messages: {
                            first: { text: 'Чат создан!', from: 'system', time: Date.now(), read: true }
                        }
                    }).then(() => {
                        const updates = {};
                        updates['users/' + user1 + '/chats/' + chatId] = true;
                        updates['users/' + user2 + '/chats/' + chatId] = true;
                        return database.ref().update(updates);
                    }).then(() => { resolve(chatId); }).catch(reject);
                });
            });
        }

        function createGroup(creator, memberNames, groupName) {
            return new Promise((resolve, reject) => {
                const chatId = 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                const allMembers = [creator, ...memberNames.filter(m => m !== creator)];
                const uniqueMembers = [...new Set(allMembers)];
                
                database.ref('chats/' + chatId).set({
                    participants: uniqueMembers,
                    created: Date.now(),
                    isGroup: true,
                    creator: creator,
                    groupName: groupName || 'Группа',
                    messages: {
                        first: { text: '🎉 Группа "' + (groupName || 'Группа') + '" создана!', from: 'system', time: Date.now(), read: true }
                    }
                }).then(() => {
                    const updates = {};
                    uniqueMembers.forEach(user => {
                        updates['users/' + user + '/chats/' + chatId] = true;
                    });
                    return database.ref().update(updates);
                }).then(() => { resolve(chatId); }).catch(reject);
            });
        }

        function addMemberToGroup(groupId, newMember) {
            return new Promise((resolve, reject) => {
                checkUserExists(newMember).then((exists) => {
                    if (!exists) { 
                        reject('❌ Пользователь не найден'); 
                        return; 
                    }
                    database.ref('chats/' + groupId + '/participants').once('value', (snapshot) => {
                        let participants = snapshot.exists() ? snapshot.val() : [];
                        if (participants.includes(newMember)) {
                            reject('❌ Пользователь уже в группе');
                            return;
                        }
                        participants.push(newMember);
                        database.ref('chats/' + groupId + '/participants').set(participants).then(() => {
                            database.ref('users/' + newMember + '/chats/' + groupId).set(true);
                            const msgId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                            database.ref('chats/' + groupId + '/messages/' + msgId).set({
                                text: '👤 ' + newMember + ' присоединился к группе!',
                                from: 'system',
                                time: Date.now(),
                                read: true
                            });
                            resolve('✅ ' + newMember + ' добавлен в группу!');
                        }).catch((err) => reject('❌ Ошибка: ' + err.message));
                    });
                }).catch((err) => reject('❌ Ошибка: ' + err.message));
            });
        }

        function deleteChat(chatId, username) {
            return new Promise((resolve, reject) => {
                database.ref('chats/' + chatId).once('value', (snapshot) => {
                    if (!snapshot.exists()) { reject('Чат не найден'); return; }
                    const chat = snapshot.val();
                    if (!chat.participants.includes(username)) {
                        reject('Вы не участник этого чата');
                        return;
                    }
                    const updates = {};
                    chat.participants.forEach(user => {
                        updates['users/' + user + '/chats/' + chatId] = null;
                    });
                    updates['chats/' + chatId] = null;
                    database.ref().update(updates).then(resolve).catch(reject);
                });
            });
        }

        function getUserStatus(username) {
            return new Promise((resolve) => {
                database.ref('users/' + username).once('value', (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        resolve({
                            online: data.online || false,
                            lastSeen: data.lastSeen || 0
                        });
                    } else {

                    }

            });

        function formatLastSeen(timestamp) {
            if (!timestamp) return 'недавно';
            const now = Date.now();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (seconds < 60) return 'только что';
            if (minutes < 60) return minutes + ' мин. назад';
            if (hours < 24) return hours + ' ч. назад';
            if (days < 7) return days + ' дн. назад';
            return new Date(timestamp).toLocaleDateString();
        }

        // =============================================
        //  АВАТАРКИ (БЕЗ STORAGE)
        // =============================================
        function uploadAvatar(user, file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const base64 = e.target.result;
                        await database.ref('users/' + user + '/avatar').set(base64);
                        resolve(base64);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function getUserAvatar(user) {
            return new Promise((resolve) => {
                database.ref('users/' + user + '/avatar').once('value', (snapshot) => {
                    resolve(snapshot.exists() ? snapshot.val() : null);
                });
            });
        }

        // =============================================
        //  ОТПРАВКА ФОТО/ВИДЕО (БЕЗ STORAGE)
        // =============================================
        function uploadFile(chatId, from, file, type) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    const msgId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                    database.ref('chats/' + chatId + '/messages/' + msgId).set({
                        type: type,
                        data: base64,
                        fileName: file.name,
                        from: from,
                        time: Date.now(),
                        read: false
                    }).then(() => resolve()).catch(reject);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // =============================================
        //  ГОЛОСОВЫЕ СООБЩЕНИЯ (ИСПРАВЛЕНО)
        // =============================================
        function sendVoiceMessage(chatId, from, audioBlob, duration) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    const msgId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                    database.ref('chats/' + chatId + '/messages/' + msgId).set({
                        type: 'voice',
                        data: base64,
                        duration: duration,
                        from: from,
                        time: Date.now(),
                        read: false
                    }).then(() => resolve()).catch(reject);
                };
                reader.onerror = reject;
                reader.readAsDataURL(audioBlob);
            });
        }

        function playVoice(base64, element) {
            const audio = new Audio(base64);
            audio.play().catch(e => console.log('Play error:', e));
            const progress = element.querySelector('.fill');
            const durationEl = element.querySelector('.voice-duration');
            
            audio.addEventListener('timeupdate', () => {
                if (progress && audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progress.style.width = Math.min(percent, 100) + '%';
                }
                if (durationEl && audio.duration) {
                    const left = Math.floor(audio.duration - audio.currentTime);
                    const mins = Math.floor(left / 60);
                    const secs = Math.floor(left % 60);
                    durationEl.textContent = mins + ':' + String(secs).padStart(2, '0');
                }
            });
            
            audio.addEventListener('ended', () => {
                if (progress) progress.style.width = '0%';
                if (durationEl) {
                    const total = Math.floor(audio.duration || 0);
                    const mins = Math.floor(total / 60);
                    const secs = Math.floor(total % 60);
                    durationEl.textContent = mins + ':' + String(secs).padStart(2, '0');
                }
                const playBtn = element.querySelector('.play-btn');
                if (playBtn) playBtn.innerHTML = '<i class="fas fa-play"></i>';
            });
            
            return audio;
        }
