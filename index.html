        createGroupBtn.addEventListener('click', function() {
            const name = groupNameInput.value.trim();
            if (!name) return alert('Введи название группы!');
            const groupId = 'g_' + Date.now();
            const members = {};
            members[myCode] = true;

            db.ref('users/' + myCode + '/contacts').once('value').then(contactsSnap => {
                const contacts = contactsSnap.val() || {};
                let blocked = [];
                const promises = [];
                for (let code in contacts) {
                    if (isBlocked(code)) continue;
                    promises.push(
                        db.ref('users/' + code + '/privacy/groups').once('value').then(snap => {
                            const privacyGroups = snap.val() !== false;
                            if (!privacyGroups) {
                                blocked.push(code);
                            } else {
                                members[code] = true;
                            }
                        })
                    );
                }
                Promise.all(promises).then(() => {
                    if (blocked.length > 0) {
                        alert('❌ Некоторые контакты запретили добавление в группы: ' + blocked.join(', '));
                    }
                    if (Object.keys(members).length < 2) {
                        alert('❌ Нет контактов, разрешающих добавление в группы!');
                        return;
                    }
                    db.ref('groups/' + groupId).set({
                        name: name,
                        members: members,
                        createdBy: myCode,
                        createdAt: Date.now()
                    }).then(() => {
                        for (let code in members) {
                            db.ref('users/' + code + '/groups/' + groupId).set(true);
                        }
                        groupNameInput.value = '';
                        loadGroups();
                        alert('✅ Группа создана!');
                    });
                });
            });
        });

        // =========================================================
        // 25. КОНТАКТЫ
        // =========================================================
        const contactSearch = document.getElementById('contactSearch');
        const addContactBtn = document.getElementById('addContactBtn');
        const contactList = document.getElementById('contactList');

        function loadContacts() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                contactList.innerHTML = '';
                for (let code in contacts) {
                    if (isBlocked(code)) continue;
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    db.ref('users/' + code).once('value').then(userSnap => {
                        const userData = userSnap.val() || {};
                        const avatarHtml = userData.avatar ? `<img src="${userData.avatar}" class="avatar-small" />` :
                            '';
                        const isOnline = userData.online === true;
                        const privacy = userData.privacy || {};
                        let statusText = isOnline ? '🟢 Онлайн' : 'был(а) недавно';
                        if (privacy.online === true && code !== myCode) {
                            statusText = 'скрыт';
                        }
                        div.innerHTML = `
                            ${avatarHtml} ${userData.username || code}
                            <span class="last-seen">${statusText}</span>
                        `;
                    });
                    contactList.appendChild(div);
                }
                if (contactList.children.length === 0) {
                    contactList.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Нет контактов</div>';
                }
            }).catch(err => console.error('Ошибка загрузки контактов:', err));
        }

        addContactBtn.addEventListener('click', function() {
            const query = contactSearch.value.trim();
            if (!query) return alert('Введи код или username!');
            if (query === myCode) return alert('Это ты!');

            db.ref('users/' + query).once('value').then(snap => {
                if (snap.exists()) {
                    addContact(query);
                    return;
                }
                db.ref('users').orderByChild('username').equalTo(query).once('value').then(snap => {
                    if (snap.exists()) {
                        let found = false;
                        snap.forEach(child => {
                            if (child.key !== myCode) {
                                addContact(child.key);
                                found = true;
                            }
                        });
                        if (!found) alert('❌ Пользователь не найден!');
                    } else {
                        alert('❌ Пользователь не найден!');
                    }
                });
            });
        });

        function addContact(code) {
            db.ref('users/' + myCode + '/contacts/' + code).set(true);
            contactSearch.value = '';
            loadContacts();
            alert('✅ Контакт добавлен!');
        }

        // =========================================================
        // 26. ПОИСК ПО ЧАТАМ
        // =========================================================
        chatSearch.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            const items = chatList.querySelectorAll('.contact-item');
            items.forEach(item => {

        // =========================================================
        // 27. РЕАКЦИИ
        // =========================================================
        const reactionPanel = document.getElementById('reactionPanel');

        document.addEventListener('contextmenu', function(e) {
            const msgDiv = e.target.closest('.msg');
            if (!msgDiv) return;
            const key = msgDiv.dataset.key;
            const chatId = msgDiv.dataset.chatId;
            if (!key || !chatId) return;
            e.preventDefault();
            showReactionPanel(e.clientX, e.clientY, key, chatId);
        });

        let longPressTimer = null;
        document.addEventListener('touchstart', function(e) {
            const msgDiv = e.target.closest('.msg');
            if (!msgDiv) return;
            const key = msgDiv.dataset.key;
            const chatId = msgDiv.dataset.chatId;
            if (!key || !chatId) return;
            longPressTimer = setTimeout(() => {
                const touch = e.touches[0];
                showReactionPanel(touch.clientX, touch.clientY, key, chatId);
            }, 600);
        });
        document.addEventListener('touchend', function() {
            clearTimeout(longPressTimer);
        });
        document.addEventListener('touchmove', function() {
            clearTimeout(longPressTimer);
        });

        function showReactionPanel(x, y, key, chatId) {
            selectedMessageKey = key;
            selectedChatId = chatId;
            reactionPanel.style.left = (x - 80) + 'px';
            reactionPanel.style.top = (y - 60) + 'px';
            reactionPanel.classList.add('active');
            clearTimeout(window.reactionTimeout);
            window.reactionTimeout = setTimeout(() => {
                reactionPanel.classList.remove('active');
            }, 5000);
        }

        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const emoji = this.dataset.emoji;
                if (!selectedMessageKey || !selectedChatId) return;
                addReaction(selectedChatId, selectedMessageKey, emoji);
                reactionPanel.classList.remove('active');
                selectedMessageKey = null;
                selectedChatId = null;
            });
        });

        document.addEventListener('click', function(e) {
            if (!reactionPanel.contains(e.target)) {
                reactionPanel.classList.remove('active');
            }
        });

        function addReaction(chatId, messageKey, emoji) {
            const ref = db.ref('chats/' + chatId + '/' + messageKey + '/reactions/' + myCode);
            ref.once('value').then(snap => {
                if (snap.exists() && snap.val() === emoji) {
                    ref.remove();
                } else {
                    ref.set(emoji);
                }
            });
        }

        // =========================================================
        // 28. РАБОТА С СООБЩЕНИЯМИ (УДАЛЕНИЕ, РЕДАКТИРОВАНИЕ, ПЕРЕСЫЛКА, ОТВЕТ, ЗАКРЕП)
        // =========================================================
        function getChatRef(chatId) {
            if (currentChat.type === 'user') {
                return db.ref('chats/' + chatId);
            } else {
                return db.ref('groups/' + chatId);
            }
        }

        function deleteMessage(chatId, messageKey, forAll) {
            if (!confirm('Удалить сообщение' + (forAll ? ' для всех?' : '?'))) return;
            if (forAll) {
                // Удаляем у всех
                getChatRef(chatId).child(messageKey).remove();
            } else {
                // Удаляем только у себя — помечаем как удаленное
                getChatRef(chatId).child(messageKey).update({
                    deletedForMe: true
                });
            }
        }

        function editMessage(chatId, messageKey, text) {
            const newText = prompt('Редактировать сообщение:', text);
            if (newText === null || newText.trim() === '') return;
            getChatRef(chatId).child(messageKey).update({
                text: newText.trim(),
                edited: true,
                editTime: Date.now()
            });
        }

        function forwardMessage(chatId, messageKey, data) {
            // Показываем список контактов для пересылки
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                const contactList = Object.keys(contacts);
                if (contactList.length === 0) {
                    alert('Нет контактов для пересылки!');
                    return;
                }
                const target = prompt('Введи код контакта для пересылки:\n' + contactList.join(', '));
                if (!target) return;
                if (!contacts[target]) {
                    alert('❌ Контакт не найден!');
                    return;
                }
                const chatIdTarget = getChatId(myCode, target);
                const ref = db.ref('chats/' + chatIdTarget).push();
                const msgData = {
                    from: myCode,
                    to: target,
                    text: data.text || 'Пересланное сообщение',
                    time: Date.now(),
                    read: false,
                    delivered: true,
                    type: 'forwarded',
                    forwardedFrom: data.from,
                    originalText: data.text || 'Сообщение'
                };
                if (data.fileUrl) {
                    msgData.fileUrl = data.fileUrl;
                    msgData.type = data.type || 'file';
                }
                ref.set(msgData);
                alert('✅ Сообщение переслано!');
            });
        }

        function replyToMessage(chatId, messageKey, data) {
            replyTo = messageKey;
            msgInput.placeholder = 'Ответ на сообщение...';
            msgInput.focus();
            // Подсвечиваем сообщение, на которое отвечаем
            const msgDiv = document.querySelector(`.msg[data-key="${messageKey}"]`);
            if (msgDiv) {
                msgDiv.style.border = '2px solid #ffd200';
                setTimeout(() => {
                    msgDiv.style.border = 'none';
                }, 3000);
            }
        }

        function copyMessage(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Сообщение скопировано!');
            }).catch(() => {
                alert('❌ Не удалось скопировать');
            });
        }

        function exportChat(chatId) {
            getChatRef(chatId).orderByChild('time').once('value').then(snap => {
                const messages = snap.val() || {};
                let text = '📄 Экспорт чата GURU\n';
                text += '='.repeat(40) + '\n';
                for (let key in messages) {
                    const msg = messages[key];
                    if (msg.deletedForMe) continue;
                    const date = new Date(msg.time);
                    const timeStr = date.toLocaleString();
                    text += `[${timeStr}] ${msg.from}: ${msg.text || 'Файл'}\n`;
                }
                text += '='.repeat(40) + '\n';
                // Скачиваем файл
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'chat_export.txt';
                a.click();
                URL.revokeObjectURL(url);
                alert('✅ Чат экспортирован!');
            });
        }

        function pinMessage(chatId, messageKey, data) {
            getChatRef(chatId).child('pin').set({
                key: messageKey,
                text: data.text || 'Сообщение',
                from: data.from,
                time: Date.now()
            });
            alert('📌 Сообщение закреплено!');
        }

        function removePin(chatId) {
            getChatRef(chatId).child('pin').remove();
            pinMessageDiv.style.display = 'none';
            alert('📌 Закрепление удалено');
        }

        function removePinGroup(groupId) {
            db.ref('groups/' + groupId + '/pin').remove();
            pinGroupMessageDiv.style.display = 'none';
            alert('📌 Закрепление удалено');
        }

        // =========================================================
        // 29. ОТРИСОВКА СООБЩЕНИЙ
        // =========================================================
        function renderMessage(container, data, myCode) {
            if (data.deletedForMe) return;
            const div = document.createElement('div');
            div.className = 'msg';
            div.dataset.key = data._key || '';
            div.dataset.chatId = data._chatId || '';
            const isMy = data.from === myCode;
            if (isMy) div.classList.add('my');

            // Действия над сообщением (хэвер)
            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            if (!data.deleted) {
                actions.innerHTML = `
                    <button class="reply-btn" title="Ответить">↩️</button>
                    <button class="forward-btn" title="Переслать">➡️</button>
                    ${isMy ? `<button class="edit-btn" title="Редактировать">✏️</button>` : ''}
                    ${isMy ? `<button class="delete-btn" title="Удалить у себя">🗑️</button>` : ''}
                    ${isMy ? `<button class="delete-btn" title="Удалить для всех" data-forall="true">💥</button>` : ''}
                    <button class="pin-btn" title="Закрепить">📌</button>
                    <button class="copy-btn" title="Копировать">📋</button>
                    <button class="export-btn" title="Экспорт чата">📄</button>
                `;
                // Обработчики для действий
                actions.querySelector('.reply-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    replyToMessage(data._chatId, data._key, data);
                });
                actions.querySelector('.forward-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    forwardMessage(data._chatId, data._key, data);
                });
                if (isMy) {
                    actions.querySelector('.edit-btn').addEventListener('click', function(e) {
                        e.stopPropagation();
                        editMessage(data._chatId, data._key, data.text);
                    });
                    actions.querySelector('.delete-btn:not([data-forall])').addEventListener('click', function(e) {
                        e.stopPropagation();
                        deleteMessage(data._chatId, data._key, false);
                    });
                    actions.querySelector('.delete-btn[data-forall]').addEventListener('click', function(e) {
                        e.stopPropagation();
                        deleteMessage(data._chatId, data._key, true);
                    });
                }
                actions.querySelector('.pin-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    pinMessage(data._chatId, data._key, data);
                });
                actions.querySelector('.copy-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    copyMessage(data.text || '');
                });
                actions.querySelector('.export-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    exportChat(data._chatId);
                });
            }
            div.appendChild(actions);

            // Переслано
            if (data.type === 'forwarded' || data.forwardedFrom) {
                const forwarded = document.createElement('div');
                forwarded.className = 'forwarded';
                forwarded.textContent = '📩 Переслано от ' + (data.forwardedFrom || 'неизвестного');
                div.appendChild(forwarded);
                if (data.originalText) {
                    data.text = data.originalText;
                }
            }

            // Ответ на сообщение
            if (data.replyTo && data.replyText) {
                const replyDiv = document.createElement('div');
                replyDiv.className = 'reply-to';
                replyDiv.textContent = '↩️ ' + (data.replyFrom || '') + ': ' + (data.replyText || 'Сообщение');
                div.appendChild(replyDiv);
            }

            // Отправитель (для групп)
            if (data.from && data.from !== myCode) {
                const userSpan = document.createElement('span');
                userSpan.className = 'user';
                db.ref('users/' + data.from + '/username').once('value').then(snap => {
                    userSpan.textContent = (snap.val() || data.from) + ':';
                });
                div.appendChild(userSpan);
            }

            // Текст
            if (data.text && data.type !== 'contact') {
                const textSpan = document.createElement('span');
                textSpan.textContent = data.text;
                div.appendChild(textSpan);
            }

            // Контакт
            if (data.type === 'contact' && data.contactCode) {
                const contactDiv = document.createElement('div');
                contactDiv.className = 'contact-card';
                db.ref('users/' + data.contactCode + '/avatar').once('value').then(snap => {
                    const avatar = snap.val();
                    contactDiv.innerHTML = `
                        ${avatar ? `<img src="${avatar}" class="avatar-small" />` : '👤'}
                        <span class="contact-name">${data.contactName || data.contactCode}</span>
                        <span class="contact-code">${data.contactCode}</span>
                        <button onclick="addContact('${data.contactCode}')" style="background:#4caf50;border:none;color:#fff;padding:2px 8px;border-radius:8px;cursor:pointer;">➕</button>
                    `;
                });
                div.appendChild(contactDiv);
            }

            // Файлы
            if (data.fileUrl) {
                if (data.type === 'image') {
                    const img = document.createElement('img');
                    img.src = data.fileUrl;
                    img.loading = 'lazy';
                    img.style.cursor = 'pointer';
                    img.onclick = function() {
                        window.open(data.fileUrl, '_blank');
                    };
                    div.appendChild(img);
                } else if (data.type === 'video') {
                    const video = document.createElement('video');
                    video.src = data.fileUrl;
                    video.controls = true;
                    video.preload = 'metadata';
                    video.style.maxWidth = '200px';
                    div.appendChild(video);
                } else if (data.type === 'video_circle') {
                    const video = document.createElement('video');
                    video.src = data.fileUrl;
                    video.className = 'video-circle';
                    video.controls = false;
                    video.preload = 'metadata';
                    video.muted = true;
                    video.loop = true;
                    video.playsinline = true;
                    video.onclick = function() {
                        if (video.paused) {
                            video.play();
                            video.muted = false;
                        } else {
                            video.pause();
                            video.muted = true;
                        }
                    };
                    div.appendChild(video);
                } else if (data.type === 'audio') {
                    const audio = document.createElement('audio');
                    audio.src = data.fileUrl;
                    audio.controls = true;
                    div.appendChild(audio);
                } else {
                    const link = document.createElement('a');
                    link.href = data.fileUrl;
                    link.textContent = '📎 ' + data.text;
                    link.target = '_blank';
                    div.appendChild(link);
                }
            }

            // Время
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            if (data.time) {
                const date = new Date(data.time);
                timeSpan.textContent = date.getHours().toString().padStart(2, '0') + ':' +
                    date.getMinutes().toString().padStart(2, '0');
            }
            div.appendChild(timeSpan);

            // Редактировано
            if (data.edited) {
                const editedSpan = document.createElement('span');
                editedSpan.className = 'edited';
                editedSpan.textContent = '(ред.)';
                div.appendChild(editedSpan);
            }

            // Закреплено
            if (data.pinned) {
                const pinnedSpan = document.createElement('span');
                pinnedSpan.className = 'pinned';
                pinnedSpan.textContent = '📌 Закреплено';
                div.appendChild(pinnedSpan);
            }

            // Статусы
            if (data.from === myCode && data.to) {
                const statusSpan = document.createElement('span');
                statusSpan.className = 'status';
                if (data.read) {
                    statusSpan.classList.add('read');
                    statusSpan.textContent = '✅✅';
                } else {
                    statusSpan.classList.add('delivered');
                    statusSpan.textContent = '✅';
                }
                div.appendChild(statusSpan);
            }

            if (data.from === myCode && data.readBy) {
                const statusSpan = document.createElement('span');
                statusSpan.className = 'status';
                const readers = Object.keys(data.readBy || {});
                if (readers.length > 1) {
                    statusSpan.classList.add('read');
                    statusSpan.textContent = '✅✅';
                } else {
                    statusSpan.classList.add('delivered');
                    statusSpan.textContent = '✅';
                }
                div.appendChild(statusSpan);
            }

            // Реакции
            if (data.reactions && Object.keys(data.reactions).length > 0) {
                const reactionsDiv = document.createElement('div');
                reactionsDiv.className = 'reactions';
                const counts = {};
                for (let user in data.reactions) {
                    const emoji = data.reactions[user];
                    counts[emoji] = (counts[emoji] || 0) + 1;
                }
                for (let emoji in counts) {
                    const item = document.createElement('span');
                    item.className = 'reaction-item';
                    item.innerHTML = `${emoji} <span class="count">${counts[emoji]}</span>`;
                    reactionsDiv.appendChild(item);
                }
                div.appendChild(reactionsDiv);
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // =========================================================
        // 30. ЗАГРУЗКА ФАЙЛОВ
        // =========================================================
        async function uploadFile(file) {
            const path = 'files/' + Date.now() + '_' + file.name;
            const ref = storage.ref(path);
            await ref.put(file);
            return await ref.getDownloadURL();
        }

        // =========================================================
        // 31. ИНИЦИАЛИЗАЦИЯ (ДОБАВЛЯЕМ НЕДОСТАЮЩИЕ ЭЛЕМЕНТЫ)
        // =========================================================
        console.log('🔥 GURU запущен! Код: ' + myCode);
        // Добавляем недостающие элементы в DOM для групп
        if (!document.getElementById('groupShareContactBtn')) {
            const btn = document.createElement('button');
            btn.id = 'groupShareContactBtn';
            btn.textContent = '📇';
            document.getElementById('bottomGroup').appendChild(btn);
        }
        if (!document.getElementById('pinGroupMessage')) {
            const div = document.createElement('div');
            div.id = 'pinGroupMessage';
            document.getElementById('groupView').insertBefore(div, document.getElementById('groupMessages'));
        }
    </script>
</body>
