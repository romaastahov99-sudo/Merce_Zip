<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GURU — с Firebase</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .telegram-clone {
            max-width: 430px;
            width: 100%;
            height: 800px;
            background: #0f0f0f;
            border-radius: 28px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.95), 0 0 0 1px rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .guru-header {
            background: #1f1f1f;
            padding: 12px 18px 8px 18px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .burger-btn {
            font-size: 22px;
            color: #d4d4d4;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px;
            background: none;
            border: none;
        }

        .burger-btn:hover {
            color: #ffffff;
        }

        .burger-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .guru-brand {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .guru-brand .name {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.2px;
        }

        .guru-brand .badge {
            font-size: 12px;
            font-weight: 600;
            background: #2b6b9c;
            color: white;
            padding: 0 8px;
            border-radius: 14px;
            line-height: 18px;
            margin-left: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header-right i {
            font-size: 20px;
            color: #b0b0b0;
            cursor: pointer;
            transition: 0.2s;
        }

        .header-right i:hover {
            color: #ffffff;
        }

        /* ===== БОКОВОЕ МЕНЮ ===== */
        .side-menu {
            position: absolute;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            background: #1a1a1a;
            z-index: 100;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .side-menu.open {
            left: 0;
        }

        .side-menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
            display: none;
            cursor: pointer;
        }

        .side-menu-overlay.active {
            display: block;
        }

        .side-menu-header {
            padding: 30px 20px 20px 20px;
            border-bottom: 1px solid #2a2a2a;
            background: #1f1f1f;
        }

        .side-menu-user {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .side-menu-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #2b6b9c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
        }

        .side-menu-user-info {
            flex: 1;
        }

        .side-menu-user-info .name {
            font-size: 18px;
            font-weight: 600;
            color: #f0f0f0;
        }

        .side-menu-user-info .status {
            font-size: 13px;
            color: #6a6a6a;
        }

        .side-menu-items {
            padding: 12px 0;
            flex: 1;
        }

        .side-menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            color: #d4d4d4;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 15px;
        }

        .side-menu-item:hover {
            background: #252525;
            color: #ffffff;
        }

        .side-menu-item i {
            width: 24px;
            font-size: 18px;
            color: #8e8e8e;
        }

        .side-menu-item:hover i {
            color: #ffffff;
        }

        .side-menu-item .badge {
            margin-left: auto;
            background: #2b6b9c;
            color: white;
            font-size: 12px;
            padding: 0 10px;
            border-radius: 12px;
            line-height: 20px;
        }

        .side-menu-divider {
            height: 1px;
            background: #2a2a2a;
            margin: 8px 20px;
        }

        .side-menu-footer {
            padding: 16px 20px;
            border-top: 1px solid #2a2a2a;
            color: #6a6a6a;
            font-size: 13px;
        }

        /* ===== СТРОКА ПОИСКА ===== */
        .search-area {
            background: #1f1f1f;
            padding: 4px 16px 12px 16px;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .search-box {
            background: #2b2b2b;
            border-radius: 24px;
            padding: 9px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8e8e8e;
        }

        .search-box i {
            font-size: 16px;
            color: #8e8e8e;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #eaeaea;
            font-size: 16px;
            width: 100%;
        }

        .search-box input::placeholder {
            color: #6a6a6a;
            font-weight: 400;
        }

        /* ===== ФОРМА РЕГИСТРАЦИИ ===== */
        .auth-container {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            background: #0f0f0f;
        }

        .auth-container .logo {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .auth-container .logo span {
            color: #2b6b9c;
        }

        .auth-container .subtitle {
            color: #6a6a6a;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .auth-form {
            width: 100%;
            max-width: 340px;
        }

        .auth-form .input-group {
            margin-bottom: 16px;
        }

        .auth-form .input-group label {
            display: block;
            color: #a0a0a0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .auth-form .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #1f1f1f;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: #eaeaea;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        .auth-form .input-group input:focus {
            border-color: #2b6b9c;
        }

        .auth-form .input-group input::placeholder {
            color: #555;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #2b6b9c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .auth-btn:hover {
            background: #1f5a85;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-switch {
            margin-top: 20px;
            color: #6a6a6a;
            font-size: 14px;
            text-align: center;
        }

        .auth-switch a {
            color: #2b6b9c;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .auth-error {
            background: #3a1a1a;
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #5a2a2a;
        }

        .auth-success {
            background: #1a3a1a;
            color: #6bff6b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #2a5a2a;
        }

        /* ===== СПИСОК ЧАТОВ ===== */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 2px 0 8px 0;
            background: #0f0f0f;
            display: none;
        }

        .chat-list::-webkit-scrollbar {
            width: 4px;
        }
        .chat-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-list::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 8px 18px 8px 16px;
            transition: background 0.08s ease;
            cursor: pointer;
            border-bottom: 1px solid #181818;
        }

        .chat-item:hover {
            background: #181818;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 500;
            color: white;
            flex-shrink: 0;
            margin-right: 14px;
            text-transform: uppercase;
        }

        .avatar-1 { background: #2b6b9c; }
        .avatar-2 { background: #8e5ea6; }
        .avatar-3 { background: #4f8b4f; }
        .avatar-4 { background: #b35e5e; }
        .avatar-5 { background: #b98a4b; }
        .avatar-6 { background: #5f7f9c; }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .chat-name .name {
            font-size: 16px;
            font-weight: 500;
            color: #f0f0f0;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-name .time {
            font-size: 13px;
            color: #6a6a6a;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .chat-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-preview .message {
            font-size: 15px;
            color: #a0a0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        .chat-preview .badge-unread {
            background: #2b6b9c;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 0 8px;
            border-radius: 12px;
            line-height: 20px;
            min-width: 20px;
            text-align: center;
            flex-shrink: 0;
            margin-left: 6px;
        }

        .chat-divider {
            padding: 12px 18px 4px 18px;
            font-size: 13px;
            font-weight: 500;
            color: #6a6a6a;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #181818;
            background: #0f0f0f;
        }

        .empty-chats {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6a6a6a;
            text-align: center;
            padding: 40px 20px;
        }

        .empty-chats i {
            font-size: 56px;
            color: #2b2b2b;
            margin-bottom: 16px;
        }

        .empty-chats h3 {
            font-size: 18px;
            font-weight: 500;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .empty-chats p {
            font-size: 14px;
            color: #6a6a6a;
            max-width: 260px;
        }

        /* ===== НИЖНЯЯ ПАНЕЛЬ ===== */
        .bottom-nav {
            background: #1f1f1f;
            border-top: 1px solid #2a2a2a;
            display: none;
            justify-content: space-around;
            padding: 8px 0 12px 0;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #6a6a6a;
            font-size: 11px;
            transition: color 0.1s;
            cursor: pointer;
            gap: 1px;
            background: none;
            border: none;
            padding: 4px 12px;
        }

        .nav-item i {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #2b6b9c;
        }
        .nav-item.active i {
            color: #2b6b9c;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1px;
        }

        /* ===== СТРАНИЦЫ ===== */
        .page-container {
            flex: 1;
            display: none;
            flex-direction: column;
            background: #0f0f0f;
            padding: 20px;
            overflow-y: auto;
        }

        .page-container.active {
            display: flex;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: #f0f0f0;
            margin-bottom: 20px;
        }

        .page-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            background: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 8px;
            color: #d4d4d4;
            cursor: pointer;
            transition: 0.15s;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 15px;
        }

        .page-item:hover {
            background: #252525;
        }

        .page-item i {
            font-size: 20px;
            color: #8e8e8e;
            width: 28px;
        }

        .page-item .arrow {
            margin-left: auto;
            color: #4a4a4a;
        }

        .page-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #2b6b9c;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 15px;
            background: none;
            border: none;
            padding: 4px 0;
        }

        .page-back:hover {
            color: #4a8bc4;
        }

        /* ===== ПРОФИЛЬ ===== */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }

        .user-profile .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2b6b9c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
        }

        .user-profile .username {
            color: #eaeaea;
            font-size: 15px;
            font-weight: 500;
        }

        .user-profile .logout-btn {
            color: #6a6a6a;
            font-size: 13px;
            cursor: pointer;
            margin-left: 4px;
            padding: 4px 10px;
            border-radius: 8px;
            background: #1f1f1f;
            border: 1px solid #2a2a2a;
            transition: 0.2s;
        }

        .user-profile .logout-btn:hover {
            background: #2a2a2a;
            color: #eaeaea;
        }

        @media (max-width: 460px) {
            body { padding: 0; }
            .telegram-clone {
                border-radius: 0;
                height: 100vh;
                max-width: 100%;
            }
            .side-menu {
                width: 280px;
                left: -300px;
            }
        }
    </style>
</head>
<body>
    <div class="telegram-clone" id="app">

        <!-- ===== БОКОВОЕ МЕНЮ ===== -->
        <div class="side-menu-overlay" id="menuOverlay"></div>
        <div class="side-menu" id="sideMenu">
            <div class="side-menu-header">
                <div class="side-menu-user">
                    <div class="side-menu-avatar" id="menuAvatar">G</div>
                    <div class="side-menu-user-info">
                        <div class="name" id="menuUsername">Гость</div>
                        <div class="status" id="menuStatus">Не авторизован</div>
                    </div>
                </div>
            </div>
            <div class="side-menu-items">
                <button class="side-menu-item" data-page="profile">
                    <i class="fas fa-user"></i> Мой профиль
                </button>
                <button class="side-menu-item" data-page="contacts">
                    <i class="fas fa-address-book"></i> Контакты
                    <span class="badge" id="contactsBadge">0</span>
                </button>
                <button class="side-menu-item" data-page="calls">
                    <i class="fas fa-phone"></i> Звонки
                </button>
                <button class="side-menu-item" data-page="channels">
                    <i class="fas fa-broadcast"></i> Каналы
                </button>
                <button class="side-menu-item" data-page="saved">
                    <i class="fas fa-bookmark"></i> Сохранённое
                </button>
                <div class="side-menu-divider"></div>
                <button class="side-menu-item" data-page="settings">
                    <i class="fas fa-cog"></i> Настройки
                </button>
                <button class="side-menu-item" data-page="faq">
                    <i class="fas fa-question-circle"></i> Вопросы
                </button>
            </div>
            <div class="side-menu-footer">
                GURU v1.0 • Firebase
            </div>
        </div>

        <!-- ===== ШАПКА ===== -->
        <div class="guru-header">
            <div class="header-left">
                <button class="burger-btn disabled" id="burgerBtn">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="guru-brand">
                    <span class="name">GURU</span>
                    <span class="badge">✦</span>
                </div>
            </div>
            <div class="header-right" id="headerRight">
                <i class="fas fa-search" id="searchIcon"></i>
                <i class="fas fa-ellipsis-v" id="moreIcon"></i>
            </div>
        </div>

        <!-- ===== ПОИСК ===== -->
        <div class="search-area" id="searchArea">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Поиск" id="searchInput">
            </div>
        </div>

        <!-- ===== ФОРМА РЕГИСТРАЦИИ/ВХОДА ===== -->
        <div class="auth-container" id="authContainer">
            <div class="logo">GURU<span>.</span></div>
            <div class="subtitle">Войдите или создайте аккаунт</div>
            
            <div class="auth-form" id="authForm">
                <div id="authError" class="auth-error"></div>
                <div id="authSuccess" class="auth-success"></div>
                
                <div class="input-group">
                    <label>👤 Никнейм</label>
                    <input type="text" id="usernameInput" placeholder="Придумайте ник" autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label>🔐 Код-пароль</label>
                    <input type="password" id="passwordInput" placeholder="Придумайте код" autocomplete="new-password">
                </div>
                
                <button class="auth-btn" id="authBtn">Войти / Зарегистрироваться</button>
                
                <div class="auth-switch">
                    <span id="authSwitchText">Нет аккаунта? <a id="authSwitchLink">Создать</a></span>
                </div>
            </div>
        </div>

        <!-- ===== СПИСОК ЧАТОВ ===== -->
        <div class="chat-list" id="chatList">
            <div class="empty-chats" id="emptyChats">
                <i class="fas fa-comments"></i>
                <h3>Нет чатов</h3>
                <p>Здесь будут ваши диалоги. Начните общение или создайте новый чат.</p>
            </div>
            <div id="chatItems"></div>
        </div>

        <!-- ===== СТРАНИЦЫ ===== -->
        <div class="page-container" id="pageContainer">
            <button class="page-back" id="pageBack">
                <i class="fas fa-arrow-left"></i> Назад
            </button>
            <div class="page-title" id="pageTitle">Страница</div>
            <div id="pageContent"></div>
        </div>

        <!-- ===== НИЖНЯЯ ПАНЕЛЬ ===== -->
        <div class="bottom-nav" id="bottomNav">
            <button class="nav-item active" data-tab="chats">
                <i class="fas fa-comment-dots"></i>
                <span>Чаты</span>
            </button>
            <button class="nav-item" data-tab="contacts">
                <i class="fas fa-users"></i>
                <span>Контакты</span>
            </button>
            <button class="nav-item" data-tab="calls">
                <i class="fas fa-phone-alt"></i>
                <span>Звонки</span>
            </button>
            <button class="nav-item" data-tab="settings">
                <i class="fas fa-cog"></i>
                <span>Настройки</span>
            </button>
        </div>

    </div>

    <script>
        // =============================================
        //  ⚠️ ТВОЯ КОНФИГУРАЦИЯ FIREBASE ⚠️
        // =============================================
        const firebaseConfig = {
            databaseURL: "https://guromessenger-ef076-default-rtdb.firebaseio.com/"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // =============================================
        //  ОСТАЛЬНОЙ КОД
        // =============================================

        // --- Элементы ---
        const burgerBtn = document.getElementById('burgerBtn');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const authContainer = document.getElementById('authContainer');
        const chatList = document.getElementById('chatList');
        const bottomNav = document.getElementById('bottomNav');
        const searchArea = document.getElementById('searchArea');
        const pageContainer = document.getElementById('pageContainer');
        const pageTitle = document.getElementById('pageTitle');
        const pageContent = document.getElementById('pageContent');
        const pageBack = document.getElementById('pageBack');
        const chatItems = document.getElementById('chatItems');
        const emptyChats = document.getElementById('emptyChats');

        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const authBtn = document.getElementById('authBtn');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        const authSwitchLink = document.getElementById('authSwitchLink');

        const menuUsername = document.getElementById('menuUsername');
        const menuStatus = document.getElementById('menuStatus');
        const menuAvatar = document.getElementById('menuAvatar');

        let isLoginMode = true;
        let currentUser = null;
        let currentPage = null;

        // --- Функции работы с Firebase ---

        // Проверка существования пользователя
        function checkUserExists(username) {
            return new Promise((resolve) => {
                const userRef = database.ref('users/' + username);
                userRef.once('value', (snapshot) => {
                    resolve(snapshot.exists());
                });
            });
        }

        // Регистрация пользователя
        function registerUser(username, password) {
            return new Promise((resolve, reject) => {
                const userRef = database.ref('users/' + username);
                userRef.set({
                    password: password,
                    created: Date.now()
                }).then(() => {
                    resolve();
                }).catch((error) => {
                    reject(error);
                });
            });
        }

        // Проверка пароля
        function checkPassword(username, password) {
            return new Promise((resolve, reject) => {
                const userRef = database.ref('users/' + username + '/password');
                userRef.once('value', (snapshot) => {
                    if (snapshot.exists() && snapshot.val() === password) {
                        resolve(true);
                    } else {
                        resolve(false);
                    }
                }).catch((error) => {
                    reject(error);
                });
            });
        }

        // Сохранение сессии
        function saveSession(username) {
            database.ref('sessions/' + username).set({
                lastLogin: Date.now(),
                active: true
            });
        }

        // Проверка сессии
        function checkSession() {
            return new Promise((resolve) => {
                const sessionKey = localStorage.getItem('guru_session');
                if (!sessionKey) {
                    resolve(null);
                    return;
                }
                const sessionRef = database.ref('sessions/' + sessionKey);
                sessionRef.once('value', (snapshot) => {
                    if (snapshot.exists() && snapshot.val().active) {
                        resolve(sessionKey);
                    } else {
                        resolve(null);
                    }
                });
            });
        }

        // Выход из сессии
        function clearSession(username) {
            if (username) {
                database.ref('sessions/' + username).remove();
            }
            localStorage.removeItem('guru_session');
        }

        // Загрузка контактов пользователя
        function loadContacts(username) {
            return new Promise((resolve) => {
                const contactsRef = database.ref('users/' + username + '/contacts');
                contactsRef.once('value', (snapshot) => {
                    if (snapshot.exists()) {
                        resolve(snapshot.val());
                    } else {
                        resolve({});
                    }
                });
            });
        }

        // Добавление контакта
        function addContact(username, contactName) {
            return new Promise((resolve, reject) => {
                const contactRef = database.ref('users/' + username + '/contacts/' + contactName);
                contactRef.set({
                    added: Date.now()
                }).then(() => {
                    resolve();
                }).catch((error) => {
                    reject(error);
                });
            });
        }

        // Загрузка чатов
        function loadChats(username) {
            return new Promise((resolve) => {
                const chatsRef = database.ref('chats');
                chatsRef.once('value', (snapshot) => {
                    if (snapshot.exists()) {
                        const allChats = snapshot.val();
                        const userChats = {};
                        for (const [chatId, chat] of Object.entries(allChats)) {
                            if (chat.participants && chat.participants.includes(username)) {
                                userChats[chatId] = chat;
                            }
                        }
                        resolve(userChats);
                    } else {
                        resolve({});
                    }
                });
            });
        }

        // Создание чата
        function createChat(username, contactName) {
            return new Promise((resolve, reject) => {
                const chatId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                const chatRef = database.ref('chats/' + chatId);
                chatRef.set({
                    participants: [username, contactName],
                    created: Date.now(),
                    messages: {
                        first: {
                            text: 'Чат создан!',
                            from: username,
                            time: Date.now()
                        }
                    }
                }).then(() => {
                    resolve(chatId);
                }).catch((error) => {
                    reject(error);
                });
            });
        }

        // --- Меню ---
        function toggleMenu() {
            // Меню доступно только если пользователь авторизован
            if (!currentUser) {
                return;
            }
            sideMenu.classList.toggle('open');
            menuOverlay.classList.toggle('active');
        }

        function closeMenu() {
            sideMenu.classList.remove('open');
            menuOverlay.classList.remove('active');
        }

        burgerBtn.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', closeMenu);

        // --- Показать/скрыть ошибку ---
        function showError(msg) {
            authError.textContent = msg;
            authError.style.display = 'block';
            authSuccess.style.display = 'none';
            setTimeout(() => { authError.style.display = 'none'; }, 4000);
        }

        function showSuccess(msg) {
            authSuccess.textContent = msg;
            authSuccess.style.display = 'block';
            authError.style.display = 'none';
            setTimeout(() => { authSuccess.style.display = 'none'; }, 3000);
        }

        // --- Переключение режима ---
        function toggleMode() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authBtn.textContent = 'Войти';
                authSwitchLink.textContent = 'Создать';
                document.querySelector('.subtitle').textContent = 'Войдите в свой аккаунт';
                document.querySelector('.auth-form .input-group:last-child label').textContent = '🔐 Код-пароль';
                document.querySelector('.auth-form .input-group:last-child input').placeholder = 'Введите код';
                document.querySelector('.auth-form .input-group:last-child input').setAttribute('autocomplete', 'current-password');
            } else {
                authBtn.textContent = 'Зарегистрироваться';
                authSwitchLink.textContent = 'Войти';
                document.querySelector('.subtitle').textContent = 'Создайте новый аккаунт';
                document.querySelector('.auth-form .input-group:last-child label').textContent = '🔐 Придумайте код';
                document.querySelector('.auth-form .input-group:last-child input').placeholder = 'Придумайте код';
                document.querySelector('.auth-form .input-group:last-child input').setAttribute('autocomplete', 'new-password');
            }
            usernameInput.value = '';
            passwordInput.value = '';
            authError.style.display = 'none';
            authSuccess.style.display = 'none';
        }

        authSwitchLink.addEventListener('click', toggleMode);

        // --- Выход ---
        function logout() {
            if (currentUser) {
                clearSession(currentUser.username);
            }
            currentUser = null;
            showApp(false);
            usernameInput.value = '';
            passwordInput.value = '';
            authError.style.display = 'none';
            authSuccess.style.display = 'none';
            if (!isLoginMode) toggleMode();
            closeMenu();
            pageContainer.classList.remove('active');
            chatList.style.display = 'block';
            bottomNav.style.display = 'flex';
            searchArea.style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector('[data-tab="chats"]').classList.add('active');
            chatItems.innerHTML = '';
            emptyChats.style.display = 'flex';
            // Блокируем меню
            burgerBtn.classList.add('disabled');
        }

        // --- Показать страницу ---
        function showPage(page) {
            if (!currentUser) return;
            currentPage = page;
            chatList.style.display = 'none';
            bottomNav.style.display = 'none';
            searchArea.style.display = 'none';
            pageContainer.classList.add('active');
            closeMenu();

            const pages = {
                profile: {
                    title: 'Мой профиль',
                    content: `
                        <div class="page-item"><i class="fas fa-user-circle"></i> ${currentUser ? currentUser.username : 'Гость'}</div>
                        <div class="page-item"><i class="fas fa-calendar"></i> Аккаунт создан</div>
                        <div class="page-item"><i class="fas fa-edit"></i> Редактировать профиль</div>
                        <div class="page-item" style="color:#ff6b6b;cursor:pointer;" id="logoutPageBtn"><i class="fas fa-sign-out-alt"></i> Выйти</div>
                    `
                },
                contacts: {
                    title: 'Контакты',
                    content: `
                        <div class="page-item" style="cursor:pointer;" id="addContactBtn"><i class="fas fa-user-plus"></i> Добавить контакт</div>
                        <div id="contactsList"></div>
                    `
                },
                calls: {
                    title: 'Звонки',
                    content: `
                        <div class="page-item"><i class="fas fa-phone"></i> История звонков</div>
                        <div class="page-item"><i class="fas fa-phone-slash"></i> Пропущенные</div>
                        <div class="page-item"><i class="fas fa-microphone"></i> Голосовые сообщения</div>
                    `
                },
                channels: {
                    title: 'Каналы',
                    content: `
                        <div class="page-item"><i class="fas fa-broadcast"></i> GURU Channel</div>
                        <div class="page-item"><i class="fas fa-plus-circle"></i> Создать канал</div>
                    `
                },
                saved: {
                    title: 'Сохранённое',
                    content: `
                        <div class="page-item"><i class="fas fa-bookmark"></i> Сохранённые сообщения</div>
                        <div class="page-item"><i class="fas fa-file"></i> Файлы</div>
                        <div class="page-item"><i class="fas fa-link"></i> Ссылки</div>
                    `
                },
                settings: {
                    title: 'Настройки',
                    content: `
                        <div class="page-item"><i class="fas fa-moon"></i> Тёмная тема <span style="margin-left:auto;color:#4a4a4a;">Вкл</span></div>
                        <div class="page-item"><i class="fas fa-bell"></i> Уведомления <span style="margin-left:auto;color:#4a4a4a;">Вкл</span></div>
                        <div class="page-item"><i class="fas fa-lock"></i> Конфиденциальность</div>
                        <div class="page-item"><i class="fas fa-database"></i> Хранилище</div>
                        <div class="page-item"><i class="fas fa-language"></i> Язык: Русский</div>
                    `
                },
                faq: {
                    title: 'Вопросы',
                    content: `
                        <div class="page-item"><i class="fas fa-question-circle"></i> Как создать аккаунт?</div>
                        <div class="page-item"><i class="fas fa-question-circle"></i> Как добавить контакт?</div>
                        <div class="page-item"><i class="fas fa-headset"></i> Поддержка</div>
                    `
                }
            };

            if (pages[page]) {
                pageTitle.textContent = pages[page].title;
                pageContent.innerHTML = pages[page].content;

                if (page === 'profile') {
                    const logoutBtn = document.getElementById('logoutPageBtn');
                    if (logoutBtn) logoutBtn.addEventListener('click', logout);
                }

                if (page === 'contacts') {
                    loadContactsList();
                    const addBtn = document.getElementById('addContactBtn');
                    if (addBtn) {
                        addBtn.addEventListener('click', function() {
                            const contactName = prompt('Введите ник контакта:');
                            if (contactName && contactName.trim()) {
                                addContact(currentUser.username, contactName.trim()).then(() => {
                                    showSuccess('Контакт добавлен!');
                                    loadContactsList();
                                }).catch(() => {
                                    showError('Ошибка добавления контакта');
                                });
                            }
                        });
                    }
                }
            }
        }

        // --- Загрузка списка контактов ---
        function loadContactsList() {
            if (!currentUser) return;
            loadContacts(currentUser.username).then((contacts) => {
                const list = document.getElementById('contactsList');
                if (!list) return;
                const count = Object.keys(contacts).length;
                const badge = document.getElementById('contactsBadge');
                if (badge) badge.textContent = count;
                
                if (count === 0) {
                    list.innerHTML = '<div class="page-item" style="color:#6a6a6a;">Нет контактов</div>';
                } else {
                    list.innerHTML = '';
                    for (const [contact, data] of Object.entries(contacts)) {
                        const div = document.createElement('div');
                        div.className = 'page-item';
                        div.innerHTML = `<i class="fas fa-user"></i> ${contact} <span style="margin-left:auto;color:#4a4a4a;">${new Date(data.added).toLocaleDateString()}</span>`;
                        div.style.cursor = 'pointer';
                        div.addEventListener('click', function() {
                            if (confirm('Начать чат с ' + contact + '?')) {
                                createChat(currentUser.username, contact).then(() => {
                                    showSuccess('Чат создан!');
                                    loadChatsList();
                                });
                            }
                        });
                        list.appendChild(div);
                    }
                }
            });
        }

        // --- Загрузка чатов ---
        function loadChatsList() {
            if (!currentUser) return;
            loadChats(currentUser.username).then((chats) => {
                chatItems.innerHTML = '';
                if (Object.keys(chats).length === 0) {
                    emptyChats.style.display = 'flex';
                    return;
                }
                emptyChats.style.display = 'none';
                let hasToday = false;
                let hasYesterday = false;
                let hasEarlier = false;
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                for (const [chatId, chat] of Object.entries(chats)) {
                    const otherUser = chat.participants.find(p => p !== currentUser.username);
                    const chatDate = new Date(chat.created);
                    let divider = '';
                    if (chatDate.toDateString() === today.toDateString()) {
                        if (!hasToday) {
                            divider = '<div class="chat-divider">СЕГОДНЯ</div>';
                            hasToday = true;
                        }
                    } else if (chatDate.toDateString() === yesterday.toDateString()) {
                        if (!hasYesterday) {
                            divider = '<div class="chat-divider">ВЧЕРА</div>';
                            hasYesterday = true;
                        }
                    } else {
                        if (!hasEarlier) {
                            divider = '<div class="chat-divider">РАНЕЕ</div>';
                            hasEarlier = true;
                        }
                    }

                    const firstLetter = otherUser ? otherUser.charAt(0).toUpperCase() : '?';
                    const colors = ['avatar-1', 'avatar-2', 'avatar-3', 'avatar-4', 'avatar-5', 'avatar-6'];
                    const colorClass = colors[Math.floor(Math.random() * colors.length)];

                    const messages = chat.messages || {};
                    const lastMessage = Object.values(messages).pop() || { text: 'Нет сообщений', from: otherUser };

                    const chatDiv = document.createElement('div');
                    chatDiv.innerHTML = `
                        ${divider}
                        <div class="chat-item" data-chat="${chatId}">
                            <div class="chat-avatar ${colorClass}">${firstLetter}</div>
                            <div class="chat-info">
                                <div class="chat-name">
                                    <span class="name">${otherUser || 'Чат'}</span>
                                    <span class="time">${new Date(chat.created).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div class="chat-preview">
                                    <span class="message">${lastMessage.from === currentUser.username ? 'Вы: ' : ''}${lastMessage.text}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    chatItems.appendChild(chatDiv);
                }

                document.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const chatId = this.dataset.chat;
                        alert('Чат открыт! ID: ' + chatId);
                    });
                });
            });
        }

        // --- Авторизация ---
        async function handleAuth() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }

            if (username.length < 2) {
                showError('Ник должен быть минимум 2 символа');
                return;
            }

            if (password.length < 4) {
                showError('Код должен быть минимум 4 символа');
                return;
            }

            authBtn.disabled = true;
            authBtn.textContent = 'Загрузка...';

            try {
                const exists = await checkUserExists(username);

                if (isLoginMode) {
                    if (!exists) {
                        showError('Пользователь не найден');
                        authBtn.disabled = false;
                        authBtn.textContent = 'Войти';
                        return;
                    }
                    const correct = await checkPassword(username, password);
                    if (!correct) {
                        showError('Неверный пароль');
                        authBtn.disabled = false;
                        authBtn.textContent = 'Войти';
                        return;
                    }
                    currentUser = { username: username };
                    localStorage.setItem('guru_session', username);
                    saveSession(username);
                    showSuccess('Добро пожаловать, ' + username + '!');
                    setTimeout(() => {
                        showApp(true);
                        loadChatsList();
                    }, 300);
                } else {
                    if (exists) {
                        showError('Пользователь уже существует');
                        authBtn.disabled = false;
                        authBtn.textContent = 'Зарегистрироваться';
                        return;
                    }
                    await registerUser(username, password);
                    currentUser = { username: username };
                    localStorage.setItem('guru_session', username);
                    saveSession(username);
                    showSuccess('Аккаунт создан! Добро пожаловать, ' + username + '!');
                    setTimeout(() => {
                        showApp(true);
                        loadChatsList();
                    }, 300);
                }
            } catch (error) {
                showError('Ошибка: ' + error.message);
            }

            authBtn.disabled = false;
            authBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
        }

        authBtn.addEventListener('click', handleAuth);
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleAuth();
        });

        // --- Показать/скрыть интерфейс ---
        function showApp(show) {
            if (show) {
                authContainer.style.display = 'none';
                chatList.style.display = 'block';
                bottomNav.style.display = 'flex';
                searchArea.style.display = 'block';
                pageContainer.classList.remove('active');
                // Разблокируем меню
                burgerBtn.classList.remove('disabled');
                
                if (currentUser) {
                    menuUsername.textContent = currentUser.username;
                    menuStatus.textContent = 'В сети';
                    menuAvatar.textContent = currentUser.username.charAt(0).toUpperCase();
                    
                    const headerLeft = document.querySelector('.header-left');
                    const oldProfile = document.querySelector('.user-profile');
                    if (oldProfile) oldProfile.remove();
                    
                    const profile = document.createElement('div');
                    profile.className = 'user-profile';
                    const firstLetter = currentUser.username.charAt(0).toUpperCase() || '?';
                    profile.innerHTML = `
                        <div class="avatar">${firstLetter}</div>
                        <span class="username">${currentUser.username}</span>
                        <button class="logout-btn" id="logoutBtn">Выйти</button>
                    `;
                    headerLeft.appendChild(profile);
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                }
            } else {
                authContainer.style.display = 'flex';
                chatList.style.display = 'none';
                bottomNav.style.display = 'none';
                searchArea.style.display = 'none';
                pageContainer.classList.remove('active');
                // Блокируем меню
                burgerBtn.classList.add('disabled');
                
                const profile = document.querySelector('.user-profile');
                if (profile) profile.remove();
                menuUsername.textContent = 'Гость';
                menuStatus.textContent = 'Не авторизован';
                menuAvatar.textContent = 'G';
            }
        }

        // --- Табы ---
        document.querySelectorAll('.nav-item').forEach(tab => {
            tab.addEventListener('click', function() {
                if (!currentUser) return;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                const tabName = this.dataset.tab;
                
                if (pageContainer.classList.contains('active')) {
                    pageContainer.classList.remove('active');
                    chatList.style.display = 'block';
                    searchArea.style.display = 'block';
                }
                
                if (tabName === 'chats') {
                    chatList.style.display = 'block';
                    searchArea.style.display = 'block';
                    bottomNav.style.display = 'flex';
                    loadChatsList();
                } else {
                    chatList.style.display = 'none';
                    searchArea.style.display = 'none';
                    showPage(tabName);
                }
            });
        });

        // --- Назад ---
        pageBack.addEventListener('click', function() {
            pageContainer.classList.remove('active');
            chatList.style.display = 'block';
            bottomNav.style.display = 'flex';
            searchArea.style.display = 'block';
            currentPage = null;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector('[data-tab="chats"]').classList.add('active');
            loadChatsList();
        });

        // --- Меню пункты ---
        document.querySelectorAll('.side-menu-item').forEach(item => {
            item.addEventListener('click', function() {
                const page = this.dataset.page;
                if (page && currentUser) {
                    showPage(page);
                }
            });
        });

        // --- Проверка сессии ---
        async function initApp() {
            try {
                const sessionUser = await checkSession();
                if (sessionUser) {
                    currentUser = { username: sessionUser };
                    showApp(true);
                    loadChatsList();
                } else {
                    showApp(false);
                }
            } catch (error) {
                showApp(false);
            }
        }

        // --- Инициализация ---
        document.addEventListener('DOMContentLoaded', initApp);

        // Закрытие меню при клике вне
        document.addEventListener('click', function(e) {
            if (sideMenu.classList.contains('open')) {
                if (!sideMenu.contains(e.target) && e.target !== burgerBtn && !burgerBtn.contains(e.target)) {
                    closeMenu();
                }
            }
        });
    </script>
</body>
</html>
