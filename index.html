                        menuAvatar.innerHTML = `<img src="${url}" alt="avatar">`;
                    } else {
                        menuAvatar.textContent = currentUser.username.charAt(0).toUpperCase();
                    }
                    const profileAvatar = document.querySelector('.user-profile .avatar');
                    if (profileAvatar) {
                        if (url) {
                            profileAvatar.innerHTML = `<img src="${url}" alt="avatar">`;
                        } else {
                            profileAvatar.textContent = currentUser.username.charAt(0).toUpperCase();
                        }
                    }
                });
            }
        }

        // --- Загрузка контактов ---
        function loadContactsList() {
            if (!currentUser) return;
            loadContacts(currentUser.username).then((contacts) => {
                const list = document.getElementById('contactsList');
                if (!list) return;
                const count = Object.keys(contacts).length;
                if (contactsBadge) contactsBadge.textContent = count;
                if (count === 0) {
                    list.innerHTML = '<div class="page-item" style="color:#6a6a6a;">Нет контактов</div>';
                } else {
                    list.innerHTML = '';
                    for (const [contact, data] of Object.entries(contacts)) {
                        const div = document.createElement('div');
                        div.className = 'page-item';
                        div.innerHTML = `<i class="fas fa-user"></i> ${contact} <span style="margin-left:auto;color:#4a4a4a;">${new Date(data.added).toLocaleDateString()}</span>`;
                        div.style.cursor = 'pointer';
                        div.addEventListener('click', function() {
                            createPrivateChat(currentUser.username, contact).then((chatId) => {
                                showNotification('Чат с ' + contact + ' создан!');
                                loadChatsList();
                                openChat(chatId);
                            });
                        });
                        list.appendChild(div);
                    }
                }
            });
        }

        // =============================================
        //  ЗАГРУЗКА ЧАТОВ (С ПОСЛЕДНИМ СООБЩЕНИЕМ)
        // =============================================
        function loadChatsList() {
            if (!currentUser) return;
            loadUserChats(currentUser.username).then((chats) => {
                chatItems.innerHTML = '';
                if (Object.keys(chats).length === 0) {
                    emptyChats.style.display = 'flex';
                    return;
                }
                emptyChats.style.display = 'none';
                
                let hasToday = false, hasYesterday = false, hasEarlier = false;
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                for (const [chatId, chat] of Object.entries(chats)) {
                    const isGroup = chat.isGroup || false;
                    const participants = chat.participants || [];
                    const otherUser = participants.find(p => p !== currentUser.username);
                    const chatDate = new Date(chat.created);
                    
                    let divider = '';
                    if (chatDate.toDateString() === today.toDateString()) {
                        if (!hasToday) { divider = '<div class="chat-divider">СЕГОДНЯ</div>'; hasToday = true; }
                    } else if (chatDate.toDateString() === yesterday.toDateString()) {
                        if (!hasYesterday) { divider = '<div class="chat-divider">ВЧЕРА</div>'; hasYesterday = true; }
                    } else {
                        if (!hasEarlier) { divider = '<div class="chat-divider">РАНЕЕ</div>'; hasEarlier = true; }
                    }

                    let displayName;
                    if (isGroup) {
                        displayName = '👥 ' + (chat.groupName || participants.join(', '));
                    } else {
                        displayName = otherUser || 'Чат';
                    }
                    
                    const firstLetter = isGroup ? '👥' : (otherUser ? otherUser.charAt(0).toUpperCase() : '?');
                    const colors = ['avatar-1', 'avatar-2', 'avatar-3', 'avatar-4', 'avatar-5', 'avatar-6', 'avatar-7', 'avatar-8'];
                    const colorClass = colors[Math.floor(Math.random() * colors.length)];

                    const messages = chat.messages || {};
                    const messageKeys = Object.keys(messages);
                    let lastMessage = { text: 'Нет сообщений', from: otherUser };
                    let unreadCount = 0;
                    
                    if (messageKeys.length > 0) {
                        const sortedKeys = messageKeys.sort((a, b) => (messages[a].time || 0) - (messages[b].time || 0));
                        const lastKey = sortedKeys[sortedKeys.length - 1];
                        lastMessage = messages[lastKey] || { text: 'Нет сообщений', from: otherUser };
                        
                        messageKeys.forEach(key => {
                            const msg = messages[key];
                            if (msg.from !== currentUser.username && !msg.read) {
                                unreadCount++;
                            }
                        });
                    }
                    
                    let previewText = lastMessage.text;
                    if (lastMessage.type === 'voice') {
                        const mins = Math.floor(lastMessage.duration / 60);
                        const secs = Math.floor(lastMessage.duration % 60);
                        previewText = '🎤 Голосовое (' + mins + ':' + String(secs).padStart(2, '0') + ')';
                    } else if (lastMessage.type === 'image') {
                        previewText = '📷 Фото';
                    } else if (lastMessage.type === 'video') {
                        previewText = '🎬 Видео';
                    }
                    if (lastMessage.from === 'system') previewText = '📢 ' + previewText;
                    if (lastMessage.from === currentUser.username) previewText = 'Вы: ' + previewText;

                    const chatDiv = document.createElement('div');
                    chatDiv.innerHTML = `
                        ${divider}
                        <div class="chat-item" data-chat="${chatId}">
                            <div class="chat-avatar ${colorClass}" id="avatar_${chatId}">${firstLetter}</div>
                            <div class="chat-info">
                                <div class="chat-name">
                                    <span class="name">${displayName}</span>
                                    <span class="time">${new Date(chat.created).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div class="chat-preview">
                                    <span class="message">${previewText}</span>
                                    ${!isGroup && otherUser ? `<div class="chat-status" id="status_${chatId}">⏳</div>` : ''}
                                    ${unreadCount > 0 ? `<span class="badge-unread">${unreadCount}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                    chatItems.appendChild(chatDiv);

                    if (!isGroup && otherUser) {
                        getUserAvatar(otherUser).then(url => {
                            const el = document.getElementById('avatar_' + chatId);
                            if (el && url) {
                                el.innerHTML = `<img src="${url}" alt="avatar">`;
                                el.style.background = 'none';
                            }
                        });
                        getUserStatus(otherUser).then(status => {
                            const statusEl = document.getElementById('status_' + chatId);
                            if (statusEl) {
                                if (status.online) {
                                    statusEl.textContent = '🟢 Онлайн';
                                    statusEl.className = 'chat-status online';
                                } else if (status.lastSeen) {
                                    statusEl.textContent = '🕒 ' + formatLastSeen(status.lastSeen);
                                    statusEl.className = 'chat-status';
                                } else {
                                    statusEl.textContent = '🕒 недавно';
                                    statusEl.className = 'chat-status';
                                }
                            }
                        });
                    }
                }

                document.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const chatId = this.dataset.chat;
                        if (chatId) openChat(chatId);
                    });
                });
            });
        }

        // --- Открыть чат ---
        let currentOtherUser = null;
        function openChat(chatId) {
            if (messageListener) {
                database.ref('chats/' + currentChatId + '/messages').off();
                messageListener = null;
            }
            if (typingListener) {
                database.ref('users/' + currentOtherUser + '/typing').off();
                typingListener = null;
            }
            if (onlineListener) {
                database.ref('users/' + currentOtherUser).off();
                onlineListener = null;
            }
            
            currentChatId = chatId;
            chatWindow.classList.add('active');
            chatList.style.display = 'none';
            bottomNav.style.display = 'none';
            searchArea.style.display = 'none';
            pageContainer.classList.remove('active');

            database.ref('chats/' + chatId).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    currentChatData = snapshot.val();
                    const isGroup = currentChatData.isGroup || false;
                    const participants = currentChatData.participants || [];
                    let displayName;
                    let otherUser = null;
                    if (isGroup) {
                        displayName = '👥 ' + (currentChatData.groupName || participants.join(', '));
                        chatWindowTitle.textContent = displayName;
                        chatWindowSubtitle.textContent = participants.length + ' участников';
                        chatWindowSubtitle.className = 'chat-window-subtitle';
                    } else {
                        otherUser = participants.find(p => p !== currentUser.username);
                        displayName = otherUser || 'Чат';
                        chatWindowTitle.textContent = displayName;
                        currentOtherUser = otherUser;
                        
                        if (otherUser) {
                            onlineListener = database.ref('users/' + otherUser);
                            onlineListener.on('value', (snap) => {
                                if (snap.exists()) {
                                    const data = snap.val();
                                    if (data.online) {
                                        chatWindowSubtitle.textContent = '🟢 Онлайн';
                                        chatWindowSubtitle.className = 'chat-window-subtitle online';
                                    } else if (data.lastSeen) {
                                        chatWindowSubtitle.textContent = '🕒 Был(а) ' + formatLastSeen(data.lastSeen);
                                        chatWindowSubtitle.className = 'chat-window-subtitle';
                                    } else {
                                        chatWindowSubtitle.textContent = '🕒 Недавно';
                                        chatWindowSubtitle.className = 'chat-window-subtitle';
                                    }
                                }
                            });
                            
                            typingListener = database.ref('users/' + otherUser + '/typing');
                            typingListener.on('value', (snap) => {
                                const typingEl = document.getElementById('typingIndicator');
                                if (typingEl) {
                                    if (snap.val()) {
                                        typingEl.textContent = '✏️ ' + otherUser + ' печатает...';
                                    } else {
                                        typingEl.textContent = '';
                                    }
                                }
                            });
                        }
                    }
                }
            });

            chatMessages.innerHTML = '';
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'typing-indicator';
            chatMessages.appendChild(typingDiv);
            
            loadMessages(chatId, (messages) => {
                const typingEl = document.getElementById('typingIndicator');
                chatMessages.innerHTML = '';
                if (typingEl) chatMessages.appendChild(typingEl);
                
                if (Object.keys(messages).length === 0) {
                    const empty = document.createElement('div');
                    empty.style.cssText = 'color:#6a6a6a;text-align:center;padding:20px;';
                    empty.textContent = 'Нет сообщений. Напишите первое!';
                    chatMessages.appendChild(empty);
                    return;
                }
                const sorted = Object.values(messages).sort((a, b) => a.time - b.time);
                sorted.forEach((msg) => {
                    const bubble = document.createElement('div');
                    if (msg.from === 'system') {
                        bubble.className = 'message-bubble system';
                        bubble.textContent = msg.text;
                    } else if (msg.type === 'voice') {
                        bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                        if (msg.from !== currentUser.username) {
                            const sender = document.createElement('div');
                            sender.className = 'message-sender';
                            sender.textContent = msg.from;
                            bubble.appendChild(sender);
                        }
                        const voiceDiv = document.createElement('div');
                        voiceDiv.className = 'message-voice';
                        
                        const playBtn = document.createElement('button');
                        playBtn.className = 'play-btn';
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        let audio = null;
                        playBtn.addEventListener('click', function() {
                            if (audio && !audio.paused) {
                                audio.pause();
                                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                                return;
                            }
                            if (audio) {
                                audio.play().catch(e => console.log('Play error:', e));
                                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                                return;
                            }
                            audio = playVoice(msg.data, voiceDiv);
                            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        });
                        
                        const progress = document.createElement('div');
                        progress.className = 'voice-progress';
                        progress.innerHTML = '<div class="fill"></div>';
                        
                        const duration = document.createElement('span');
                        duration.className = 'voice-duration';
                        const mins = Math.floor(msg.duration / 60);
                        const secs = Math.floor(msg.duration % 60);
                        duration.textContent = mins + ':' + String(secs).padStart(2, '0');
                        
                        voiceDiv.appendChild(playBtn);
                        voiceDiv.appendChild(progress);
                        voiceDiv.appendChild(duration);
                        bubble.appendChild(voiceDiv);
                        
                        const time = document.createElement('div');
                        time.className = 'message-time';
                        const readStatus = (msg.read && msg.from === currentUser.username) ? ' ✓✓' : (msg.from === currentUser.username ? ' ✓' : '');
                        time.innerHTML = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + 
                            (msg.from === currentUser.username ? `<span class="read-status ${msg.read ? 'read' : ''}">${msg.read ? ' ✓✓' : ' ✓'}</span>` : '');
                        bubble.appendChild(time);
                    } else if (msg.type === 'image' || msg.type === 'video') {
                        bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                        if (msg.from !== currentUser.username) {
                            const sender = document.createElement('div');
                            sender.className = 'message-sender';
                            sender.textContent = msg.from;
                            bubble.appendChild(sender);
                        }
                        if (msg.type === 'image') {
                            const img = document.createElement('img');
                            img.className = 'message-img';
                            img.src = msg.data;
                            img.alt = 'Фото';
                            img.addEventListener('click', function() {
                                showModal('📷 Фото', `<img src="${msg.data}" style="max-width:100%;border-radius:12px;">`);
                            });
                            bubble.appendChild(img);
                        } else {
                            const video = document.createElement('video');
                            video.className = 'message-img';
                            video.src = msg.data;
                            video.controls = true;
                            video.style.maxHeight = '300px';
                            video.style.maxWidth = '100%';
                            video.style.borderRadius = '12px';
                            bubble.appendChild(video);
                        }
                        const time = document.createElement('div');
                        time.className = 'message-time';
                        const readStatus = (msg.read && msg.from === currentUser.username) ? ' ✓✓' : (msg.from === currentUser.username ? ' ✓' : '');
                        time.innerHTML = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + 
                            (msg.from === currentUser.username ? `<span class="read-status ${msg.read ? 'read' : ''}">${msg.read ? ' ✓✓' : ' ✓'}</span>` : '');
                        bubble.appendChild(time);
                    } else {
                        bubble.className = 'message-bubble ' + (msg.from === currentUser.username ? 'mine' : 'other');
                        if (msg.from !== currentUser.username) {
                            const sender = document.createElement('div');
                            sender.className = 'message-sender';
                            sender.textContent = msg.from;
                            bubble.appendChild(sender);
                        }
                        const text = document.createElement('div');
                        text.textContent = msg.text;
                        bubble.appendChild(text);
                        const time = document.createElement('div');
                        time.className = 'message-time';
                        const readStatus = (msg.read && msg.from === currentUser.username) ? ' ✓✓' : (msg.from === currentUser.username ? ' ✓' : '');
                        time.innerHTML = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + 
                            (msg.from === currentUser.username ? `<span class="read-status ${msg.read ? 'read' : ''}">${msg.read ? ' ✓✓' : ' ✓'}</span>` : '');
                        bubble.appendChild(time);
                    }
                    chatMessages.appendChild(bubble);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
                markMessagesRead(chatId);
            });
        }

        function loadMessages(chatId, callback) {
            if (messageListener) {
                database.ref('chats/' + currentChatId + '/messages').off();
                messageListener = null;
            }
            const ref = database.ref('chats/' + chatId + '/messages');
            ref.on('value', (snapshot) => {
                callback(snapshot.exists() ? snapshot.val() : {});
            });
            messageListener = ref;
        }

        function markMessagesRead(chatId) {
            if (!currentUser || !chatId) return;
            const chatRef = database.ref('chats/' + chatId + '/messages');
            chatRef.once('value', (snapshot) => {
                if (!snapshot.exists()) return;
                const messages = snapshot.val();
                const updates = {};
                for (let key in messages) {
                    const msg = messages[key];
                    if (msg.from !== currentUser.username && !msg.read) {
                        updates[key + '/read'] = true;
                    }
                }
                if (Object.keys(updates).length > 0) {
                    chatRef.update(updates);
                }
            });
        }

        // --- Отправить сообщение ---
        function sendMessageHandler() {
            const text = chatInput.value.trim();
            if (!text || !currentChatId || !currentUser) return;
            const msgId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            database.ref('chats/' + currentChatId + '/messages/' + msgId).set({
                text: text,
                from: currentUser.username,
                time: Date.now(),
                read: false
            }).then(() => {
                chatInput.value = '';
                if (currentOtherUser) {
                    database.ref('users/' + currentUser.username + '/typing').set(false);
                }
                loadChatsList();
            });
        }

        chatSendBtn.addEventListener('click', sendMessageHandler);
        chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessageHandler(); });

        chatInput.addEventListener('input', () => {
            if (currentOtherUser) {
                database.ref('users/' + currentUser.username + '/typing').set(true);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    database.ref('users/' + currentUser.username + '/typing').set(false);
                }, 2000);
            }
        });

        chatWindowBack.addEventListener('click', function() {
            chatWindow.classList.remove('active');
            chatList.style.display = 'block';
            bottomNav.style.display = 'flex';
            searchArea.style.display = 'block';
            if (messageListener) {
                database.ref('chats/' + currentChatId + '/messages').off();
                messageListener = null;
            }
            if (typingListener) {
                database.ref('users/' + currentOtherUser + '/typing').off();
                typingListener = null;
            }
            if (onlineListener) {
                database.ref('users/' + currentOtherUser).off();
                onlineListener = null;
            }
            currentChatId = null;
            currentOtherUser = null;
            loadChatsList();
        });

        // =============================================
        //  ОТПРАВКА ФОТО/ВИДЕО
        // =============================================
        fileBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && currentChatId && currentUser) {
                if (file.size > 20 * 1024 * 1024) {
                    showError('Файл больше 20МБ');
                    return;
                }
                const type = file.type.startsWith('image/') ? 'image' : 'video';
                showNotification('⏳ Загрузка...');
                uploadFile(currentChatId, currentUser.username, file, type).then(() => {
                    showNotification('✅ Файл отправлен!');
                    loadChatsList();
                }).catch(() => showError('Ошибка загрузки'));
                fileInput.value = '';
            }
        });

        // =============================================
        //  ГОЛОСОВЫЕ СООБЩЕНИЯ (ИСПРАВЛЕНО)
        // =============================================
        voiceBtn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            if (!currentChatId || !currentUser) return;
            
            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                isRecording = true;
                recordingSeconds = 0;
                audioChunks = [];
                recordedBlob = null;
                voiceControls.classList.add('active');
                voiceTimer.textContent = '00:00';
                voiceBtn.style.display = 'none';
                chatInput.style.display = 'none';
                fileBtn.style.display = 'none';
                chatSendBtn.style.display = 'none';
                
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                
                recordingInterval = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60);
                    const secs = Math.floor(recordingSeconds % 60);
                    voiceTimer.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
                }, 1000);
            }).catch(() => {
                showError('Нет доступа к микрофону');
            });
        });

        voiceBtn.addEventListener('mouseup', function(e) {
            e.preventDefault();
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingInterval);
            }
        });

        voiceBtn.addEventListener('mouseleave', function(e) {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingInterval);
                resetVoiceUI();
            }
        });

        function resetVoiceUI() {
            voiceControls.classList.remove('active');
            voiceBtn.style.display = 'flex';
            chatInput.style.display = 'flex';
            fileBtn.style.display = 'flex';
            chatSendBtn.style.display = 'flex';
            recordedBlob = null;
            audioChunks = [];
            recordingSeconds = 0;
            if (mediaRecorder) {
                mediaRecorder = null;
            }
        }

        voiceCancelBtn.addEventListener('click', function() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingInterval);
            }
            resetVoiceUI();
            showNotification('❌ Запись отменена');
        });

        // =============================================
        //  ГОЛОСОВЫЕ - ОТПРАВКА (ИСПРАВЛЕНО)
        // =============================================
        voiceSendBtn.addEventListener('click', function() {
            if (recordedBlob) {
                sendVoiceMessage(currentChatId, currentUser.username, recordedBlob, recordingSeconds).then(() => {
                    showNotification('🎤 Голосовое отправлено!');
                    resetVoiceUI();
                    loadChatsList();
                }).catch((err) => {
                    showError('Ошибка отправки: ' + err.message);
                    resetVoiceUI();
                });
            } else {
                showNotification('❌ Нет записи');
                resetVoiceUI();
            }
        });

        // --- Информация о группе ---
        chatInfoBtn.addEventListener('click', function() {
            if (!currentChatId || !currentChatData) {
                showNotification('Нет информации о чате');
                return;
            }
            const isGroup = currentChatData.isGroup || false;
            const participants = currentChatData.participants || [];
            const creator = currentChatData.creator || '';
            const groupName = currentChatData.groupName || 'Группа';

            if (isGroup) {
                let html = `<div style="margin-bottom:12px;color:#6a6a6a;">👥 Название: <strong style="color:#f0f0f0;">${groupName}</strong></div>`;
                html += `<div style="margin-bottom:12px;color:#6a6a6a;">👤 Создатель: <strong style="color:#f0f0f0;">${creator}</strong></div>`;
                
                html += `
                    <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;">
                        <input type="text" id="addMemberInput" placeholder="Введите ник участника" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid #2a2a2a;background:#1f1f1f;color:#eaeaea;font-size:14px;">
                        <button class="add-member-btn" id="addMemberBtn">➕ Добавить</button>
                    </div>
                    <div id="addMemberStatus" style="font-size:12px;color:#6a6a6a;margin-bottom:10px;"></div>
                `;
                
                html += `<div style="margin-bottom:8px;color:#6a6a6a;">Участники (${participants.length}):</div>`;
                participants.forEach(user => {
                    const isOwner = user === creator;
                    html += `
                        <div class="participant-item">
                            <div class="participant-avatar" id="pavatar_${user}">${user.charAt(0).toUpperCase()}</div>
                            <span class="participant-name">${user}</span>
                            ${isOwner ? '<span class="participant-owner">👑 Создатель</span>' : ''}
                        </div>
                    `;
                });
                showModal('👥 Участники группы', html);
                participants.forEach(user => {
                    getUserAvatar(user).then(url => {
                        const el = document.getElementById('pavatar_' + user);
                        if (el && url) {
                            el.innerHTML = `<img src="${url}" alt="avatar">`;
                            el.style.background = 'none';
                        }
                    });
                });

                const addBtn = document.getElementById('addMemberBtn');
                const addInput = document.getElementById('addMemberInput');
                const statusEl = document.getElementById('addMemberStatus');
                
                if (addBtn && addInput) {
                    const newAddBtn = addBtn.cloneNode(true);
                    addBtn.parentNode.replaceChild(newAddBtn, addBtn);
                    
                    newAddBtn.addEventListener('click', function() {
                        const newMember = addInput.value.trim();
                        if (!newMember) {
                            if (statusEl) {
                                statusEl.textContent = '❌ Введите ник';
                                statusEl.style.color = '#ff6b6b';
                            }
                            return;
                        }
                        
                        if (statusEl) {
                            statusEl.textContent = '⏳ Проверка...';
                            statusEl.style.color = '#6a6a6a';
                        }
                        newAddBtn.disabled = true;
                        newAddBtn.textContent = '⏳';
                        
                        addMemberToGroup(currentChatId, newMember).then((result) => {
                            if (statusEl) {
                                statusEl.textContent = result;
                                statusEl.style.color = '#4fae4f';
                            }
                            addInput.value = '';
                            newAddBtn.disabled = false;
                            newAddBtn.textContent = '➕ Добавить';
                            setTimeout(() => {
                                chatInfoBtn.click();
                                loadChatsList();
                            }, 1000);
                        }).catch((err) => {
                            if (statusEl) {
                                statusEl.textContent = err;
                                statusEl.style.color = '#ff6b6b';
                            }
                            newAddBtn.disabled = false;
                            newAddBtn.textContent = '➕ Добавить';
                        });
                    });
                    
                    addInput.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            newAddBtn.click();
                        }
                    });
                }
            } else {
                const otherUser = participants.find(p => p !== currentUser.username);
                getUserAvatar(otherUser).then(url => {
                    let avatarHtml = otherUser.charAt(0).toUpperCase();
                    if (url) avatarHtml = `<img src="${url}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">`;
                    showModal('ℹ️ Информация', `
                        <div style="text-align:center;margin-bottom:12px;">
                            <div style="width:60px;height:60px;border-radius:50%;background:#2b6b9c;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;margin:0 auto;overflow:hidden;">${avatarHtml}</div>
                        </div>
                        <div style="color:#6a6a6a;">👤 Чат с: <strong style="color:#f0f0f0;">${otherUser}</strong></div>
                        <div style="color:#6a6a6a;margin-top:8px;">📱 Личный чат</div>
                    `);
                });
            }
        });

        // --- Удаление чата ---
        chatDeleteBtn.addEventListener('click', function() {
            if (!currentChatId) return;
            if (confirm('Удалить этот чат для всех участников?')) {
                deleteChat(currentChatId, currentUser.username).then(() => {
                    showNotification('🗑️ Чат удалён');
                    chatWindow.classList.remove('active');
                    chatList.style.display = 'block';
                    bottomNav.style.display = 'flex';
                    searchArea.style.display = 'block';
                    if (messageListener) {
                        database.ref('chats/' + currentChatId + '/messages').off();
                        messageListener = null;
                    }
                    if (typingListener) {
                        database.ref('users/' + currentOtherUser + '/typing').off();
                        typingListener = null;
                    }
                    if (onlineListener) {
                        database.ref('users/' + currentOtherUser).off();
                        onlineListener = null;
                    }
                    currentChatId = null;
                    currentOtherUser = null;
                    loadChatsList();
                }).catch((err) => {
                    showError('Ошибка: ' + err);
                });
            }
        });

        // --- Создание группы ---
        createGroupBtn.addEventListener('click', function() {
            if (!currentUser) return;
            
            const groupName = prompt('Введите название группы:');
            if (groupName === null) return;
            if (!groupName.trim()) {
                showError('Название не может быть пустым');
                return;
            }
            
            const membersInput = prompt('Введите ники участников через запятую (включая вас):');
            if (!membersInput || !membersInput.trim()) return;
            
            const members = membersInput.split(',').map(s => s.trim()).filter(s => s);
            if (members.length < 2) {
                showError('Минимум 2 участника (включая вас)');
                return;
            }
            
            const allMembers = [currentUser.username, ...members.filter(m => m !== currentUser.username)];
            const uniqueMembers = [...new Set(allMembers)];
            
            const checkPromises = uniqueMembers.map(name => checkUserExists(name));
            Promise.all(checkPromises).then((results) => {
                const missing = uniqueMembers.filter((_, i) => !results[i]);
                if (missing.length > 0) {
                    showError('Пользователи не найдены: ' + missing.join(', '));
                    return;
                }
                
                createGroup(currentUser.username, members, groupName.trim()).then((chatId) => {
                    showSuccess('🎉 Группа "' + groupName.trim() + '" создана!');
                    loadChatsList();
                    openChat(chatId);
                }).catch((error) => {
                    showError('Ошибка: ' + error.message);
                });
            });
        });

        // --- Авторизация ---
        async function handleAuth() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) { showError('Заполните все поля'); return; }
            if (username.length < 2) { showError('Ник минимум 2 символа'); return; }
            if (password.length < 4) { showError('Код минимум 4 символа'); return; }

            authBtn.disabled = true;
            authBtn.textContent = 'Загрузка...';

            try {
                const exists = await checkUserExists(username);

                if (isLoginMode) {
                    if (!exists) { showError('Пользователь не найден'); authBtn.disabled = false; authBtn.textContent = 'Войти'; return; }
                    const correct = await checkPassword(username, password);
                    if (!correct) { showError('Неверный пароль'); authBtn.disabled = false; authBtn.textContent = 'Войти'; return; }
                    currentUser = { username: username };
                    localStorage.setItem('guru_session', username);
                    saveSession(username);
                    updateOnlineStatus(username, true);
                    showSuccess('Добро пожаловать, ' + username + '!');
                    showApp(true);
                    loadChatsList();
                    updateAllAvatars();
                    listenForCalls();
                } else {
                    if (exists) { showError('Пользователь уже существует'); authBtn.disabled = false; authBtn.textContent = 'Зарегистрироваться'; return; }
                    await registerUser(username, password);
                    currentUser = { username: username };
                    localStorage.setItem('guru_session', username);
                    saveSession(username);
                    updateOnlineStatus(username, true);
                    showSuccess('Аккаунт создан! Добро пожаловать, ' + username + '!');
                    showApp(true);
                    loadChatsList();
                    updateAllAvatars();
                    listenForCalls();
                }
            } catch (error) {
                showError('Ошибка: ' + error.message);
            }

            authBtn.disabled = false;
            authBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
        }

        authBtn.addEventListener('click', handleAuth);
        passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAuth(); });

        // --- Показать интерфейс ---
        function showApp(show) {
            if (show) {
                authContainer.style.display = 'none';
                chatList.style.display = 'block';
                bottomNav.style.display = 'flex';
                searchArea.style.display = 'block';
                pageContainer.classList.remove('active');
                burgerBtn.classList.remove('disabled');
                
                if (currentUser) {
                    menuUsername.textContent = currentUser.username;
                    menuStatus.textContent = '🟢 В сети';
                    menuStatus.className = 'chat-status online';
                    
                    const headerLeft = document.querySelector('.header-left');
                    const oldProfile = document.querySelector('.user-profile');
                    if (oldProfile) oldProfile.remove();
                    
                    const profile = document.createElement('div');
                    profile.className = 'user-profile';
                    const firstLetter = currentUser.username.charAt(0).toUpperCase() || '?';
                    profile.innerHTML = `
                        <div class="avatar">${firstLetter}</div>
                        <span class="username">${currentUser.username}</span>
                        <button class="logout-btn" id="logoutBtn">Выйти</button>
                    `;
                    headerLeft.appendChild(profile);
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                    
                    getUserAvatar(currentUser.username).then(url => {
                        if (url) {
                            menuAvatar.innerHTML = `<img src="${url}" alt="avatar">`;
                            const profAvatar = document.querySelector('.user-profile .avatar');
                            if (profAvatar) profAvatar.innerHTML = `<img src="${url}" alt="avatar">`;
                        }
                    });
                    
                    setInterval(() => {
                        if (currentUser) {
                            updateOnlineStatus(currentUser.username, true);
                        }
                    }, 30000);
                }
            } else {
                authContainer.style.display = 'flex';
                chatList.style.display = 'none';
                bottomNav.style.display = 'none';
                searchArea.style.display = 'none';
                pageContainer.classList.remove('active');
                chatWindow.classList.remove('active');
                burgerBtn.classList.add('disabled');
                
                const profile = document.querySelector('.user-profile');
                if (profile) profile.remove();
                menuUsername.textContent = 'Гость';
                menuStatus.textContent = 'Не авторизован';
                menuStatus.className = '';
                menuAvatar.textContent = 'G';
            }
        }

        // --- Табы ---
        document.querySelectorAll('.nav-item').forEach(tab => {
            tab.addEventListener('click', function() {
                if (!currentUser) return;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                const tabName = this.dataset.tab;
                
                if (pageContainer.classList.contains('active')) pageContainer.classList.remove('active');
                chatWindow.classList.remove('active');
                
                if (tabName === 'chats') {
                    chatList.style.display = 'block';
                    searchArea.style.display = 'block';
                    bottomNav.style.display = 'flex';
                    loadChatsList();
                } else {
                    chatList.style.display = 'none';
                    searchArea.style.display = 'none';
                    showPage(tabName);
                }
            });
        });

        // --- Назад ---
        pageBack.addEventListener('click', function() {
            pageContainer.classList.remove('active');
            chatList.style.display = 'block';
            bottomNav.style.display = 'flex';
            searchArea.style.display = 'block';
            currentPage = null;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector('[data-tab="chats"]').classList.add('active');
            loadChatsList();
        });

        // --- Меню пункты ---
        document.querySelectorAll('.side-menu-item').forEach(item => {
            item.addEventListener('click', function() {
                const page = this.dataset.page;
                if (page && currentUser) showPage(page);
            });
        });

        // --- Проверка сессии и темы ---
        async function initApp() {
            const savedTheme = localStorage.getItem('guru_theme');
            if (savedTheme === 'light') {
                isDarkTheme = false;
                document.body.classList.add('light-theme');
                document.querySelector('.telegram-clone').classList.add('light');
            }

            try {
                const sessionUser = await checkSession();
                if (sessionUser) {
                    currentUser = { username: sessionUser };
                    showApp(true);
                    loadChatsList();
                    updateAllAvatars();
                    updateOnlineStatus(sessionUser, true);
                    listenForCalls();
                } else {
                    showApp(false);
                }
            } catch (error) {
                showApp(false);
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);

        document.addEventListener('click', function(e) {
            if (sideMenu.classList.contains('open')) {
                if (!sideMenu.contains(e.target) && e.target !== burgerBtn && !burgerBtn.contains(e.target)) {
                    closeMenu();
                }
            }
        });

        window.addEventListener('beforeunload', function() {
            if (currentUser) {
                updateOnlineStatus(currentUser.username, false);
            }
            if (currentCallId) {
                endCall('Звонок завершён');
            }
        });

        const style = document.createElement('style');
        style.textContent = `@keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
