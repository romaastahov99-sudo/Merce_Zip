<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GURU</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;height:100vh;display:flex;flex-direction:column;padding:10px}
        #auth{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
        #auth h1{background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:48px}
        #auth input{padding:12px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;font-size:18px;text-align:center;width:80%;max-width:300px;margin:8px 0}
        #auth button{padding:12px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:18px;cursor:pointer;width:80%;max-width:300px;margin:4px 0}
        #app{display:none;flex-direction:column;height:100vh}
        #header{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2a3a;flex-wrap:wrap;gap:4px}
        #header h1{background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px}
        #headerRight{display:flex;align-items:center;gap:6px}
        #userName{color:#ffd200;font-size:14px;background:#1a1a2e;padding:4px 12px;border-radius:12px;cursor:pointer}
        #settingsBtn{background:transparent;border:none;color:#888;font-size:20px;cursor:pointer}
        #tabs{display:flex;gap:4px;padding:8px 0;border-bottom:1px solid #2a2a3a}
        #tabs button{flex:1;padding:8px;border:none;background:transparent;color:#888;font-size:14px;cursor:pointer;border-radius:8px}
        #tabs button.active{background:#1e2a4a;color:#fff}
        #content{flex:1;overflow-y:auto;padding:10px 0}
        .contact{padding:12px 16px;background:#1a1a2e;margin:4px 0;border-radius:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
        .contact .block-btn{background:transparent;border:none;color:#ff6b6b;font-size:16px;cursor:pointer}
        .contact .block-btn:hover{color:#ff4444}
        .chat-area{display:none;flex-direction:column;height:100%}
        .chat-area.active{display:flex}
        #messages{flex:1;overflow-y:auto;padding:10px 0;display:flex;flex-direction:column;gap:4px}
        .msg{padding:8px 14px;border-radius:16px;max-width:70%;word-wrap:break-word;background:#1e2a4a;align-self:flex-start;border-bottom-left-radius:4px}
        .msg.my{background:#0084ff;align-self:flex-end;border-bottom-right-radius:4px;border-bottom-left-radius:16px}
        .msg .time{font-size:9px;color:#aaa;margin-left:8px}
        #bottom{display:flex;gap:8px;padding:10px 0}
        #bottom input{flex:1;padding:12px 16px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;font-size:16px;outline:none}
        #bottom button{padding:12px 20px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:16px;cursor:pointer}
        .back-btn{background:transparent;color:#ffd200;border:none;font-size:16px;cursor:pointer;padding:4px 8px}
        #info{text-align:center;font-size:11px;color:#444;padding:4px 0}
        .nick{color:#ffd200;font-size:12px;margin-bottom:2px;display:block}
        .blocked-msg{color:#ff6b6b;font-style:italic;text-align:center;padding:20px;font-size:14px}
        .group-item{color:#ffd200}
        
        /* ===== НАСТРОЙКИ (МОДАЛКА) ===== */
        #settingsModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000}
        #settingsModal.active{display:flex}
        #settingsModal .modal-content{background:#1a1a2e;padding:20px;border-radius:16px;width:90%;max-width:350px;max-height:80vh;overflow-y:auto}
        #settingsModal h2{color:#ffd200;margin-bottom:16px;text-align:center}
        .settings-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2a2a3a;cursor:pointer;align-items:center}
        .settings-item:hover{background:#2a2a4a;border-radius:8px;padding-left:8px;padding-right:8px}
        .settings-item .label{color:#fff}
        .settings-item .value{color:#888;font-size:13px}
        .settings-item .active-account{color:#ffd200}
        .settings-item .add-btn{color:#4caf50;font-size:20px}
        .settings-item .delete-btn{color:#ff6b6b;font-size:16px;margin-left:8px;background:transparent;border:none;cursor:pointer}
        #closeSettings{width:100%;padding:12px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:16px;cursor:pointer;margin-top:12px}
        .account-item{display:flex;justify-content:space-between;align-items:center;width:100%}
        .blocked-item{display:flex;justify-content:space-between;align-items:center;width:100%;padding:8px 0}
        .blocked-item .unblock-btn{background:transparent;border:none;color:#4caf50;cursor:pointer;font-size:14px}
        
        /* ===== ВЫБОР УЧАСТНИКОВ ДЛЯ ГРУППЫ ===== */
        #groupModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1001}
        #groupModal.active{display:flex}
        #groupModal .modal-content{background:#1a1a2e;padding:20px;border-radius:16px;width:90%;max-width:350px;max-height:80vh;overflow-y:auto}
        #groupModal h2{color:#ffd200;margin-bottom:12px;text-align:center}
        #groupModal input{padding:10px;border-radius:24px;border:none;background:#0f0f1a;color:#fff;font-size:16px;width:100%;margin-bottom:12px;outline:none}
        #groupModal .contact-item{padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:8px}
        #groupModal .contact-item:hover{background:#2a2a4a}
        #groupModal .contact-item input[type="checkbox"]{width:18px;height:18px;accent-color:#e94560}
        #groupModal .create-btn{width:100%;padding:12px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:16px;cursor:pointer;margin-top:12px}
        #groupModal .close-btn{width:100%;padding:8px;border-radius:24px;border:none;background:transparent;color:#888;font-size:14px;cursor:pointer;margin-top:6px}
        .create-group-btn{background:#1e2a4a;border:none;border-radius:20px;padding:8px 16px;color:#ffd200;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
        .create-group-btn:hover{background:#2a2a4a}
    </style>
</head>
<body>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div id="auth">
        <h1>GURU</h1>
        <div style="color:#888;font-size:13px;margin-bottom:20px;">твой приватный мир</div>
        <input id="codeInput" placeholder="Код" />
        <input id="nameInput" placeholder="Твоё имя" />
        <button id="loginBtn">Войти</button>
        <button id="newCodeBtn" style="background:#1e2a4a;">Создать аккаунт</button>
        <div style="color:#666;font-size:12px;margin-top:20px;text-align:center;">💡 Придумай код и имя, которые не забудешь!</div>
    </div>

    <!-- ===== ОСНОВНОЙ ЭКРАН ===== -->
    <div id="app">
        <div id="header">
            <h1>GURU</h1>
            <div id="headerRight">
                <span id="userName" style="color:#ffd200;font-size:14px;background:#1a1a2e;padding:4px 12px;border-radius:12px;cursor:pointer;">----</span>
                <button id="settingsBtn">⚙️</button>
            </div>
        </div>

        <div id="tabs">
            <button class="active" data-tab="chats">💬 Чаты</button>
            <button data-tab="contacts">📇 Контакты</button>
        </div>

        <div id="content">
            <!-- Чаты -->
            <div id="tab-chats">
                <button class="create-group-btn" id="createGroupBtn">👥 Создать группу</button>
                <div id="chatList"></div>
                <div id="chatView" class="chat-area">
                    <button class="back-btn" id="backToChats">← Назад</button>
                    <div id="chatHeader" style="font-weight:bold;padding:8px 0;"></div>
                    <div id="messages"></div>
                    <div id="bottom">
                        <input id="msgInput" placeholder="Сообщение..." />
                        <button id="sendBtn">➤</button>
                    </div>
                </div>
            </div>

            <!-- Контакты -->
            <div id="tab-contacts" style="display:none;">
                <div style="padding:10px 0;display:flex;gap:8px;flex-wrap:wrap;">
                    <input id="contactSearch" placeholder="Поиск по нику..." style="flex:1;padding:10px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;outline:none;min-width:100px;" />
                    <button id="addContactBtn" style="padding:10px 20px;border-radius:24px;border:none;background:#e94560;color:#fff;cursor:pointer;">➕ Добавить</button>
                </div>
                <div id="contactList"></div>
            </div>
        </div>

        <div id="info">👀 Жёлтые галочки — прочитано</div>
    </div>

    <!-- ===== НАСТРОЙКИ (МОДАЛКА) ===== -->
    <div id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Настройки</h2>
            <div id="accountsList"></div>
            <div class="settings-item" id="addAccountBtn">
                <span class="label">➕ Добавить аккаунт</span>
                <span class="add-btn">+</span>
            </div>
            <div class="settings-item" id="showBlockedBtn">
                <span class="label">🚫 Заблокированные</span>
                <span class="value">→</span>
            </div>
            <div id="blockedListContainer" style="display:none;margin-top:8px;border-top:1px solid #2a2a3a;padding-top:8px;">
                <div id="blockedList"></div>
            </div>
            <button id="closeSettings">✖️ Закрыть</button>
        </div>
    </div>

    <!-- ===== ГРУППА (МОДАЛКА ВЫБОРА УЧАСТНИКОВ) ===== -->
    <div id="groupModal">
        <div class="modal-content">
            <h2>👥 Создать группу</h2>
            <input id="groupNameInput" placeholder="Название группы" />
            <div style="margin-bottom:8px;color:#888;font-size:13px;">Выбери участников:</div>
            <div id="groupMembersList"></div>
            <button class="create-btn" id="confirmGroupBtn">✅ Создать</button>
            <button class="close-btn" id="closeGroupModal">✖️ Отмена</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        // =========================================================
        // 1. FIREBASE
        // =========================================================
        const FIREBASE_URL = "https://guromessenger-ef076-default-rtdb.firebaseio.com/"; // ⚠️ ЗАМЕНИ НА СВОЮ ССЫЛКУ
        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();

        // =========================================================
        // 2. ПЕРЕМЕННЫЕ
        // =========================================================
        let myCode = null;
        let myName = null;
        let currentChat = null;
        let accounts = [];
        let activeAccountIndex = 0;
        let blockedUsers = {};
        let groups = {};
        let contactsList = [];

        // =========================================================
        // 3. РАБОТА С АККАУНТАМИ
        // =========================================================
        function loadAccounts() {
            const saved = localStorage.getItem('guruAccounts');
            if (saved) {
                accounts = JSON.parse(saved);
                return true;
            }
            return false;
        }
        function saveAccounts() {
            localStorage.setItem('guruAccounts', JSON.stringify(accounts));
        }
        function loadActiveAccount() {
            const saved = localStorage.getItem('guruActiveAccount');
            if (saved !== null) {
                activeAccountIndex = parseInt(saved);
                return true;
            }
            return false;
        }
        function saveActiveAccount(index) {
            localStorage.setItem('guruActiveAccount', index.toString());
            activeAccountIndex = index;
        }

        function getCurrentAccount() {
            if (accounts.length === 0) return null;
            return accounts[activeAccountIndex] || null;
        }

        function setCurrentAccount(index) {
            if (index < 0 || index >= accounts.length) return;
            activeAccountIndex = index;
            const acc = accounts[index];
            myCode = acc.code;
            myName = acc.name;
            saveActiveAccount(index);
            document.getElementById('userName').textContent = myName;
            loadBlocked();
            loadChats();
            loadContacts();
            renderAccounts();
        }

        function addAccount(code, name) {
            accounts.push({ code, name });
            saveAccounts();
            renderAccounts();
        }

        function removeAccount(index) {
            if (accounts.length <= 1) {
                alert('❌ Нельзя удалить последний аккаунт!');
                return;
            }
            accounts.splice(index, 1);
            saveAccounts();
            if (activeAccountIndex >= accounts.length) {
                activeAccountIndex = accounts.length - 1;
            }
            const acc = accounts[activeAccountIndex];
            myCode = acc.code;
            myName = acc.name;
            saveActiveAccount(activeAccountIndex);
            document.getElementById('userName').textContent = myName;
            loadBlocked();
            loadChats();
            loadContacts();
            renderAccounts();
        }

        // =========================================================
        // 4. БЛОКИРОВКА
        // =========================================================
        function loadBlocked() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/blocked').once('value').then(snap => {
                blockedUsers = snap.val() || {};
                renderBlockedList();
            });
        }

        function toggleBlock(targetCode) {
            if (blockedUsers[targetCode]) {
                db.ref('users/' + myCode + '/blocked/' + targetCode).remove().then(() => {
                    delete blockedUsers[targetCode];
                    loadBlocked();
                    loadChats();
                    alert('✅ Пользователь разблокирован!');
                });
            } else {
                db.ref('users/' + myCode + '/blocked/' + targetCode).set(true).then(() => {
                    blockedUsers[targetCode] = true;
                    loadBlocked();
                    loadChats();
                    alert('🚫 Пользователь заблокирован!');
                });
            }
        }

        function isBlocked(code) {
            return blockedUsers[code] === true;
        }

        function renderBlockedList() {
            const container = document.getElementById('blockedList');
            container.innerHTML = '';
            const keys = Object.keys(blockedUsers);
            if (keys.length === 0) {
                container.innerHTML = '<div style="color:#888;font-size:13px;padding:8px 0;">Нет заблокированных</div>';
                return;
            }
            keys.forEach(code => {
                const div = document.createElement('div');
                div.className = 'blocked-item';
                db.ref('users/' + code + '/username').once('value').then(snap => {
                    const name = snap.val() || code;
                    div.innerHTML = `
                        <span>${name}</span>
                        <button class="unblock-btn" data-code="${code}">✅ Разблокировать</button>
                    `;
                    div.querySelector('.unblock-btn').addEventListener('click', function() {
                        toggleBlock(code);
                    });
                });
                container.appendChild(div);
            });
        }

        // =========================================================
        // 5. ГРУППЫ
        // =========================================================
        function loadGroups() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/groups').once('value').then(snap => {
                groups = snap.val() || {};
            });
        }

        function createGroup(name, members) {
            const groupId = 'g_' + Date.now();
            const groupData = {
                name: name,
                members: members,
                admin: myCode,
                createdAt: Date.now()
            };
            db.ref('groups/' + groupId).set(groupData).then(() => {
                // Добавляем группу всем участникам
                members.forEach(code => {
                    db.ref('users/' + code + '/groups/' + groupId).set(true);
                });
                loadChats();
                alert('✅ Группа создана!');
            });
        }

        // =========================================================
        // 6. АВТОРИЗАЦИЯ
        // =========================================================
        const auth = document.getElementById('auth');
        const app = document.getElementById('app');
        const codeInput = document.getElementById('codeInput');
        const nameInput = document.getElementById('nameInput');
        const loginBtn = document.getElementById('loginBtn');
        const newCodeBtn = document.getElementById('newCodeBtn');

        function showAuth() {
            auth.style.display = 'flex';
            app.style.display = 'none';
        }
        function showApp() {
            auth.style.display = 'none';
            app.style.display = 'flex';
            const acc = getCurrentAccount();
            if (acc) {
                myCode = acc.code;
                myName = acc.name;
                document.getElementById('userName').textContent = myName;
                loadBlocked();
                loadGroups();
                loadChats();
                loadContacts();
                renderAccounts();
            }
        }

        loginBtn.addEventListener('click', function() {
            const code = codeInput.value.trim();
            const name = nameInput.value.trim();
            if (!code) return alert('Введи код!');
            if (!name) return alert('Введи имя!');
            db.ref('users/' + code).once('value').then(snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    const exists = accounts.some(a => a.code === code);
                    if (exists) {
                        const idx = accounts.findIndex(a => a.code === code);
                        setCurrentAccount(idx);
                        showApp();
                    } else {
                        addAccount(code, data.username || name);
                        setCurrentAccount(accounts.length - 1);
                        showApp();
                    }
                } else {
                    db.ref('users/' + code).set({
                        code: code,
                        username: name,
                        contacts: {},
                        blocked: {},
                        groups: {},
                        createdAt: Date.now()
                    }).then(() => {
                        addAccount(code, name);
                        setCurrentAccount(accounts.length - 1);
                        showApp();
                        alert('✅ Аккаунт создан!');
                    });
                }
            }).catch(() => alert('Ошибка соединения!'));
        });

        newCodeBtn.addEventListener('click', function() {
            const newCode = codeInput.value.trim();
            const newName = nameInput.value.trim();
            if (!newCode) return alert('Придумай код!');
            if (newCode.length < 3) return alert('Код минимум 3 символа!');
            if (!newName) return alert('Придумай имя!');
            db.ref('users/' + newCode).once('value').then(snap => {
                if (snap.exists()) {
                    alert('❌ Код занят!');
                    return;
                }
                db.ref('users/' + newCode).set({
                    code: newCode,
                    username: newName,
                    contacts: {},
                    blocked: {},
                    groups: {},
                    createdAt: Date.now()
                }).then(() => {
                    addAccount(newCode, newName);
                    setCurrentAccount(accounts.length - 1);
                    showApp();
                    alert('✅ Аккаунт создан!');
                });
            }).catch(() => alert('Ошибка соединения!'));
        });

        if (loadAccounts() && loadActiveAccount()) {
            const acc = getCurrentAccount();
            if (acc) {
                myCode = acc.code;
                myName = acc.name;
                showApp();
            } else {
                showAuth();
            }
        } else {
            showAuth();
        }

        // =========================================================
        // 7. НАСТРОЙКИ
        // =========================================================
        const settingsModal = document.getElementById('settingsModal');
        const settingsBtn = document.getElementById('settingsBtn');
        const closeSettings = document.getElementById('closeSettings');
        const accountsList = document.getElementById('accountsList');

        settingsBtn.addEventListener('click', function() {
            renderAccounts();
            renderBlockedList();
            document.getElementById('blockedListContainer').style.display = 'none';
            settingsModal.classList.add('active');
        });

        closeSettings.addEventListener('click', function() {
            settingsModal.classList.remove('active');
        });

        settingsModal.addEventListener('click', function(e) {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('active');
            }
        });

        function renderAccounts() {
            accountsList.innerHTML = '';
            accounts.forEach((acc, index) => {
                const div = document.createElement('div');
                div.className = 'settings-item';
                const isActive = index === activeAccountIndex;
                div.innerHTML = `
                    <div class="account-item">
                        <span class="label ${isActive ? 'active-account' : ''}">
                            ${isActive ? '⭐ ' : ''}${acc.name}
                            <span style="font-size:10px;color:#888;">(${acc.code})</span>
                        </span>
                        <div>
                            ${!isActive ? `<button class="delete-btn" data-index="${index}">🗑️</button>` : ''}
                            <span style="color:#888;font-size:12px;">${isActive ? '✅ активен' : ''}</span>
                        </div>
                    </div>
                `;
                div.addEventListener('click', function() {
                    if (!isActive) {
                        setCurrentAccount(index);
                        settingsModal.classList.remove('active');
                    }
                });
                const deleteBtn = div.querySelector('.delete-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        removeAccount(index);
                    });
                }
                accountsList.appendChild(div);
            });
        }

        document.getElementById('addAccountBtn').addEventListener('click', function() {
            const code = prompt('Введи код нового аккаунта:');
            if (!code) return;
            const name = prompt('Введи имя для нового аккаунта:');
            if (!name) return;
            db.ref('users/' + code).once('value').then(snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    if (accounts.some(a => a.code === code)) {
                        alert('❌ Этот аккаунт уже добавлен!');
                        return;
                    }
                    addAccount(code, data.username || name);
                    alert('✅ Аккаунт добавлен!');
                } else {
                    db.ref('users/' + code).set({
                        code: code,
                        username: name,
                        contacts: {},
                        blocked: {},
                        groups: {},
                        createdAt: Date.now()
                    }).then(() => {
                        if (accounts.some(a => a.code === code)) {
                            alert('❌ Этот аккаунт уже добавлен!');
                            return;
                        }
                        addAccount(code, name);
                        alert('✅ Новый аккаунт создан и добавлен!');
                    });
                }
            });
        });

        let blockedVisible = false;
        document.getElementById('showBlockedBtn').addEventListener('click', function() {
            blockedVisible = !blockedVisible;
            document.getElementById('blockedListContainer').style.display = blockedVisible ? 'block' : 'none';
            if (blockedVisible) renderBlockedList();
        });

        // =========================================================
        // 8. ГРУППЫ (СОЗДАНИЕ)
        // =========================================================
        const groupModal = document.getElementById('groupModal');
        const createGroupBtn = document.getElementById('createGroupBtn');
        const closeGroupModal = document.getElementById('closeGroupModal');
        const groupNameInput = document.getElementById('groupNameInput');
        const groupMembersList = document.getElementById('groupMembersList');
        const confirmGroupBtn = document.getElementById('confirmGroupBtn');

        createGroupBtn.addEventListener('click', function() {
            groupNameInput.value = '';
            groupMembersList.innerHTML = '';
            // Загружаем контакты
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                let hasContacts = false;
                for (let code in contacts) {
                    if (isBlocked(code)) continue;
                    hasContacts = true;
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    db.ref('users/' + code + '/username').once('value').then(snap => {
                        const name = snap.val() || code;
                        div.innerHTML = `
                            <input type="checkbox" data-code="${code}" />
                            <span>${name}</span>
                        `;
                    });
                    groupMembersList.appendChild(div);
                }
                if (!hasContacts) {
                    groupMembersList.innerHTML = '<div style="color:#888;padding:8px;">Нет контактов для добавления</div>';
                }
                groupModal.classList.add('active');
            });
        });

        closeGroupModal.addEventListener('click', function() {
            groupModal.classList.remove('active');
        });

        confirmGroupBtn.addEventListener('click', function() {
            const name = groupNameInput.value.trim();
            if (!name) return alert('Введи название группы!');
            const checkboxes = groupMembersList.querySelectorAll('input[type="checkbox"]:checked');
            if (checkboxes.length === 0) return alert('Выбери хотя бы одного участника!');
            const members = [myCode];
            checkboxes.forEach(cb => {
                members.push(cb.dataset.code);
            });
            createGroup(name, members);
            groupModal.classList.remove('active');
        });

        // =========================================================
        // 9. ЧАТЫ (ЛИЧНЫЕ + ГРУППОВЫЕ)
        // =========================================================
        const chatList = document.getElementById('chatList');
        const chatView = document.getElementById('chatView');
        const messages = document.getElementById('messages');
        const chatHeader = document.getElementById('chatHeader');
        const backToChats = document.getElementById('backToChats');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        function loadChats() {
            if (!myCode) return;
            chatList.innerHTML = '';
            // Личные чаты
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                for (let code in contacts) {
                    if (isBlocked(code)) continue;
                    const div = document.createElement('div');
                    div.className = 'contact';
                    db.ref('users/' + code + '/username').once('value').then(snap => {
                        const name = snap.val() || code;
                        div.innerHTML = `
                            <span>💬 ${name}</span>
                            <button class="block-btn" data-code="${code}">🚫</button>
                        `;
                        div.querySelector('.block-btn').addEventListener('click', function(e) {
                            e.stopPropagation();
                            toggleBlock(code);
                        });
                    });
                    div.addEventListener('click', function() {
                        openChat('user', code);
                    });
                    chatList.appendChild(div);
                }
                // Группы
                db.ref('users/' + myCode + '/groups').once('value').then(snap => {
                    const groupsData = snap.val() || {};
                    for (let groupId in groupsData) {
                        const div = document.createElement('div');
                        div.className = 'contact';
                        div.style.color = '#ffd200';
                        db.ref('groups/' + groupId + '/name').once('value').then(snap => {
                            const name = snap.val() || groupId;
                            div.innerHTML = `
                                <span>👥 ${name}</span>
                            `;
                        });
                        div.addEventListener('click', function() {
                            openChat('group', groupId);
                        });
                        chatList.appendChild(div);
                    }
                    if (chatList.children.length === 0) {
                        chatList.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Нет чатов</div>';
                    }
                });
            });
        }

        function openChat(type, id) {
            if (type === 'user' && isBlocked(id)) {
                alert('🚫 Этот пользователь заблокирован!');
                return;
            }
            currentChat = { type, id };
            chatView.classList.add('active');
            chatList.style.display = 'none';
            if (type === 'user') {
                db.ref('users/' + id + '/username').once('value').then(snap => {
                    chatHeader.textContent = snap.val() || id;
                });
            } else {
                db.ref('groups/' + id + '/name').once('value').then(snap => {
                    chatHeader.textContent = '👥 ' + (snap.val() || id);
                });
            }
            loadMessages(type, id);
        }

        backToChats.addEventListener('click', function() {
            chatView.classList.remove('active');
            chatList.style.display = 'block';
            currentChat = null;
        });

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });

        function sendMessage() {
            if (!currentChat) return;
            if (currentChat.type === 'user' && isBlocked(currentChat.id)) {
                alert('🚫 Вы не можете отправлять сообщения заблокированному пользователю!');
                return;
            }
            const text = msgInput.value.trim();
            if (!text) return;
            const ref = currentChat.type === 'user' 
                ? db.ref('chats/' + getChatId(myCode, currentChat.id))
                : db.ref('groups/' + currentChat.id + '/messages');
            ref.push({
                from: myCode,
                text: text,
                time: Date.now()
            });
            msgInput.value = '';
        }

        function getChatId(code1, code2) {
            return [code1, code2].sort().join('_');
        }

        function loadMessages(type, id) {
            messages.innerHTML = '';
            const ref = type === 'user' 
                ? db.ref('chats/' + getChatId(myCode, id))
                : db.ref('groups/' + id + '/messages');
            ref.orderByChild('time').on('child_added', function(snap) {
                const data = snap.val();
                if (type === 'user' && isBlocked(data.from)) return;
                const div = document.createElement('div');
                div.className = 'msg';
                if (data.from === myCode) div.classList.add('my');
                db.ref('users/' + data.from + '/username').once('value').then(snap => {
                    const name = snap.val() || data.from;
                    const nickSpan = document.createElement('span');
                    nickSpan.className = 'nick';
                    nickSpan.textContent = name;
                    div.prepend(nickSpan);
                });
                const textSpan = document.createElement('span');
                textSpan.textContent = data.text;
                div.appendChild(textSpan);
                const timeSpan = document.createElement('span');
                timeSpan.className = 'time';
                const date = new Date(data.time);
                timeSpan.textContent = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
                div.appendChild(timeSpan);
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            });
        }

        // =========================================================
        // 10. КОНТАКТЫ
        // =========================================================
        const contactSearch = document.getElementById('contactSearch');
        const addContactBtn = document.getElementById('addContactBtn');
        const contactList = document.getElementById('contactList');

        function loadContacts() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                contactList.innerHTML = '';
                for (let code in contacts) {
                    if (isBlocked(code)) continue;
                    const div = document.createElement('div');
                    div.className = 'contact';
                    db.ref('users/' + code + '/username').once('value').then(snap => {
                        div.textContent = snap.val() || code;
                    });
                    contactList.appendChild(div);
                }
                if (Object.keys(contacts).length === 0) {
                    contactList.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Нет контактов</div>';
                }
            });
        }

        addContactBtn.addEventListener('click', function() {
            const query = contactSearch.value.trim();
            if (!query) return alert('Введи ник!');
            db.ref('users').orderByChild('username').equalTo(query).once('value').then(snap => {
                if (snap.exists()) {
                    let found = false;
                    snap.forEach(child => {
                        const code = child.key;
                        if (code !== myCode && !isBlocked(code)) {
                            db.ref('users/' + myCode + '/contacts/' + code).set(true);
                            found = true;
                        }
                    });
                    if (found) {
                        contactSearch.value = '';
                        loadContacts();
                        alert('✅ Контакт добавлен!');
                    } else {
                        alert('❌ Это ты или пользователь заблокирован!');
                    }
                } else {
                    alert('❌ Пользователь с таким ником не найден!');
                }
            });
        });

        // =========================================================
        // 11. ТАБЫ
        // =========================================================
        document.querySelectorAll('#tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('#content > div').forEach(d => d.style.display = 'none');
                document.getElementById('tab-' + tab).style.display = 'block';
                if (tab === 'chats') loadChats();
                if (tab === 'contacts') loadContacts();
            });
        });

        // =========================================================
        // 12. ИНИЦИАЛИЗАЦИЯ
        // =========================================================
        console.log('🔥 GURU запущен! Код: ' + myCode + ', Имя: ' + myName);
        console.log('📱 Аккаунтов: ' + accounts.length);
    </script>
</body>
</html>
