<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GURU</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;height:100vh;display:flex;flex-direction:column;padding:10px}
        #auth{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
        #auth h1{background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:48px}
        #auth input{padding:12px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;font-size:18px;text-align:center;width:80%;max-width:300px;margin:8px 0}
        #auth button{padding:12px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:18px;cursor:pointer;width:80%;max-width:300px;margin:4px 0}
        #app{display:none;flex-direction:column;height:100vh}
        #header{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2a3a;flex-wrap:wrap;gap:4px}
        #header h1{background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px}
        #headerRight{display:flex;align-items:center;gap:6px}
        #userName{color:#ffd200;font-size:14px;background:#1a1a2e;padding:4px 12px;border-radius:12px;cursor:pointer}
        #settingsBtn{background:transparent;border:none;color:#888;font-size:20px;cursor:pointer}
        #tabs{display:flex;gap:4px;padding:8px 0;border-bottom:1px solid #2a2a3a}
        #tabs button{flex:1;padding:8px;border:none;background:transparent;color:#888;font-size:14px;cursor:pointer;border-radius:8px}
        #tabs button.active{background:#1e2a4a;color:#fff}
        #content{flex:1;overflow-y:auto;padding:10px 0}
        .contact{padding:12px 16px;background:#1a1a2e;margin:4px 0;border-radius:12px;cursor:pointer;display:flex;justify-content:space-between}
        .chat-area{display:none;flex-direction:column;height:100%}
        .chat-area.active{display:flex}
        #messages{flex:1;overflow-y:auto;padding:10px 0;display:flex;flex-direction:column;gap:4px}
        .msg{padding:8px 14px;border-radius:16px;max-width:70%;word-wrap:break-word;background:#1e2a4a;align-self:flex-start;border-bottom-left-radius:4px}
        .msg.my{background:#0084ff;align-self:flex-end;border-bottom-right-radius:4px;border-bottom-left-radius:16px}
        .msg .time{font-size:9px;color:#aaa;margin-left:8px}
        #bottom{display:flex;gap:8px;padding:10px 0}
        #bottom input{flex:1;padding:12px 16px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;font-size:16px;outline:none}
        #bottom button{padding:12px 20px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:16px;cursor:pointer}
        .back-btn{background:transparent;color:#ffd200;border:none;font-size:16px;cursor:pointer;padding:4px 8px}
        #info{text-align:center;font-size:11px;color:#444;padding:4px 0}
        .nick{color:#ffd200;font-size:12px;margin-bottom:2px;display:block}
        
        /* ===== НАСТРОЙКИ (МОДАЛКА) ===== */
        #settingsModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000}
        #settingsModal.active{display:flex}
        #settingsModal .modal-content{background:#1a1a2e;padding:20px;border-radius:16px;width:90%;max-width:350px;max-height:80vh;overflow-y:auto}
        #settingsModal h2{color:#ffd200;margin-bottom:16px;text-align:center}
        .settings-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2a2a3a;cursor:pointer;align-items:center}
        .settings-item:hover{background:#2a2a4a;border-radius:8px;padding-left:8px;padding-right:8px}
        .settings-item .label{color:#fff}
        .settings-item .value{color:#888;font-size:13px}
        .settings-item .active-account{color:#ffd200}
        .settings-item .add-btn{color:#4caf50;font-size:20px}
        .settings-item .delete-btn{color:#ff6b6b;font-size:16px;margin-left:8px;background:transparent;border:none;cursor:pointer}
        #closeSettings{width:100%;padding:12px;border-radius:24px;border:none;background:#e94560;color:#fff;font-size:16px;cursor:pointer;margin-top:12px}
        .account-item{display:flex;justify-content:space-between;align-items:center;width:100%}
    </style>
</head>
<body>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div id="auth">
        <h1>GURU</h1>
        <div style="color:#888;font-size:13px;margin-bottom:20px;">твой приватный мир</div>
        <input id="codeInput" placeholder="Код" />
        <input id="nameInput" placeholder="Твоё имя" />
        <button id="loginBtn">Войти</button>
        <button id="newCodeBtn" style="background:#1e2a4a;">Создать аккаунт</button>
        <div style="color:#666;font-size:12px;margin-top:20px;text-align:center;">💡 Придумай код и имя, которые не забудешь!</div>
    </div>

    <!-- ===== ОСНОВНОЙ ЭКРАН ===== -->
    <div id="app">
        <div id="header">
            <h1>GURU</h1>
            <div id="headerRight">
                <span id="userName" style="color:#ffd200;font-size:14px;background:#1a1a2e;padding:4px 12px;border-radius:12px;cursor:pointer;">----</span>
                <button id="settingsBtn">⚙️</button>
            </div>
        </div>

        <div id="tabs">
            <button class="active" data-tab="chats">💬 Чаты</button>
            <button data-tab="contacts">📇 Контакты</button>
        </div>

        <div id="content">
            <!-- Чаты -->
            <div id="tab-chats">
                <div id="chatList"></div>
                <div id="chatView" class="chat-area">
                    <button class="back-btn" id="backToChats">← Назад</button>
                    <div id="chatHeader" style="font-weight:bold;padding:8px 0;"></div>
                    <div id="messages"></div>
                    <div id="bottom">
                        <input id="msgInput" placeholder="Сообщение..." />
                        <button id="sendBtn">➤</button>
                    </div>
                </div>
            </div>

            <!-- Контакты -->
            <div id="tab-contacts" style="display:none;">
                <div style="padding:10px 0;display:flex;gap:8px;flex-wrap:wrap;">
                    <input id="contactSearch" placeholder="Поиск по нику..." style="flex:1;padding:10px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;outline:none;min-width:100px;" />
                    <button id="addContactBtn" style="padding:10px 20px;border-radius:24px;border:none;background:#e94560;color:#fff;cursor:pointer;">➕ Добавить</button>
                </div>
                <div id="contactList"></div>
            </div>
        </div>

        <div id="info">👀 Жёлтые галочки — прочитано</div>
    </div>

    <!-- ===== НАСТРОЙКИ (МОДАЛКА) ===== -->
    <div id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Настройки</h2>
            <div id="accountsList">
                <!-- Аккаунты будут добавляться сюда -->
            </div>
            <div class="settings-item" id="addAccountBtn">
                <span class="label">➕ Добавить аккаунт</span>
                <span class="add-btn">+</span>
            </div>
            <button id="closeSettings">✖️ Закрыть</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        // =========================================================
        // 1. FIREBASE
        // =========================================================
        const FIREBASE_URL = "https://guromessenger-ef076-default-rtdb.firebaseio.com/"; // ⚠️ ЗАМЕНИ НА СВОЮ ССЫЛКУ
        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();

        // =========================================================
        // 2. ПЕРЕМЕННЫЕ
        // =========================================================
        let myCode = null;
        let myName = null;
        let currentChat = null;
        let accounts = [];
        let activeAccountIndex = 0;

        // =========================================================
        // 3. РАБОТА С АККАУНТАМИ
        // =========================================================
        function loadAccounts() {
            const saved = localStorage.getItem('guruAccounts');
            if (saved) {
                accounts = JSON.parse(saved);
                return true;
            }
            return false;
        }
        function saveAccounts() {
            localStorage.setItem('guruAccounts', JSON.stringify(accounts));
        }
        function loadActiveAccount() {
            const saved = localStorage.getItem('guruActiveAccount');
            if (saved !== null) {
                activeAccountIndex = parseInt(saved);
                return true;
            }
            return false;
        }
        function saveActiveAccount(index) {
            localStorage.setItem('guruActiveAccount', index.toString());
            activeAccountIndex = index;
        }

        function getCurrentAccount() {
            if (accounts.length === 0) return null;
            return accounts[activeAccountIndex] || null;
        }

        function setCurrentAccount(index) {
            if (index < 0 || index >= accounts.length) return;
            activeAccountIndex = index;
            const acc = accounts[index];
            myCode = acc.code;
            myName = acc.name;
            saveActiveAccount(index);
            document.getElementById('userName').textContent = myName;
            loadChats();
            loadContacts();
            renderAccounts();
        }

        function addAccount(code, name) {
            accounts.push({ code, name });
            saveAccounts();
            renderAccounts();
        }

        function removeAccount(index) {
            if (accounts.length <= 1) {
                alert('❌ Нельзя удалить последний аккаунт!');
                return;
            }
            accounts.splice(index, 1);
            saveAccounts();
            if (activeAccountIndex >= accounts.length) {
                activeAccountIndex = accounts.length - 1;
            }
            const acc = accounts[activeAccountIndex];
            myCode = acc.code;
            myName = acc.name;
            saveActiveAccount(activeAccountIndex);
            document.getElementById('userName').textContent = myName;
            loadChats();
            loadContacts();
            renderAccounts();
        }

        // =========================================================
        // 4. АВТОРИЗАЦИЯ
        // =========================================================
        const auth = document.getElementById('auth');
        const app = document.getElementById('app');
        const codeInput = document.getElementById('codeInput');
        const nameInput = document.getElementById('nameInput');
        const loginBtn = document.getElementById('loginBtn');
        const newCodeBtn = document.getElementById('newCodeBtn');

        function showAuth() {
            auth.style.display = 'flex';
            app.style.display = 'none';
        }
        function showApp() {
            auth.style.display = 'none';
            app.style.display = 'flex';
            const acc = getCurrentAccount();
            if (acc) {
                myCode = acc.code;
                myName = acc.name;
                document.getElementById('userName').textContent = myName;
                loadChats();
                loadContacts();
                renderAccounts();
            }
        }

        loginBtn.addEventListener('click', function() {
            const code = codeInput.value.trim();
            const name = nameInput.value.trim();
            if (!code) return alert('Введи код!');
            if (!name) return alert('Введи имя!');
            db.ref('users/' + code).once('value').then(snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    // Проверяем, есть ли уже такой аккаунт
                    const exists = accounts.some(a => a.code === code);
                    if (exists) {
                        const idx = accounts.findIndex(a => a.code === code);
                        setCurrentAccount(idx);
                        showApp();
                    } else {
                        addAccount(code, data.username || name);
                        setCurrentAccount(accounts.length - 1);
                        showApp();
                    }
                } else {
                    alert('❌ Аккаунт не найден!');
                }
            }).catch(() => alert('Ошибка соединения!'));
        });

        newCodeBtn.addEventListener('click', function() {
            const newCode = codeInput.value.trim();
            const newName = nameInput.value.trim();
            if (!newCode) return alert('Придумай код!');
            if (newCode.length < 3) return alert('Код минимум 3 символа!');
            if (!newName) return alert('Придумай имя!');
            db.ref('users/' + newCode).once('value').then(snap => {
                if (snap.exists()) {
                    alert('❌ Код занят!');
                    return;
                }
                db.ref('users/' + newCode).set({
                    code: newCode,
                    username: newName,
                    contacts: {},
                    createdAt: Date.now()
                }).then(() => {
                    addAccount(newCode, newName);
                    setCurrentAccount(accounts.length - 1);
                    showApp();
                    alert('✅ Аккаунт создан!');
                });
            }).catch(() => alert('Ошибка соединения!'));
        });

        // Восстановление аккаунтов
        if (loadAccounts() && loadActiveAccount()) {
            const acc = getCurrentAccount();
            if (acc) {
                myCode = acc.code;
                myName = acc.name;
                showApp();
            } else {
                showAuth();
            }
        } else {
            showAuth();
        }

        // =========================================================
        // 5. НАСТРОЙКИ (АККАУНТЫ)
        // =========================================================
        const settingsModal = document.getElementById('settingsModal');
        const settingsBtn = document.getElementById('settingsBtn');
        const closeSettings = document.getElementById('closeSettings');
        const accountsList = document.getElementById('accountsList');

        settingsBtn.addEventListener('click', function() {
            renderAccounts();
            settingsModal.classList.add('active');
        });

        closeSettings.addEventListener('click', function() {
            settingsModal.classList.remove('active');
        });

        settingsModal.addEventListener('click', function(e) {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('active');
            }
        });

        function renderAccounts() {
            accountsList.innerHTML = '';
            accounts.forEach((acc, index) => {
                const div = document.createElement('div');
                div.className = 'settings-item';
                const isActive = index === activeAccountIndex;
                div.innerHTML = `
                    <div class="account-item">
                        <span class="label ${isActive ? 'active-account' : ''}">
                            ${isActive ? '⭐ ' : ''}${acc.name}
                            <span style="font-size:10px;color:#888;">(${acc.code})</span>
                        </span>
                        <div>
                            ${!isActive ? `<button class="delete-btn" data-index="${index}">🗑️</button>` : ''}
                            <span style="color:#888;font-size:12px;">${isActive ? '✅ активен' : ''}</span>
                        </div>
                    </div>
                `;
                div.addEventListener('click', function() {
                    if (!isActive) {
                        setCurrentAccount(index);
                        settingsModal.classList.remove('active');
                    }
                });
                const deleteBtn = div.querySelector('.delete-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        removeAccount(index);
                    });
                }
                accountsList.appendChild(div);
            });
        }

        document.getElementById('addAccountBtn').addEventListener('click', function() {
            const code = prompt('Введи код нового аккаунта:');
            if (!code) return;
            db.ref('users/' + code).once('value').then(snap => {
                if (!snap.exists()) {
                    alert('❌ Аккаунт не найден!');
                    return;
                }
                const data = snap.val();
                const name = data.username || 'Аккаунт';
                // Проверяем, не добавлен ли уже
                if (accounts.some(a => a.code === code)) {
                    alert('❌ Этот аккаунт уже добавлен!');
                    return;
                }
                addAccount(code, name);
                alert('✅ Аккаунт добавлен!');
            });
        });

        // =========================================================
        // 6. ЧАТЫ
        // =========================================================
        const chatList = document.getElementById('chatList');
        const chatView = document.getElementById('chatView');
        const messages = document.getElementById('messages');
        const chatHeader = document.getElementById('chatHeader');
        const backToChats = document.getElementById('backToChats');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        function loadChats() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                chatList.innerHTML = '';
                for (let code in contacts) {
                    const div = document.createElement('div');
                    div.className = 'contact';
                    db.ref('users/' + code + '/username').once('value').then(snap => {
                        const name = snap.val() || code;
                        div.textContent = name;
                    });
                    div.addEventListener('click', function() {
                        openChat('user', code);
                    });
                    chatList.appendChild(div);
                }
                if (Object.keys(contacts).length === 0) {
                    chatList.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Нет контактов</div>';
                }
            });
        }

        function openChat(type, id) {
            currentChat = { type, id };
            chatView.classList.add('active');
            chatList.style.display = 'none';
            db.ref('users/' + id + '/username').once('value').then(snap => {
                chatHeader.textContent = snap.val() || id;
            });
            loadMessages(id);
        }

        backToChats.addEventListener('click', function() {
            chatView.classList.remove('active');
            chatList.style.display = 'block';
            currentChat = null;
        });

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });

        function sendMessage() {
            if (!currentChat) return;
            const text = msgInput.value.trim();
            if (!text) return;
            const chatId = getChatId(myCode, currentChat.id);
            db.ref('chats/' + chatId).push({
                from: myCode,
                to: currentChat.id,
                text: text,
                time: Date.now()
            });
            msgInput.value = '';
        }

        function getChatId(code1, code2) {
            return [code1, code2].sort().join('_');
        }

        function loadMessages(id) {
            const chatId = getChatId(myCode, id);
            messages.innerHTML = '';
            db.ref('chats/' + chatId).orderByChild('time').on('child_added', function(snap) {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = 'msg';
                if (data.from === myCode) div.classList.add('my');
                db.ref('users/' + data.from + '/username').once('value').then(snap => {
                    const name = snap.val() || data.from;
                    const nickSpan = document.createElement('span');
                    nickSpan.className = 'nick';
                    nickSpan.textContent = name;
                    div.prepend(nickSpan);
                });
                const textSpan = document.createElement('span');
                textSpan.textContent = data.text;
                div.appendChild(textSpan);
                const timeSpan = document.createElement('span');
                timeSpan.className = 'time';
                const date = new Date(data.time);
                timeSpan.textContent = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
                div.appendChild(timeSpan);
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            });
        }

        // =========================================================
        // 7. КОНТАКТЫ (ДОБАВЛЕНИЕ ПО НИКУ)
        // =========================================================
        const contactSearch = document.getElementById('contactSearch');
        const addContactBtn = document.getElementById('addContactBtn');
        const contactList = document.getElementById('contactList');

        function loadContacts() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                contactList.innerHTML = '';
                for (let code in contacts) {
                    const div = document.createElement('div');
                    div.className = 'contact';
                    db.ref('users/' + code + '/username').once('value').then(snap => {
                        div.textContent = snap.val() || code;
                    });
                    contactList.appendChild(div);
                }
                if (Object.keys(contacts).length === 0) {
                    contactList.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Нет контактов</div>';
                }
            });
        }

        addContactBtn.addEventListener('click', function() {
            const query = contactSearch.value.trim();
            if (!query) return alert('Введи ник!');
            db.ref('users').orderByChild('username').equalTo(query).once('value').then(snap => {
                if (snap.exists()) {
                    let found = false;
                    snap.forEach(child => {
                        const code = child.key;
                        if (code !== myCode) {
                            db.ref('users/' + myCode + '/contacts/' + code).set(true);
                            found = true;
                        }
                    });
                    if (found) {
                        contactSearch.value = '';
                        loadContacts();
                        alert('✅ Контакт добавлен!');
                    } else {
                        alert('❌ Это ты!');
                    }
                } else {
                    alert('❌ Пользователь с таким ником не найден!');
                }
            });
        });

        // =========================================================
        // 8. ТАБЫ
        // =========================================================
        document.querySelectorAll('#tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('#content > div').forEach(d => d.style.display = 'none');
                document.getElementById('tab-' + tab).style.display = 'block';
                if (tab === 'chats') loadChats();
                if (tab === 'contacts') loadContacts();
            });
        });

        // =========================================================
        // 9. ИНИЦИАЛИЗАЦИЯ
        // =========================================================
        console.log('🔥 GURU запущен! Код: ' + myCode + ', Имя: ' + myName);
        console.log('📱 Аккаунтов: ' + accounts.length);
    </script>
</body>
</html>
