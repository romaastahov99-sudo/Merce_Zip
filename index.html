<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GURU — Мессенджер</title>
    <style>
        :root {
            --bg: #0c0c0c;
            --sidebar-bg: #111111;
            --chat-bg: #0a0a0a;
            --message-out: #1a3a5c;
            --message-in: #1a1a1a;
            --accent: #ff6b00;
            --text: #ffffff;
            --text-secondary: #888888;
            --border: #1f1f1f;
            --input-bg: #1a1a1a;
            --hover: #1a1a1a;
            --danger: #ff4444;
            --success: #00c853;
            --guru-gradient: linear-gradient(135deg, #ff6b00, #ff3366);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 1300px;
            height: 100vh;
            background: var(--bg);
            display: flex;
            border: 1px solid var(--border);
        }

        .logo-text {
            background: var(--guru-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .sidebar {
            width: 380px;
            min-width: 380px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 { font-size: 20px; font-weight: 900; }
        .header-actions { display: flex; gap: 4px; }
        .btn-icon {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-icon:active { transform: scale(0.95); background: #252525; }
        .btn-logout { background: rgba(255,68,68,0.15); border-color: rgba(255,68,68,0.3); color: var(--danger); }
        .user-info-bar {
            font-size: 10px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 4px;
            padding: 3px 6px;
            background: var(--input-bg);
            border-radius: 6px;
        }

        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .tab:active { background: var(--hover); }

        .search-bar { padding: 8px 12px; }
        .search-bar input {
            width: 100%;
            padding: 9px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--accent); }

        .chat-list, .friends-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .chat-list::-webkit-scrollbar, .friends-list::-webkit-scrollbar { width: 3px; }
        .chat-list::-webkit-scrollbar-thumb, .friends-list::-webkit-scrollbar-thumb { background: #252525; border-radius: 10px; }

        .chat-item, .friend-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-left: 2px solid transparent;
            margin: 1px 6px;
            border-radius: 10px;
            gap: 10px;
            transition: 0.15s;
        }
        .chat-item:active, .friend-item:active { background: var(--hover); }
        .chat-item.active { background: rgba(255,107,0,0.1); border-left: 2px solid var(--accent); }
        .chat-avatar, .friend-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--guru-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 17px;
            flex-shrink: 0;
            color: #fff;
            position: relative;
        }
        .chat-avatar.group { background: linear-gradient(135deg, #ff3366, #ff6b00); }
        .online-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--sidebar-bg);
            position: absolute;
            bottom: 2px;
            right: 2px;
        }
        .chat-info, .friend-info { flex: 1; min-width: 0; }
        .chat-name, .friend-name { font-weight: 600; font-size: 14px; }
        .chat-last-msg, .friend-bio {
            color: var(--text-secondary);
            font-size: 11px;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .unread-count {
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .no-items { text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 13px; }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            min-width: 0;
        }
        .chat-header {
            padding: 10px 14px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .btn-back:active { background: #252525; transform: scale(0.95); }
        .avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--guru-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
            color: #fff;
        }
        .avatar-small.group { background: linear-gradient(135deg, #ff3366, #ff6b00); }
        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-name { font-weight: 600; font-size: 14px; }
        .chat-header-status { font-size: 11px; color: var(--text-secondary); }
        .chat-header-actions { display: flex; gap: 4px; }
        .btn-sm {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .btn-sm:active { background: #252525; }

        .messages-area {
            flex: 1;
            padding: 10px 14px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .messages-area::-webkit-scrollbar { width: 3px; }
        .messages-area::-webkit-scrollbar-thumb { background: #252525; border-radius: 10px; }

        .message-date {
            text-align: center;
            color: var(--text-secondary);
            font-size: 10px;
            margin: 8px 0;
            align-self: center;
            background: rgba(0,0,0,0.4);
            padding: 2px 10px;
            border-radius: 10px;
        }
        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            position: relative;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message.out {
            align-self: flex-end;
            background: var(--message-out);
            border-bottom-right-radius: 4px;
        }
        .message.in {
            align-self: flex-start;
            background: var(--message-in);
            border-bottom-left-radius: 4px;
        }
        .message .msg-sender {
            font-size: 11px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 2px;
        }
        .message .msg-time {
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            text-align: right;
            margin-top: 2px;
        }
        .message-actions {
            display: none;
            position: absolute;
            top: -8px;
            right: 6px;
            background: var(--sidebar-bg);
            border-radius: 6px;
            padding: 2px;
            border: 1px solid var(--border);
            gap: 1px;
        }
        .message:active .message-actions, .message:hover .message-actions { display: flex; }
        .msg-action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
            padding: 3px 5px;
            border-radius: 4px;
        }
        .msg-action-btn:active { background: var(--hover); color: #fff; }

        .input-area {
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            border-top: 1px solid var(--border);
            background: var(--sidebar-bg);
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
        }
        .input-area input:focus { border-color: var(--accent); }
        .btn-emoji { background: transparent; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; padding: 4px; }
        .btn-send {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--guru-gradient);
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-send:active { transform: scale(0.9); opacity: 0.8; }

        .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--text-secondary);
        }
        .empty-chat .big-emoji { font-size: 70px; margin-bottom: 12px; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--sidebar-bg);
            padding: 24px 20px;
            border-radius: 16px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
            border: 1px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal h3 { margin-bottom: 14px; font-size: 18px; }
        .modal input, .modal textarea {
            width: 100%;
            padding: 10px 12px;
            margin: 5px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: inherit;
            resize: vertical;
        }
        .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
        .btn-primary {
            width: 100%;
            padding: 11px;
            margin-top: 8px;
            border-radius: 10px;
            border: none;
            background: var(--guru-gradient);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
        .btn-secondary {
            width: 100%;
            padding: 9px;
            margin-top: 4px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
        }
        .hint { color: var(--text-secondary); font-size: 11px; margin-top: 6px; }
        .hidden { display: none !important; }

        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 20px;
            color: var(--text);
            z-index: 300;
            font-size: 13px;
            animation: slideDown 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

        /* ДЕВ-ПАНЕЛЬ — скрыта, только для тебя */
        .dev-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            display: none;
        }
        .dev-panel.visible { display: block; }
        .dev-btn {
            background: rgba(255,107,0,0.3);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 10px;
            opacity: 0.5;
            transition: 0.2s;
        }
        .dev-btn:hover { opacity: 1; background: rgba(255,107,0,0.5); }

        @media (max-width: 768px) {
            .app-container { border-radius: 0; border: none; }
            .sidebar { width: 100%; min-width: 100%; position: absolute; top: 0; left: 0; height: 100%; z-index: 10; }
            .sidebar.mobile-hidden { transform: translateX(-100%); pointer-events: none; }
            .main-chat { width: 100%; position: absolute; top: 0; left: 0; height: 100%; z-index: 20; display: flex; }
            .main-chat.mobile-hidden { display: none; }
            .btn-back { display: flex !important; }
            .message { max-width: 85%; }
        }
        @media (min-width: 769px) {
            .btn-back { display: none !important; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-top">
                <h2><span class="logo-text">⚡GURU</span></h2>
                <div class="header-actions">
                    <button class="btn-icon" onclick="showCreateGroupModal()" title="Группа">👥</button>
                    <button class="btn-icon" onclick="showAddContactModal()" title="Чат">💬</button>
                    <button class="btn-icon" onclick="showAddFriendModal()" title="Друг">👤+</button>
                    <button class="btn-icon" onclick="showProfileModal()" title="Профиль">⚙️</button>
                    <button class="btn-icon btn-logout" onclick="logout()" title="Выйти">🚪</button>
                </div>
            </div>
            <div class="user-info-bar" id="userInfoBar"></div>
        </div>

        <div class="tabs">
            <div class="tab active" id="tabChats" onclick="switchTab('chats')">💬 Чаты</div>
            <div class="tab" id="tabFriends" onclick="switchTab('friends')">👥 Друзья</div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="renderCurrentList()">
        </div>

        <div class="chat-list" id="chatList"></div>
        <div class="friends-list hidden" id="friendsList"></div>
    </div>

    <div class="main-chat mobile-hidden" id="mainChat">
        <div class="empty-chat" id="emptyChat">
            <div class="big-emoji">⚡</div>
            <div style="font-size:18px;font-weight:600;">GURU</div>
            <div style="font-size:12px;">Выберите чат</div>
        </div>

        <div class="chat-header hidden" id="chatHeader">
            <button class="btn-back" onclick="goBack()" title="Назад">←</button>
            <div class="avatar-small" id="chatAvatarSmall"></div>
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatTitleSmall"></div>
                <div class="chat-header-status" id="chatStatusSmall"></div>
            </div>
            <div class="chat-header-actions">
                <button class="btn-sm" onclick="pinChat()">📌</button>
                <button class="btn-sm" onclick="showChatInfo()">ℹ️</button>
                <button class="btn-sm" style="color:var(--danger);" onclick="deleteChat()">🗑️</button>
            </div>
        </div>

        <div class="messages-area hidden" id="messagesArea"></div>

        <div class="input-area hidden" id="inputArea">
            <button class="btn-emoji" onclick="showEmojiPicker()">😊</button>
            <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<!-- МОДАЛКИ -->
<div class="modal-overlay" id="registerModal">
    <div class="modal">
        <h3>⚡ <span class="logo-text">GURU</span> — Регистрация</h3>
        <input type="text" id="regNick" placeholder="Никнейм">
        <input type="password" id="regCode" placeholder="Секретный код">
        <input type="text" id="regBio" placeholder="О себе (необязательно)">
        <button class="btn-primary" onclick="register()">Создать аккаунт</button>
        <p class="hint">Уже есть аккаунт?</p>
        <button class="btn-secondary" onclick="showLogin()">Войти</button>
    </div>
</div>

<div class="modal-overlay hidden" id="loginModal">
    <div class="modal">
        <h3>⚡ <span class="logo-text">GURU</span> — Вход</h3>
        <input type="text" id="loginNick" placeholder="Никнейм">
        <input type="password" id="loginCode" placeholder="Код">
        <button class="btn-primary" onclick="login()">Войти</button>
        <button class="btn-secondary" onclick="showRegister()">Регистрация</button>
    </div>
</div>

<div class="modal-overlay hidden" id="profileModal">
    <div class="modal">
        <h3>👤 Профиль</h3>
        <p id="profileNickDisplay" style="font-weight:700;"></p>
        <p id="profileIdDisplay" style="font-size:10px;color:var(--text-secondary);"></p>
        <input type="text" id="editBio" placeholder="Описание">
        <button class="btn-primary" onclick="updateProfile()">Сохранить</button>
        <button class="btn-secondary" onclick="showThemeModal()">🎨 Тема</button>
        <button class="btn-secondary" onclick="closeModals()">Закрыть</button>
    </div>
</div>

<div class="modal-overlay hidden" id="themeModal">
    <div class="modal">
        <h3>🎨 Тема</h3>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;" id="themeGrid"></div>
        <button class="btn-secondary" onclick="closeModals()">Закрыть</button>
    </div>
</div>

<div class="modal-overlay hidden" id="createGroupModal">
    <div class="modal">
        <h3>👥 Группа</h3>
        <input type="text" id="groupName" placeholder="Название">
        <textarea id="groupDesc" placeholder="Описание" rows="2"></textarea>
        <button class="btn-primary" onclick="createGroup()">Создать</button>
        <button class="btn-secondary" onclick="closeModals()">Отмена</button>
    </div>
</div>

<div class="modal-overlay hidden" id="addContactModal">
    <div class="modal">
        <h3>💬 Новый чат</h3>
        <input type="text" id="contactNick" placeholder="Никнейм">
        <button class="btn-primary" onclick="addContact()">Начать чат</button>
        <button class="btn-secondary" onclick="closeModals()">Отмена</button>
    </div>
</div>

<div class="modal-overlay hidden" id="addFriendModal">
    <div class="modal">
        <h3>👤 Добавить друга</h3>
        <input type="text" id="friendNick" placeholder="Никнейм">
        <button class="btn-primary" onclick="addFriend()">Добавить</button>
        <button class="btn-secondary" onclick="closeModals()">Отмена</button>
    </div>
</div>

<div class="modal-overlay hidden" id="chatInfoModal">
    <div class="modal">
        <h3>ℹ️ Информация</h3>
        <div id="chatInfoContent"></div>
        <button class="btn-secondary" onclick="closeModals()">Закрыть</button>
    </div>
</div>

<div class="modal-overlay hidden" id="emojiModal">
    <div class="modal" style="width:340px;">
        <h3>😊 Эмодзи</h3>
        <div id="emojiGrid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;font-size:22px;max-height:200px;overflow-y:auto;"></div>
        <button class="btn-secondary" onclick="closeModals()">Закрыть</button>
    </div>
</div>

<!-- ДЕВ-ПАНЕЛЬ (скрытая) -->
<div class="modal-overlay hidden" id="devPanelModal">
    <div class="modal">
        <h3>🔧 Dev Panel</h3>
        <p style="color:var(--text-secondary);font-size:11px;margin-bottom:8px;">Вставь ссылку на свою базу данных</p>
        <input type="text" id="devDbUrl" placeholder="https://your-database.com/api">
        <button class="btn-primary" onclick="saveDevDbUrl()">Сохранить</button>
        <p style="color:var(--text-secondary);font-size:10px;margin-top:8px;">Текущая: <span id="devCurrentDb">нет</span></p>
        <button class="btn-secondary" onclick="closeModals()">Закрыть</button>
    </div>
</div>

<!-- КНОПКА ДЕВА (почти невидимая) -->
<div class="dev-panel" id="devPanel">
    <button class="dev-btn" onclick="openDevPanel()" title="Dev">⚙️</button>
</div>

<script>
    // ============================================================
    // ⚡ СЮДА ВСТАВЛЯЙ СВОЮ ССЫЛКУ НА БАЗУ ДАННЫХ
    // ============================================================
    const DEV_DB_URL = 'https://guromessenger-ef076-default-rtdb.firebaseio.com/'; // ← ТВОЯ ССЫЛКА (например: 'https://firebase.google.com/...')
    // ============================================================

    let DB_URL = localStorage.getItem('guru_dev_db_url') || DEV_DB_URL;

    function saveDevDbUrl() {
        const url = document.getElementById('devDbUrl').value.trim();
        DB_URL = url;
        localStorage.setItem('guru_dev_db_url', url);
        document.getElementById('devCurrentDb').textContent = url || 'нет';
        closeModals();
        showToast('✅ База данных подключена!');
    }

    function openDevPanel() {
        document.getElementById('devDbUrl').value = DB_URL;
        document.getElementById('devCurrentDb').textContent = DB_URL || 'нет';
        document.getElementById('devPanelModal').classList.remove('hidden');
    }

    // Показать дев-кнопку после 5 быстрых тапов по заголовку
    let tapCount = 0;
    let tapTimer = null;
    document.addEventListener('click', function(e) {
        if (e.target.closest('.logo-text') || e.target.closest('.sidebar-header h2')) {
            tapCount++;
            if (tapCount >= 5) {
                document.getElementById('devPanel').classList.add('visible');
                tapCount = 0;
            }
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
        }
    });

    // ============================================================
    // 📦 ДАННЫЕ
    // ============================================================
    const STORAGE_KEY = 'guru_messenger_data';

    function getDefaultData() {
        return {
            users: {},
            groups: {},
            privateChats: {},
            friends: {},
            currentUser: null,
            activeChat: null,
            pinnedChats: [],
            theme: 'orange',
            unreadCounts: {},
            currentTab: 'chats'
        };
    }

    async function saveDataToDB(data) {
        // Всегда сохраняем локально
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

        // Если есть внешняя БД — отправляем туда
        if (DB_URL) {
            try {
                await fetch(DB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: STORAGE_KEY, data: data })
                });
            } catch (e) {
                console.log('⚠️ Внешняя БД недоступна, работаем локально');
            }
        }
    }

    async function loadDataFromDB() {
        // Если есть внешняя БД — пробуем загрузить оттуда
        if (DB_URL) {
            try {
                const response = await fetch(DB_URL + '?key=' + STORAGE_KEY);
                if (response.ok) {
                    const result = await response.json();
                    const data = result.data || result;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    return fixData(data);
                }
            } catch (e) {
                console.log('⚠️ Загружаем локальные данные');
            }
        }

        // Загружаем локально
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return fixData(JSON.parse(raw));
        return getDefaultData();
    }

    function fixData(data) {
        if (!data.friends) data.friends = {};
        if (!data.pinnedChats) data.pinnedChats = [];
        if (!data.theme) data.theme = 'orange';
        if (!data.unreadCounts) data.unreadCounts = {};
        if (!data.currentTab) data.currentTab = 'chats';
        return data;
    }

    let appData = getDefaultData();

    // ============ ХЕЛПЕРЫ ============
    function genId() { return 'g_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
    function getChatKey(a, b) { return [a, b].sort().join(':'); }
    function getTime() { const d = new Date(); return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0'); }
    function getDate() { const d = new Date(); const months = ['янв', 'фев', 'мар', 'апр', 'мая', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек']; return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear(); }
    function isMobile() { return window.innerWidth <= 768; }

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // ============ ТЕМЫ ============
    const themes = {
        orange: { accent: '#ff6b00', grad: 'linear-gradient(135deg,#ff6b00,#ff3366)', grad2: 'linear-gradient(135deg,#ff3366,#ff6b00)' },
        purple: { accent: '#8b5cf6', grad: 'linear-gradient(135deg,#667eea,#764ba2)', grad2: 'linear-gradient(135deg,#764ba2,#667eea)' },
        green: { accent: '#00c853', grad: 'linear-gradient(135deg,#00c853,#00b0ff)', grad2: 'linear-gradient(135deg,#00b0ff,#00c853)' },
        red: { accent: '#ff4444', grad: 'linear-gradient(135deg,#ff4444,#ff8800)', grad2: 'linear-gradient(135deg,#ff8800,#ff4444)' },
        blue: { accent: '#448aff', grad: 'linear-gradient(135deg,#448aff,#00e5ff)', grad2: 'linear-gradient(135deg,#00e5ff,#448aff)' },
        dark: { accent: '#ff6b00', grad: 'linear-gradient(135deg,#ff6b00,#000)', grad2: 'linear-gradient(135deg,#000,#ff6b00)' }
    };

    function applyTheme(name) {
        const t = themes[name] || themes.orange;
        document.documentElement.style.setProperty('--accent', t.accent);
        document.documentElement.style.setProperty('--guru-gradient', t.grad);
        appData.theme = name;
        saveDataToDB(appData);
    }

    function showThemeModal() {
        const grid = document.getElementById('themeGrid');
        grid.innerHTML = Object.keys(themes).map(name => {
            const t = themes[name];
            const active = appData.theme === name ? 'border:2px solid #fff;' : '';
            return `<div style="height:50px;border-radius:10px;cursor:pointer;background:${t.grad};${active}" onclick="applyTheme('${name}');closeModals();showToast('🎨 Тема обновлена!')"></div>`;
        }).join('');
        document.getElementById('themeModal').classList.remove('hidden');
    }

    // ============ ТАБЫ ============
    function switchTab(tab) {
        appData.currentTab = tab;
        document.getElementById('tabChats').classList.toggle('active', tab === 'chats');
        document.getElementById('tabFriends').classList.toggle('active', tab === 'friends');
        document.getElementById('chatList').classList.toggle('hidden', tab !== 'chats');
        document.getElementById('friendsList').classList.toggle('hidden', tab !== 'friends');
        saveDataToDB(appData);
        renderCurrentList();
    }

    function renderCurrentList() {
        if (appData.currentTab === 'chats') renderChatList();
        else renderFriendsList();
    }

    function renderChatList() {
        const list = document.getElementById('chatList');
        if (!appData.currentUser) return;
        const myNick = appData.currentUser.nick;
        const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
        let chats = [];

        for (const [key, chat] of Object.entries(appData.privateChats)) {
            const parts = key.split(':');
            const other = parts[0] === myNick ? parts[1] : parts[0];
            if (search && !other.toLowerCase().includes(search)) continue;
            chats.push({
                id: key, type: 'private', name: other,
                lastMsg: chat.messages.slice(-1)[0]?.text || '',
                time: chat.messages.slice(-1)[0]?.time || '',
                avatar: other.charAt(0).toUpperCase(),
                unread: appData.unreadCounts[key] || 0,
                pinned: appData.pinnedChats.includes(key)
            });
        }

        for (const [gid, group] of Object.entries(appData.groups)) {
            if (!group.members.includes(myNick)) continue;
            if (search && !group.name.toLowerCase().includes(search)) continue;
            chats.push({
                id: gid, type: 'group', name: group.name,
                lastMsg: group.messages.slice(-1)[0]?.text || '',
                time: group.messages.slice(-1)[0]?.time || '',
                avatar: group.name.charAt(0).toUpperCase(),
                isGroup: true, unread: appData.unreadCounts[gid] || 0,
                pinned: appData.pinnedChats.includes(gid),
                members: group.members.length
            });
        }

        chats.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

        if (chats.length === 0) { list.innerHTML = '<div class="no-items">Нет чатов</div>'; return; }

        list.innerHTML = chats.map(c => {
            const active = appData.activeChat?.id === c.id ? 'active' : '';
            return `
                <div class="chat-item ${active}" onclick="openChat('${c.type}', '${c.id}')">
                    <div class="chat-avatar ${c.isGroup ? 'group' : ''}">
                        ${c.avatar}
                        ${c.type === 'private' ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${c.pinned ? '📌 ' : ''}${c.name} ${c.isGroup ? `<span style="font-size:10px;color:var(--text-secondary);">(${c.members})</span>` : ''}</div>
                        <div class="chat-last-msg">${c.lastMsg.substring(0, 35)}</div>
                    </div>
                    <div style="text-align:right;flex-shrink:0;">
                        <div style="font-size:10px;color:var(--text-secondary);">${c.time}</div>
                        ${c.unread > 0 ? `<div class="unread-count">${c.unread}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderFriendsList() {
        const list = document.getElementById('friendsList');
        if (!appData.currentUser) return;
        const myNick = appData.currentUser.nick;
        const friends = appData.friends[myNick] || [];
        const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
        const filtered = friends.filter(f => !search || f.toLowerCase().includes(search));

        if (filtered.length === 0) {
            list.innerHTML = '<div class="no-items">Нет друзей<br><small>Добавьте через 👤+</small></div>';
            return;
        }

        list.innerHTML = filtered.map(f => {
            const user = appData.users[f];
            return `
                <div class="friend-item" onclick="openChatWithFriend('${f}')">
                    <div class="friend-avatar">${f.charAt(0).toUpperCase()}<div class="online-dot"></div></div>
                    <div class="friend-info">
                        <div class="friend-name">${f}</div>
                        <div class="friend-bio">${user?.bio || 'Нет описания'}</div>
                    </div>
                    <button class="btn-sm" onclick="event.stopPropagation();removeFriend('${f}')" style="color:var(--danger);">✕</button>
                </div>
            `;
        }).join('');
    }

    function openChatWithFriend(nick) {
        if (!appData.currentUser) return;
        const key = getChatKey(appData.currentUser.nick, nick);
        if (!appData.privateChats[key]) appData.privateChats[key] = { messages: [] };
        appData.unreadCounts[key] = 0;
        saveDataToDB(appData);
        openChat('private', key);
    }

    function openChat(type, id) {
        appData.activeChat = { type, id };
        appData.unreadCounts[id] = 0;
        saveDataToDB(appData);
        if (isMobile()) {
            document.getElementById('sidebar').classList.add('mobile-hidden');
            document.getElementById('mainChat').classList.remove('mobile-hidden');
        }
        renderAll();
        document.getElementById('messageInput')?.focus();
    }

    function goBack() {
        appData.activeChat = null;
        saveDataToDB(appData);
        if (isMobile()) {
            document.getElementById('sidebar').classList.remove('mobile-hidden');
            document.getElementById('mainChat').classList.add('mobile-hidden');
        }
        renderAll();
    }

    function renderAll() {
        updateUserInfoBar();
        renderChatList();
        renderFriendsList();
        renderCurrentChat();
    }

    function updateUserInfoBar() {
        if (!appData.currentUser) return;
        const user = appData.users[appData.currentUser.nick];
        const friendsCount = (appData.friends[appData.currentUser.nick] || []).length;
        document.getElementById('userInfoBar').textContent =
            '👤 ' + appData.currentUser.nick + ' | Друзей: ' + friendsCount + (user?.bio ? ' | ' + user.bio.substring(0, 20) : '');
    }

    function renderCurrentChat() {
        const emptyChat = document.getElementById('emptyChat');
        const chatHeader = document.getElementById('chatHeader');
        const messagesArea = document.getElementById('messagesArea');
        const inputArea = document.getElementById('inputArea');

        if (!appData.activeChat || !appData.currentUser) {
            emptyChat.classList.remove('hidden');
            chatHeader.classList.add('hidden');
            messagesArea.classList.add('hidden');
            inputArea.classList.add('hidden');
            return;
        }

        emptyChat.classList.add('hidden');
        chatHeader.classList.remove('hidden');
        messagesArea.classList.remove('hidden');
        inputArea.classList.remove('hidden');

        const myNick = appData.currentUser.nick;
        let messages = [], title = '', avatar = '', isGroup = false, status = '';

        if (appData.activeChat.type === 'private') {
            const key = appData.activeChat.id;
            const parts = key.split(':');
            const other = parts[0] === myNick ? parts[1] : parts[0];
            title = other;
            avatar = other.charAt(0).toUpperCase();
            messages = appData.privateChats[key]?.messages || [];
            const isFriend = (appData.friends[myNick] || []).includes(other);
            status = isFriend ? '⭐ Друг | В сети' : 'В сети';
        } else {
            const group = appData.groups[appData.activeChat.id];
            if (group) {
                title = group.name;
                avatar = group.name.charAt(0).toUpperCase();
                messages = group.messages;
                isGroup = true;
                status = group.members.length + ' участников';
            }
        }

        document.getElementById('chatTitleSmall').textContent = title;
        document.getElementById('chatStatusSmall').textContent = status;
        document.getElementById('chatAvatarSmall').textContent = avatar;
        document.getElementById('chatAvatarSmall').className = 'avatar-small' + (isGroup ? ' group' : '');
        document.getElementById('chatAvatarSmall').style.background = isGroup ?
            'linear-gradient(135deg,#ff3366,#ff6b00)' : 'var(--guru-gradient)';

        let lastDate = '';
        messagesArea.innerHTML = messages.map((msg, i) => {
            const d = msg.date || '';
            let dateDiv = '';
            if (d && d !== lastDate) { lastDate = d;
                dateDiv = `<div class="message-date">${d}</div>`; }
            const isOut = msg.sender === myNick;
            const senderHtml = (isGroup && !isOut) ? `<div class="msg-sender">${msg.sender}</div>` : '';
            const editedHtml = msg.edited ? ' <span style="font-size:8px;color:rgba(255,255,255,0.3);">изм.</span>' : '';
            return `
                ${dateDiv}
                <div class="message ${isOut ? 'out' : 'in'}">
                    ${senderHtml}
                    <div>${msg.text}</div>
                    <div class="msg-time">${msg.time}${editedHtml}</div>
                    ${isOut ? `
                    <div class="message-actions">
                        <button class="msg-action-btn" onclick="editMsg(${i})">✏️</button>
                        <button class="msg-action-btn" onclick="delMsg(${i})">🗑️</button>
                    </div>` : ''}
                </div>
            `;
        }).join('');
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !appData.activeChat || !appData.currentUser) return;

        const msg = {
            sender: appData.currentUser.nick,
            text: text,
            time: getTime(),
            date: getDate(),
            edited: false
        };

        const chatId = appData.activeChat.id;

        if (appData.activeChat.type === 'private') {
            if (!appData.privateChats[chatId]) appData.privateChats[chatId] = { messages: [] };
            appData.privateChats[chatId].messages.push(msg);
            if (!appData.unreadCounts[chatId]) appData.unreadCounts[chatId] = 0;
            appData.unreadCounts[chatId]++;
        } else {
            const group = appData.groups[chatId];
            if (group) {
                group.messages.push(msg);
                if (!appData.unreadCounts[chatId]) appData.unreadCounts[chatId] = 0;
                appData.unreadCounts[chatId]++;
            }
        }

        input.value = '';
        saveDataToDB(appData);
        renderAll();
        input.focus();
    }

    function editMsg(i) {
        const chatId = appData.activeChat.id;
        const msgs = appData.activeChat.type === 'private' ? appData.privateChats[chatId]?.messages : appData.groups[chatId]?.messages;
        if (!msgs || !msgs[i]) return;
        const t = prompt('Редактировать:', msgs[i].text);
        if (t && t.trim()) { msgs[i].text = t.trim();
            msgs[i].edited = true;
            saveDataToDB(appData);
            renderAll();
            showToast('✏️ Изменено'); }
    }

    function delMsg(i) {
        if (!confirm('Удалить сообщение?')) return;
        const chatId = appData.activeChat.id;
        const msgs = appData.activeChat.type === 'private' ? appData.privateChats[chatId]?.messages : appData.groups[chatId]?.messages;
        if (!msgs) return;
        msgs.splice(i, 1);
        saveDataToDB(appData);
        renderAll();
        showToast('🗑️ Удалено');
    }

    function pinChat() {
        if (!appData.activeChat) return;
        const id = appData.activeChat.id;
        if (appData.pinnedChats.includes(id)) {
            appData.pinnedChats = appData.pinnedChats.filter(c => c !== id);
        } else {
            appData.pinnedChats.push(id);
        }
        saveDataToDB(appData);
        renderAll();
    }

    function deleteChat() {
        if (!confirm('Удалить чат полностью?')) return;
        const id = appData.activeChat.id;
        if (appData.activeChat.type === 'private') delete appData.privateChats[id];
        else delete appData.groups[id];
        appData.activeChat = null;
        appData.pinnedChats = appData.pinnedChats.filter(c => c !== id);
        delete appData.unreadCounts[id];
        saveDataToDB(appData);
        if (isMobile()) goBack();
        renderAll();
    }

    function showChatInfo() {
        if (!appData.activeChat) return;
        const c = document.getElementById('chatInfoContent');
        if (appData.activeChat.type === 'private') {
            const parts = appData.activeChat.id.split(':');
            const other = parts[0] === appData.currentUser.nick ? parts[1] : parts[0];
            const user = appData.users[other];
            c.innerHTML = `<p><b>Ник:</b> ${other}</p><p><b>Описание:</b> ${user?.bio || 'Нет'}</p><p><b>ID:</b> ${user?.id || '—'}</p>`;
        } else {
            const g = appData.groups[appData.activeChat.id];
            c.innerHTML = `<p><b>Название:</b> ${g.name}</p><p><b>Описание:</b> ${g.desc || 'Нет'}</p><p><b>Участники:</b> ${g.members.join(', ')}</p>
                <button class="btn-primary" onclick="inviteToGroup()" style="margin-top:6px;">➕ Пригласить</button>`;
        }
        document.getElementById('chatInfoModal').classList.remove('hidden');
    }

    function inviteToGroup() {
        const nick = prompt('Никнейм для приглашения:');
        if (!nick || !appData.activeChat || appData.activeChat.type !== 'group') return;
        const g = appData.groups[appData.activeChat.id];
        if (!g) return;
        if (g.members.includes(nick)) return alert('⚠️ Уже в группе!');
        g.members.push(nick);
        saveDataToDB(appData);
        renderAll();
        showToast('➕ ' + nick + ' добавлен в группу!');
    }

    function showAddFriendModal() { document.getElementById('addFriendModal').classList.remove('hidden'); }

    function addFriend() {
        const nick = document.getElementById('friendNick').value.trim();
        if (!nick || !appData.currentUser) return;
        if (nick === appData.currentUser.nick) return alert('⚠️ Нельзя добавить себя!');
        if (!appData.friends[appData.currentUser.nick]) appData.friends[appData.currentUser.nick] = [];
        if (appData.friends[appData.currentUser.nick].includes(nick)) return alert('⚠️ Уже в друзьях!');
        appData.friends[appData.currentUser.nick].push(nick);
        document.getElementById('friendNick').value = '';
        saveDataToDB(appData);
        closeModals();
        if (appData.currentTab === 'friends') renderFriendsList();
        updateUserInfoBar();
        showToast('👤 ' + nick + ' добавлен в друзья!');
    }

    function removeFriend(nick) {
        if (!confirm('Удалить ' + nick + ' из друзей?')) return;
        if (appData.friends[appData.currentUser.nick]) {
            appData.friends[appData.currentUser.nick] = appData.friends[appData.currentUser.nick].filter(f => f !== nick);
        }
        saveDataToDB(appData);
        renderFriendsList();
        updateUserInfoBar();
        showToast('✕ ' + nick + ' удалён');
    }

    function register() {
        const nick = document.getElementById('regNick').value.trim();
        const code = document.getElementById('regCode').value.trim();
        const bio = document.getElementById('regBio').value.trim();
        if (!nick || !code) return alert('⚠️ Заполни ник и код!');
        const uid = genId();
        appData.users[nick] = { code, id: uid, bio };
        appData.currentUser = { nick, id: uid };
        if (!appData.friends[nick]) appData.friends[nick] = [];
        saveDataToDB(appData);
        closeModals();
        switchTab(appData.currentTab || 'chats');
        renderAll();
        showToast('🎉 Добро пожаловать, ' + nick + '!');
    }

    function login() {
        const nick = document.getElementById('loginNick').value.trim();
        const code = document.getElementById('loginCode').value.trim();
        if (!nick || !code) return alert('⚠️ Заполни все поля!');
        const user = appData.users[nick];
        if (!user || user.code !== code) return alert('❌ Неверный ник или код!');
        appData.currentUser = { nick, id: user.id };
        if (!appData.friends[nick]) appData.friends[nick] = [];
        saveDataToDB(appData);
        closeModals();
        switchTab(appData.currentTab || 'chats');
        renderAll();
        showToast('👋 С возвращением, ' + nick + '!');
    }

    function logout() {
        if (!confirm('Выйти из аккаунта?')) return;
        appData.currentUser = null;
        appData.activeChat = null;
        saveDataToDB(appData);
        document.getElementById('registerModal').classList.remove('hidden');
        document.getElementById('loginModal').classList.add('hidden');
        if (isMobile()) {
            document.getElementById('sidebar').classList.remove('mobile-hidden');
            document.getElementById('mainChat').classList.add('mobile-hidden');
        }
        renderAll();
    }

    function showLogin() { document.getElementById('registerModal').classList.add('hidden');
        document.getElementById('loginModal').classList.remove('hidden'); }

    function showRegister() { document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('registerModal').classList.remove('hidden'); }

    function showProfileModal() {
        if (!appData.currentUser) return;
        document.getElementById('profileNickDisplay').textContent = 'Ник: ' + appData.currentUser.nick;
        document.getElementById('profileIdDisplay').textContent = 'ID: ' + appData.currentUser.id;
        document.getElementById('editBio').value = appData.users[appData.currentUser.nick]?.bio || '';
        document.getElementById('profileModal').classList.remove('hidden');
    }

    function updateProfile() {
        const bio = document.getElementById('editBio').value.trim();
        if (appData.users[appData.currentUser.nick]) appData.users[appData.currentUser.nick].bio = bio;
        saveDataToDB(appData);
        closeModals();
        updateUserInfoBar();
        showToast('✅ Профиль обновлён!');
    }

    function showCreateGroupModal() { document.getElementById('createGroupModal').classList.remove('hidden'); }

    function showAddContactModal() { document.getElementById('addContactModal').classList.remove('hidden'); }

    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden')); }

    function createGroup() {
        const name = document.getElementById('groupName').value.trim();
        const desc = document.getElementById('groupDesc').value.trim();
        if (!name || !appData.currentUser) return;
        const gid = genId();
        appData.groups[gid] = { name, desc, members: [appData.currentUser.nick], messages: [] };
        document.getElementById('groupName').value = '';
        document.getElementById('groupDesc').value = '';
        saveDataToDB(appData);
        closeModals();
        openChat('group', gid);
        showToast('👥 Группа создана!');
    }

    function addContact() {
        const nick = document.getElementById('contactNick').value.trim();
        if (!nick || !appData.currentUser) return;
        if (nick === appData.currentUser.nick) return alert('⚠️ Нельзя написать себе!');
        const key = getChatKey(appData.currentUser.nick, nick);
        if (!appData.privateChats[key]) appData.privateChats[key] = { messages: [] };
        document.getElementById('contactNick').value = '';
        saveDataToDB(appData);
        closeModals();
        openChat('private', key);
    }

    function showEmojiPicker() {
        const grid = document.getElementById('emojiGrid');
        const emojis = ['😀', '😂', '😍', '🥰', '😎', '🤩', '😇', '🤔', '😴', '😡', '🥺', '👍', '👎', '👏', '🙏', '💪', '🔥',
            '❤️', '💔', '✨', '⭐', '🎉', '🎂', '🍕', '☕', '⚡', '🌟', '💯', '✅', '❌', '⚠️', '💡'
        ];
        grid.innerHTML = emojis.map(e => `<span style="cursor:pointer;" onclick="insertEmoji('${e}')">${e}</span>`).join(
            '');
        document.getElementById('emojiModal').classList.remove('hidden');
    }

    function insertEmoji(e) { document.getElementById('messageInput').value += e;
        closeModals();
        document.getElementById('messageInput').focus(); }

    function autoRefresh() {
        if (appData.currentUser) {
            loadDataFromDB().then(freshData => {
                const currentUser = appData.currentUser;
                const activeChat = appData.activeChat;
                appData = freshData;
                appData.currentUser = currentUser;
                appData.activeChat = activeChat;
                renderAll();
            });
        }
    }

    setInterval(autoRefresh, 1000);

    async function initApp() {
        appData = await loadDataFromDB();
        applyTheme(appData.theme || 'orange');
        if (appData.currentUser) {
            closeModals();
            updateUserInfoBar();
            switchTab(appData.currentTab || 'chats');
            renderAll();
        } else {
            document.getElementById('registerModal').classList.remove('hidden');
            document.getElementById('loginModal').classList.add('hidden');
        }
    }

    initApp();
    console.log('⚡ GURU Messenger готов');
</script>
</body>
</html>
