<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GURU</title>
    <style>
        :root {
            --bg: #0f0f0f; --header: #1a1a1a; --chat-bg: #0f0f0f;
            --msg-rec: #2c2c2c; --input-bg: #1a1a1a; --text: #fff;
            --sub: #aaa; --accent: #4a90d9; --border: #333;
        }
        .light {
            --bg: #fff; --header: #f5f5f5; --chat-bg: #e5e5e5;
            --msg-rec: #fff; --input-bg: #f0f0f0; --text: #000;
            --sub: #666; --border: #ddd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app {
            width: 420px; height: 92vh; background: var(--bg); color: var(--text);
            border-radius: 24px; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 0 60px rgba(0,0,0,0.6); transition: background 0.3s, color 0.3s;
        }
        .header {
            background: var(--header); padding: 14px 20px; font-weight: bold;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .screen { flex: 1; overflow-y: auto; padding: 15px; display: none; flex-direction: column; gap: 6px; }
        .screen.active { display: flex; }
        .btn {
            background: var(--accent); color: #fff; border: none; padding: 12px;
            border-radius: 14px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%;
        }
        .btn.outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        input {
            width: 100%; padding: 12px 14px; border-radius: 12px; border: none;
            background: var(--input-bg); color: var(--text); font-size: 15px; outline: none; margin: 8px 0;
        }
        .contact, .chat-item {
            padding: 14px; background: var(--header); border-radius: 14px;
            display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid var(--border);
            margin-bottom: 6px;
        }
        .avatar {
            width: 44px; height: 44px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff;
            font-size: 18px;
        }
        .msg-bubble {
            max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px;
            word-wrap: break-word;
        }
        .msg-sent { background: var(--accent); align-self: flex-end; color: #fff; }
        .msg-rec { background: var(--msg-rec); align-self: flex-start; border: 1px solid var(--border); }
        .input-bar { padding: 10px; background: var(--header); display: flex; gap: 8px; border-top: 1px solid var(--border); display: none; }
        .input-bar input { flex: 1; margin: 0; }
        label { display: block; padding: 6px 0; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <span id="headerTitle">GURU</span>
        <button class="btn outline" style="width:auto;padding:6px 14px;" onclick="toggleTheme()">🌓</button>
    </div>

    <!-- Экран логина -->
    <div class="screen active" id="loginScreen">
        <h3>Регистрация / Вход</h3>
        <input type="text" id="nickInput" placeholder="Придумай никнейм">
        <input type="password" id="codeInput" placeholder="Секретный код">
        <button class="btn" onclick="register()">Войти</button>
    </div>

    <!-- Экран списка чатов (контакты и группы) -->
    <div class="screen" id="chatsScreen">
        <div style="display:flex;gap:8px;margin-bottom:10px;">
            <input type="text" id="addFriendInput" placeholder="Никнейм друга">
            <button class="btn" style="width:auto;padding:12px 16px;" onclick="addContact()">+</button>
        </div>
        <button class="btn outline" onclick="showScreen('createGroupScreen')" style="margin-bottom:10px;">+ Создать группу</button>
        <div id="contactsList"></div>
    </div>

    <!-- Экран создания группы -->
    <div class="screen" id="createGroupScreen">
        <h3>Создать группу</h3>
        <input type="text" id="groupNameInput" placeholder="Название группы">
        <p style="color:var(--sub);">Выбери участников:</p>
        <div id="groupMembersCheckboxes" style="max-height:200px;overflow-y:auto;margin-bottom:10px;"></div>
        <button class="btn" onclick="createGroup()">Создать группу</button>
        <button class="btn outline" onclick="showScreen('chatsScreen')" style="margin-top:6px;">Назад</button>
    </div>

    <!-- Экран чата -->
    <div class="screen" id="chatScreen">
        <div id="chatMessages" style="flex:1;display:flex;flex-direction:column;gap:6px;"></div>
    </div>

    <!-- Поле ввода (общее для личных и групповых чатов) -->
    <div class="input-bar" id="chatInputBar">
        <input type="text" id="msgInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="btn" style="width:auto;padding:10px 16px;" onclick="sendMsg()">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, push, onChildAdded, onValue, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // ⚠️ ЗАМЕНИ НА СВОЮ ССЫЛКУ ИЗ FIREBASE
    const firebaseConfig = {
        databaseURL: "https://guromessenger-ef076-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myNick = '';
    let currentChatId = '';
    let currentChatType = ''; // 'private' или 'group'

    // ========== РЕГИСТРАЦИЯ ==========
    window.register = async function() {
        const nick = document.getElementById('nickInput').value.trim().toLowerCase();
        const code = document.getElementById('codeInput').value.trim();
        if (!nick || !code) return alert('Заполни все поля!');
        const userRef = ref(db, `users/${nick}`);
        const snap = await get(userRef);
        if (snap.exists()) {
            if (snap.val().code !== code) return alert('Неверный код!');
        } else {
            await set(userRef, { nick, code, online: true });
        }
        myNick = nick;
        showScreen('chatsScreen');
        loadChatsList();
    };

    // ========== НАВИГАЦИЯ ==========
    window.showScreen = function(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        const inputBar = document.getElementById('chatInputBar');
        if (screenId !== 'chatScreen') {
            inputBar.style.display = 'none';
            currentChatId = '';
            currentChatType = '';
        }
        if (screenId === 'chatsScreen') {
            document.getElementById('headerTitle').textContent = 'GURU – Чаты';
            loadChatsList();
        }
        if (screenId === 'createGroupScreen') {
            prepareGroupScreen();
        }
    };

    // ========== ЗАГРУЗКА СПИСКА ЧАТОВ ==========
    async function loadChatsList() {
        const container = document.getElementById('contactsList');
        container.innerHTML = '';
        // личные контакты
        const contactsSnap = await get(ref(db, `users/${myNick}/contacts`));
        if (contactsSnap.exists()) {
            const contacts = contactsSnap.val();
            for (let nick of Object.keys(contacts)) {
                const div = document.createElement('div');
                div.className = 'contact';
                div.innerHTML = `<div class="avatar">${nick[0].toUpperCase()}</div><span>${nick}</span>`;
                div.onclick = () => openPrivateChat(nick);
                container.appendChild(div);
            }
        }
        // группы
        const groupsSnap = await get(ref(db, `users/${myNick}/groups`));
        if (groupsSnap.exists()) {
            const groups = groupsSnap.val();
            for (let groupId of Object.keys(groups)) {
                const groupSnap = await get(ref(db, `groups/${groupId}`));
                if (groupSnap.exists()) {
                    const group = groupSnap.val();
                    const div = document.createElement('div');
                    div.className = 'contact';
                    div.innerHTML = `<div class="avatar">G</div><span>${group.name} (группа)</span>`;
                    div.onclick = () => openGroupChat(groupId, group.name);
                    container.appendChild(div);
                }
            }
        }
    }

    // ========== ДОБАВЛЕНИЕ КОНТАКТА ==========
    window.addContact = async function() {
        const nick = document.getElementById('addFriendInput').value.trim().toLowerCase();
        if (!nick || nick === myNick) return alert('Введи корректный ник!');
        const userSnap = await get(ref(db, `users/${nick}`));
        if (!userSnap.exists()) return alert('Пользователь не найден!');
        await update(ref(db), {
            [`users/${myNick}/contacts/${nick}`]: true,
            [`users/${nick}/contacts/${myNick}`]: true
        });
        document.getElementById('addFriendInput').value = '';
        alert('Контакт добавлен!');
        loadChatsList();
    };

    // ========== ГРУППЫ ==========
    window.prepareGroupScreen = async function() {
        const container = document.getElementById('groupMembersCheckboxes');
        container.innerHTML = '';
        const contactsSnap = await get(ref(db, `users/${myNick}/contacts`));
        if (!contactsSnap.exists()) return;
        const contacts = contactsSnap.val();
        for (let nick of Object.keys(contacts)) {
            const label = document.createElement('label');
            label.innerHTML = `<input type="checkbox" value="${nick}"> ${nick}`;
            container.appendChild(label);
        }
    };

    window.createGroup = async function() {
        const name = document.getElementById('groupNameInput').value.trim();
        if (!name) return alert('Введи название!');
        const checkboxes = document.querySelectorAll('#groupMembersCheckboxes input[type="checkbox"]:checked');
        const members = [myNick];
        checkboxes.forEach(cb => members.push(cb.value));
        if (members.length < 2) return alert('Добавь хотя бы одного участника!');

        const groupRef = push(ref(db, 'groups'));
        const groupId = groupRef.key;
        await set(groupRef, {
            name: name,
            members: members.reduce((acc, nick) => { acc[nick] = true; return acc; }, {}),
            createdBy: myNick
        });
        // добавляем группу всем участникам
        for (let nick of members) {
            await update(ref(db), { [`users/${nick}/groups/${groupId}`]: true });
        }
        alert('Группа создана!');
        showScreen('chatsScreen');
    };

    // ========== ОТКРЫТИЕ ЧАТОВ ==========
    window.openPrivateChat = function(nick) {
        currentChatId = [myNick, nick].sort().join('_');
        currentChatType = 'private';
        showScreen('chatScreen');
        document.getElementById('chatInputBar').style.display = 'flex';
        document.getElementById('headerTitle').textContent = `Чат с ${nick}`;
        document.getElementById('chatMessages').innerHTML = '';
        const messagesRef = ref(db, `chats/${currentChatId}`);
        onChildAdded(messagesRef, (snap) => {
            const msg = snap.val();
            addMessageToUI(msg.from, msg.text);
        });
    };

    window.openGroupChat = function(groupId, groupName) {
        currentChatId = groupId;
        currentChatType = 'group';
        showScreen('chatScreen');
        document.getElementById('chatInputBar').style.display = 'flex';
        document.getElementById('headerTitle').textContent = groupName;
        document.getElementById('chatMessages').innerHTML = '';
        const messagesRef = ref(db, `groupMessages/${groupId}`);
        onChildAdded(messagesRef, (snap) => {
            const msg = snap.val();
            addMessageToUI(msg.from, msg.text);
        });
    };

    function addMessageToUI(sender, text) {
        const div = document.createElement('div');
        div.className = `msg-bubble ${sender === myNick ? 'msg-sent' : 'msg-rec'}`;
        if (currentChatType === 'group' && sender !== myNick) {
            div.innerHTML = `<b style="font-size:11px;">${sender}</b><br>${text}`;
        } else {
            div.textContent = text;
        }
        const container = document.getElementById('chatMessages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // ========== ОТПРАВКА СООБЩЕНИЯ ==========
    window.sendMsg = function() {
        const text = document.getElementById('msgInput').value.trim();
        if (!text || !currentChatId) return;
        const msgData = {
            from: myNick,
            text: text,
            time: serverTimestamp()
        };
        if (currentChatType === 'group') {
            push(ref(db, `groupMessages/${currentChatId}`), msgData);
        } else {
            push(ref(db, `chats/${currentChatId}`), msgData);
        }
        document.getElementById('msgInput').value = '';
    };

    // ========== ТЕМА ==========
    window.toggleTheme = function() {
        document.getElementById('app').classList.toggle('light');
    };
</script>
</body>
</html>
