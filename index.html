<body>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div id="authScreen">
        <h1>GURU</h1>
        <div class="subtitle">твой приватный мир</div>
        <input id="codeInput" placeholder="Введи код" />
        <button id="loginBtn">Войти</button>
        <button id="newCodeBtn" style="background:#1e2a4a;">Создать новый аккаунт</button>
        <div class="hint">💡 Придумай код, который не забудешь!<br />Он нужен, чтобы восстановить аккаунт.</div>
    </div>

    <!-- ===== ОСНОВНОЙ ЭКРАН ===== -->
    <div id="appScreen">
        <div id="header">
            <h1>GURU</h1>
            <div style="display:flex;align-items:center;gap:6px;">
                <button class="theme-toggle" id="themeToggle">🌙</button>
                <span class="my-code" id="myCodeDisplay">Код: ----</span>
                <button id="profileBtn">👤</button>
            </div>
        </div>

        <div id="tabs">
            <button class="active" data-tab="chats">💬 Чаты</button>
            <button data-tab="groups">👥 Группы</button>
            <button data-tab="contacts">📇 Контакты</button>
            <button data-tab="settings">⚙️ Настройки</button>
        </div>

        <div id="content">
            <!-- Чаты -->
            <div id="tab-chats">
                <input class="search-input" id="chatSearch" placeholder="🔍 Поиск по чатам..." />
                <div id="chatList"></div>
                <div id="chatView" class="chat-area">
                    <button class="back-btn" id="backToChats">← Назад</button>
                    <div class="chat-header">
                        <div class="avatar-click" id="chatAvatarClick">
                            <img id="chatAvatar" src="" alt="avatar" />
                            <span id="chatHeader">Chat</span>
                        </div>
                        <button class="mute-btn" id="muteChatBtn" title="Отключить уведомления">🔔</button>
                    </div>
                    <div id="pinMessage"></div>
                    <div id="chatMessages"></div>
                    <div id="bottom">
                        <input id="msgInput" placeholder="Сообщение..." />
                        <button id="attachBtn">📎</button>
                        <button id="recordBtn">🎤</button>
                        <button id="videoBtn">🎥</button>
                        <button id="shareContactBtn">📇</button>
                        <button id="sendBtn">➤</button>
                        <button id="callBtn">📞</button>
                    </div>
                    <input type="file" id="fileInput" class="file-input-hidden" accept="image/*,video/*" multiple />
                </div>
            </div>

            <!-- Группы -->
            <div id="tab-groups" style="display:none;">
                <div id="groupCreate">
                    <input id="groupNameInput" placeholder="Название группы" />
                    <button id="createGroupBtn">Создать</button>
                    <button id="createChannelBtn" style="background:#ffd200;color:#0f0f1a;font-weight:bold;">📢 Канал</button>
                </div>
                <div id="groupList"></div>
                <div id="groupView" class="chat-area">
                    <button class="back-btn" id="backToGroups">← Назад</button>
                    <div class="chat-header">
                        <span id="groupHeader">Group</span>
                        <button class="mute-btn" id="muteGroupBtn" title="Отключить уведомления">🔔</button>
                    </div>
                    <div id="pinGroupMessage"></div>
                    <div id="groupMessages"></div>
                    <div id="bottomGroup">
                        <input id="groupMsgInput" placeholder="Сообщение..." />
                        <button id="groupAttachBtn">📎</button>
                        <button id="groupRecordBtn">🎤</button>
                        <button id="groupVideoBtn">🎥</button>
                        <button id="groupShareContactBtn">📇</button>
                        <button id="groupSendBtn">➤</button>
                        <button id="groupCallBtn">📞</button>
                    </div>
                    <input type="file" id="groupFileInput" class="file-input-hidden" accept="image/*,video/*" multiple />
                </div>
            </div>

            <!-- Контакты -->
            <div id="tab-contacts" style="display:none;">
                <div style="padding:10px 0;">
                    <input id="contactSearch" placeholder="Поиск по коду или username..." style="width:100%;padding:10px;border-radius:24px;border:none;background:#1a1a2e;color:#fff;outline:none;" />
                    <button id="addContactBtn" style="margin-top:8px;padding:10px 20px;border-radius:24px;border:none;background:#e94560;color:#fff;cursor:pointer;width:100%;">Добавить контакт</button>
                </div>
                <div id="contactList"></div>
            </div>

            <!-- Настройки -->
            <div id="tab-settings" style="display:none;">
                <div id="settingsList"></div>
            </div>
        </div>

        <div id="info">👀 Жёлтые галочки — прочитано • 🟢 Онлайн</div>
    </div>

    <!-- ===== ПРОФИЛЬ (МОДАЛКА) ===== -->
    <div id="profileModal">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script>
        // =========================================================
        // 1. НАСТРОЙКИ FIREBASE
        // =========================================================
        const FIREBASE_URL = "https://guromessenger-ef076-default-rtdb.firebaseio.com/"; // ⚠️ ЗАМЕНИ НА СВОЮ ССЫЛКУ
        const firebaseConfig = { databaseURL: FIREBASE_URL };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // =========================================================
        // 2. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // =========================================================
        let myCode = null;
        let currentChat = null;
        let blockedUsers = {};
        let replyTo = null;
        let editingMessage = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let videoRecorder = null;
        let videoChunks = [];
        let isVideoRecording = false;
        let videoStream = null;
        const GIFTS = [
            { emoji: '🎁', name: 'Подарок', price: 15 },
            { emoji: '🌹', name: 'Роза', price: 17 },
            { emoji: '🍫', name: 'Шоколадка', price: 13 },
            { emoji: '🧸', name: 'Мишка', price: 20 },
            { emoji: '🎂', name: 'Торт', price: 15 },
            { emoji: '💐', name: 'Букет', price: 17 },
            { emoji: '🎀', name: 'Бантик', price: 13 },
            { emoji: '💎', name: 'Алмаз', price: 25 },
            { emoji: '🧧', name: 'Красный конверт', price: 15 },
            { emoji: '📿', name: 'Бусы', price: 15 },
            { emoji: '🥂', name: 'Бокалы', price: 19 },
            { emoji: '🍾', name: 'Шампанское', price: 21 },
            { emoji: '🕯️', name: 'Свеча', price: 11 },
            { emoji: '🌺', name: 'Гибискус', price: 15 },
            { emoji: '🌸', name: 'Сакура', price: 15 },
            { emoji: '🌻', name: 'Подсолнух', price: 15 },
            { emoji: '🌷', name: 'Тюльпан', price: 15 },
            { emoji: '🌼', name: 'Ромашка', price: 13 },
            { emoji: '🍷', name: 'Бокал вина', price: 19 },
            { emoji: '🍸', name: 'Коктейль', price: 19 },
            { emoji: '🎆', name: 'Фейерверк', price: 23 },
            { emoji: '🎇', name: 'Салют', price: 23 },
            { emoji: '🎐', name: 'Колокольчик', price: 13 },
            { emoji: '📦', name: 'Посылка', price: 15 },
            { emoji: '💝', name: 'Сердце с лентой', price: 17 }
        ];
        const JACKPOT_COMMISSION = 0.13;
        const JACKPOT_INTERVAL_DAYS = 14;

        // =========================================================
        // 3. РАБОТА С КОДОМ
        // =========================================================
        function loadMyCode() {
            const saved = localStorage.getItem('myCode');
            if (saved) {
                myCode = saved;
                return true;
            }
            return false;
        }
        function saveMyCode(code) {
            localStorage.setItem('myCode', code);
            myCode = code;
        }

        // =========================================================
        // 4. АВТОРИЗАЦИЯ
        // =========================================================
        const authScreen = document.getElementById('authScreen');
        const appScreen = document.getElementById('appScreen');
        const codeInput = document.getElementById('codeInput');
        const loginBtn = document.getElementById('loginBtn');
        const newCodeBtn = document.getElementById('newCodeBtn');
        const loader = document.getElementById('loader');

        function showAuthScreen() {
            authScreen.style.display = 'flex';
            appScreen.style.display = 'none';
        }
        function showAppScreen() {
            authScreen.style.display = 'none';
            appScreen.style.display = 'flex';
            loadUserData();
            loadChats();
            loadGroups();
            loadContacts();
            loadSettings();
            updateOnlineStatus();
            listenOnlineStatus();
            registerSW();
            loadJackpot();
            window.addEventListener('offline', function() {
                document.getElementById('info').innerHTML = '🔴 Соединение...';
            });
            window.addEventListener('online', function() {
                document.getElementById('info').innerHTML = '👀 Жёлтые галочки — прочитано • 🟢 Онлайн';
            });
        }

        loginBtn.addEventListener('click', function() {
            const code = codeInput.value.trim();
            if (!code) return alert('Введи код!');
            loader.style.display = 'block';
            db.ref('users/' + code).once('value').then(snap => {
                loader.style.display = 'none';
                if (snap.exists()) {
                    myCode = code;
                    saveMyCode(code);
                    showAppScreen();
                } else {
                    alert('❌ Аккаунт с таким кодом не найден!');
                }
            }).catch(err => {
                loader.style.display = 'none';
                alert('Ошибка соединения! Проверь интернет.');
            });
        });

        newCodeBtn.addEventListener('click', function() {
            const newCode = codeInput.value.trim();
            if (!newCode) return alert('Придумай код!');
            if (newCode.length < 3) return alert('Код должен быть минимум 3 символа!');
            loader.style.display = 'block';
            db.ref('users/' + newCode).once('value').then(snap => {
                loader.style.display = 'none';
                if (snap.exists()) {
                    alert('❌ Этот код уже занят! Придумай другой.');
                    return;
                }
                const defaultUsername = 'user_' + newCode.substring(0, 4);
                const defaultPrivacy = { groups: true, calls: false, online: false, avatar: false, gifts: false, messages: true };
                db.ref('users/' + newCode).set({
                    code: newCode,
                    username: defaultUsername,
                    avatar: '',
                    bio: '',
                    contacts: {},
                    groups: {},
                    channels: {},
                    blocked: {},
                    stars: 5,
                    gifts: [],
                    fcmToken: '',
                    createdAt: Date.now(),
                    privacy: defaultPrivacy
                }).then(() => {
                    myCode = newCode;
                    saveMyCode(newCode);
                    showAppScreen();
                    alert('✅ Аккаунт создан!\nТвой код: ' + newCode + '\nUsername: ' + defaultUsername + '\n+5 звёзд за регистрацию!');
                });
            }).catch(err => {
                loader.style.display = 'none';
                alert('Ошибка соединения! Проверь интернет.');
            });
        });

        if (loadMyCode()) {
            loader.style.display = 'block';
            db.ref('users/' + myCode).once('value').then(snap => {
                loader.style.display = 'none';
                if (snap.exists()) {
                    showAppScreen();
                } else {
                    showAuthScreen();
                }
            }).catch(err => {
                loader.style.display = 'none';
                showAuthScreen();
                alert('Ошибка соединения! Проверь интернет.');
            });
        } else {
            showAuthScreen();
        }

        // =========================================================
        // 5. SERVICE WORKER
        // =========================================================
        function registerSW() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('✅ SW зарегистрирован');
                        if (Notification.permission === 'default') {
                            Notification.requestPermission().then(perm => {
                                if (perm === 'granted') {
                                    console.log('✅ Уведомления разрешены');
                                }
                            });
                        }
                    })
                    .catch(err => console.error('❌ Ошибка SW:', err));
            }
        }

        // =========================================================
        // 6. ПРОФИЛЬ
        // =========================================================
        function loadUserData() {
            if (!myCode) return;
            db.ref('users/' + myCode).once('value').then(snap => {
                const data = snap.val() || {};
                document.getElementById('myCodeDisplay').innerHTML = 'Код: ' + myCode;
                const avatarUrl = data.avatar || '';
                const profileBtn = document.getElementById('profileBtn');
                if (avatarUrl) {
                    profileBtn.innerHTML = `<img src="${avatarUrl}" alt="avatar" />`;
                } else {
                    profileBtn.textContent = '👤';
                }
                blockedUsers = data.blocked || {};
                const privacy = data.privacy || { groups: true, calls: false, online: false, avatar: false, gifts: false, messages: true };
                document.getElementById('privacyGroups').checked = privacy.groups !== false;
                document.getElementById('privacyCalls').checked = privacy.calls === true;
                document.getElementById('privacyOnline').checked = privacy.online === true;
                document.getElementById('privacyAvatar').checked = privacy.avatar === true;
                document.getElementById('privacyGifts').checked = privacy.gifts === true;
                document.getElementById('privacyMessages').checked = privacy.messages !== false;
                document.getElementById('profileDate').textContent = data.createdAt ? new Date(data.createdAt).toLocaleDateString() : '----';
                document.getElementById('profileCode').textContent = myCode;
                document.getElementById('profileUsername').value = data.username || '';
                document.getElementById('profileBio').value = data.bio || '';
                document.getElementById('profileStars').textContent = data.stars || 0;
                renderGifts(data.gifts || []);
            });
        }

        function renderGifts(gifts) {
            const container = document.getElementById('giftsContainer');
            container.innerHTML = '<h3 style="font-size:14px;color:#ffd200;margin-bottom:6px;">🎁 Мои подарки</h3>';
            if (!gifts || gifts.length === 0) {
                container.innerHTML += '<div style="color:#888;font-size:13px;">Нет подарков</div>';
                return;
            }
            gifts.forEach((g, index) => {
                const div = document.createElement('div');
                div.className = 'gift-item';
                const giftPrice = GIFTS.find(item => item.emoji === g.emoji)?.price || 0;
                div.innerHTML = `
                    <span class="gift-emoji">${g.emoji || '🎁'}</span>
                    <div class="gift-info">
                        <div>${g.from === myCode ? 'Куплен для себя' : 'Подарок от ' + (g.from || 'неизвестного')}</div>
                        <div class="gift-from">${g.date ? new Date(g.date).toLocaleDateString() : ''}</div>
                    </div>
                    ${g.from === myCode || g.from ? `<button class="exchange-btn" data-index="${index}" style="background:#ffd200;border:none;border-radius:12px;padding:4px 12px;cursor:pointer;font-size:12px;color:#0f0f1a;">🔄 Обменять</button>` : ''}
                `;
                container.appendChild(div);
                if (g.from === myCode || g.from) {
                    div.querySelector('.exchange-btn').addEventListener('click', function() {
                        exchangeGift(index);
                    });
                }
            });
        }

        // =========================================================
        // 7. ОБМЕН ПОДАРКА НА ЗВЁЗДЫ (С КОМИССИЕЙ 13%)
        // =========================================================
        function exchangeGift(index) {
            db.ref('users/' + myCode).once('value').then(snap => {
                const data = snap.val() || {};
                const gifts = data.gifts || [];
                if (index < 0 || index >= gifts.length) return;
                const gift = gifts[index];
                const giftPrice = GIFTS.find(item => item.emoji === gift.emoji)?.price || 0;
                const commission = Math.round(giftPrice * JACKPOT_COMMISSION);
                const starsToAdd = giftPrice - commission;
                
                if (!confirm(`Обменять подарок ${gift.emoji} на ${starsToAdd} звёзд? (Комиссия ${commission} ⭐ уйдёт в копилку)`)) return;
                
                // Удаляем подарок
                gifts.splice(index, 1);
                // Добавляем звёзды
                const newStars = (data.stars || 0) + starsToAdd;
                // Добавляем комиссию в копилку
                db.ref('jackpot/amount').transaction(current => {
                    return (current || 0) + commission;
                });
                db.ref('users/' + myCode).update({
                    gifts: gifts,
                    stars: newStars
                }).then(() => {
                    alert(`✅ Подарок обменян! +${starsToAdd} ⭐. ${commission} ⭐ ушли в копилку.`);
                    loadUserData();
                });
            });
        }

        // =========================================================
        // 8. КОПИЛКА
        // =========================================================
        function loadJackpot() {
            db.ref('jackpot/amount').on('value', snap => {
                const amount = snap.val() || 0;
                document.getElementById('jackpotAmount').textContent = amount + ' ⭐';
            });
            db.ref('jackpot/lastDraw').once('value').then(snap => {
                const lastDraw = snap.val() || Date.now();
                const nextDraw = new Date(lastDraw + JACKPOT_INTERVAL_DAYS * 86400000);
                document.getElementById('jackpotNextDraw').textContent = nextDraw.toLocaleDateString();
            });
            // Проверяем, нужно ли провести розыгрыш
            checkJackpotDraw();
        }

        function checkJackpotDraw() {
            db.ref('jackpot/lastDraw').once('value').then(snap => {
                const lastDraw = snap.val() || Date.now();
                const now = Date.now();
                if (now - lastDraw >= JACKPOT_INTERVAL_DAYS * 86400000) {
                    // Время проводить розыгрыш
                    performJackpotDraw();
                }
            });
        }

        function performJackpotDraw() {
            db.ref('jackpot/amount').once('value').then(snap => {
                const amount = snap.val() || 0;
                if (amount < 10) {
                    // Слишком мало для розыгрыша
                    db.ref('jackpot/lastDraw').set(Date.now());
                    return;
                }
                // Выбираем случайного активного пользователя
                db.ref('users').once('value').then(snap => {
                    const users = snap.val() || {};
                    const activeUsers = [];
                    const now = Date.now();
                    for (let code in users) {
                        if (users[code].lastSeen && (now - users[code].lastSeen < 7 * 86400000)) {
                            activeUsers.push(code);
                        }
                    }
                    if (activeUsers.length === 0) {
                        db.ref('jackpot/lastDraw').set(Date.now());
                        return;
                    }
                    const winner = activeUsers[Math.floor(Math.random() * activeUsers.length)];
                    // Переводим сумму победителю
                    db.ref('users/' + winner + '/stars').transaction(current => {
                        return (current || 0) + amount;
                    });
                    // Обнуляем копилку
                    db.ref('jackpot/amount').set(0);
                    db.ref('jackpot/lastDraw').set(Date.now());
                    db.ref('jackpot/lastWinner').set(winner);
                    db.ref('jackpot/lastAmount').set(amount);
                    // Оповещаем всех (в чате или через уведомления)
                    alert(`🏆 Пользователь ${winner} выиграл ${amount} ⭐ в розыгрыше!`);
                });
            });
        }

        // =========================================================
        // 9. ТЕМА
        // =========================================================
        let currentTheme = localStorage.getItem('theme') || 'dark';
        function applyTheme(theme) {
            const body = document.body;
            if (theme === 'light') {
                body.classList.add('light');
                document.getElementById('themeToggle').textContent = '☀️';
            } else {
                body.classList.remove('light');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            localStorage.setItem('theme', theme);
            currentTheme = theme;
        }
        document.getElementById('themeToggle').addEventListener('click', function() {
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
        applyTheme(currentTheme);

        // =========================================================
        // 10. ОНЛАЙН СТАТУС
        // =========================================================
        function updateOnlineStatus() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/online').set(true);
            db.ref('users/' + myCode + '/lastSeen').set(Date.now());
            window.addEventListener('beforeunload', function() {
                db.ref('users/' + myCode + '/online').set(false);
            });
        }
        function listenOnlineStatus() {
            db.ref('users').on('value', function(snap) {
                const users = snap.val() || {};
                document.querySelectorAll('.contact-item').forEach(item => {
                    const code = item.dataset.code;
                    if (code && users[code]) {
                        const dot = item.querySelector('.status-dot');
                        if (dot) {
                            const isOnline = users[code].online === true;
                            const privacy = users[code].privacy || {};
                            if (privacy.online === true && code !== myCode) {
                                dot.className = 'status-dot offline';
                                item.querySelector('.last-seen').textContent = 'скрыт';
                            } else {
                                dot.className = 'status-dot ' + (isOnline ? 'online' : 'offline');
                                item.querySelector('.last-seen').textContent = isOnline ? '🟢 Онлайн' : 'был(а) недавно';
                            }
                        }
                    }
                });
            });
        }

        // =========================================================
        // 11. БЛОКИРОВКА
        // =========================================================
        function toggleBlock(targetCode) {
            const blockedRef = db.ref('users/' + myCode + '/blocked/' + targetCode);
            if (blockedUsers[targetCode]) {
                blockedRef.remove().then(() => {
                    delete blockedUsers[targetCode];
                    loadChats();
                    alert('✅ Пользователь разблокирован!');
                });
            } else {
                blockedRef.set(true).then(() => {
                    blockedUsers[targetCode] = true;
                    loadChats();
                    alert('🚫 Пользователь заблокирован!');
                });
            }
        }
        function isBlocked(code) {
            return blockedUsers[code] === true;
        }

        // =========================================================
        // 12. ТАБЫ
        // =========================================================
        document.querySelectorAll('#tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('#content > div').forEach(d => d.style.display = 'none');
                document.getElementById('tab-' + tab).style.display = 'block';
                if (tab === 'chats') loadChats();
                if (tab === 'groups') loadGroups();
                if (tab === 'contacts') loadContacts();
                if (tab === 'settings') loadSettings();
            });
        });

        // =========================================================
        // 13. ЧАТЫ
        // =========================================================
        const chatList = document.getElementById('chatList');
        const chatView = document.getElementById('chatView');
        const chatMessages = document.getElementById('chatMessages');
        const chatHeader = document.getElementById('chatHeader');
        const backToChats = document.getElementById('backToChats');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const callBtn = document.getElementById('callBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const recordBtn = document.getElementById('recordBtn');
        const videoBtn = document.getElementById('videoBtn');
        const muteChatBtn = document.getElementById('muteChatBtn');
        const chatSearch = document.getElementById('chatSearch');
        const shareContactBtn = document.getElementById('shareContactBtn');
        const pinMessageDiv = document.getElementById('pinMessage');

        function loadChats() {
            if (!myCode) return;
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                chatList.innerHTML = '';
                for (let code in contacts) {
                    if (isBlocked(code)) continue;
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.dataset.code = code;
                    db.ref('users/' + code).once('value').then(userSnap => {

                }
            }).catch(err => console.error('Ошибка загрузки контактов:', err));
        }

        addContactBtn.addEventListener('click', function() {
            const query = contactSearch.value.trim();
            if (!query) return alert('Введи код или username!');
            if (query === myCode) return alert('Это ты!');

            db.ref('users/' + query).once('value').then(snap => {
                if (snap.exists()) {
                    addContact(query);
                    return;
                }
                db.ref('users').orderByChild('username').equalTo(query).once('value').then(snap => {
                    if (snap.exists()) {
                        let found = false;
                        snap.forEach(child => {
                            if (child.key !== myCode) {
                                addContact(child.key);
                                found = true;
                            }
                        });
                        if (!found) alert('❌ Пользователь не найден!');
                    } else {
                        alert('❌ Пользователь не найден!');
                    }
                });
            });
        });

        function addContact(code) {
            db.ref('users/' + myCode + '/contacts/' + code).set(true);
            contactSearch.value = '';
            loadContacts();
            alert('✅ Контакт добавлен!');
        }

        // =========================================================
        // 24. ПЕРЕСЫЛКА С ВЫБОРОМ КОНТАКТА
        // =========================================================
        function forwardMessage(chatId, messageKey, data) {
            db.ref('users/' + myCode + '/contacts').once('value').then(snap => {
                const contacts = snap.val() || {};
                const contactList = Object.keys(contacts);
                if (contactList.length === 0) {
                    alert('❌ Нет контактов для пересылки!');
                    return;
                }
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0,0,0,0.8); display: flex; justify-content: center;
                    align-items: center; z-index: 1001;
                `;
                modal.innerHTML = `
                    <div style="background: #1a1a2e; padding: 20px; border-radius: 16px; width: 90%; max-width: 350px; max-height: 80vh; overflow-y: auto;">
                        <h3 style="color: #fff; margin-bottom: 12px;">📤 Переслать</h3>
                        ${contactList.map(code => `
                            <div class="contact-item" style="cursor:pointer; margin: 4px 0;" data-code="${code}">
                                <span>${code}</span>
                            </div>
                        `).join('')}
                        <button id="closeForwardModal" style="margin-top: 12px; padding: 8px 16px; border: none; border-radius: 12px; background: #e94560; color: #fff; cursor: pointer; width: 100%;">Отмена</button>
                    </div>
                `;
                document.body.appendChild(modal);

                modal.querySelectorAll('.contact-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const target = this.dataset.code;
                        const chatIdTarget = getChatId(myCode, target);
                        const ref = db.ref('chats/' + chatIdTarget).push();
                        const msgData = {
                            from: myCode,
                            to: target,
                            text: data.text || 'Пересланное сообщение',
                            time: Date.now(),
                            read: false,
                            delivered: true,
                            type: 'forwarded',
                            forwardedFrom: data.from,
                            originalText: data.text || 'Сообщение'
                        };
                        if (data.fileUrl) {
                            msgData.fileUrl = data.fileUrl;
                            msgData.type = data.type || 'file';
                        }
                        ref.set(msgData);
                        alert('✅ Сообщение переслано!');
                        modal.remove();
                    });
                });

                modal.querySelector('#closeForwardModal').addEventListener('click', function() {
                    modal.remove();
                });
            });
        }

        // =========================================================
        // 25. ДЕЙСТВИЯ С СООБЩЕНИЯМИ (УДАЛЕНИЕ, РЕДАКТИРОВАНИЕ, ОТВЕТ, ЗАКРЕП)
        // =========================================================
        function deleteForMe(chatId, messageKey) {
            if (!confirm('Удалить сообщение только у себя?')) return;
            getChatRef(chatId).child(messageKey).update({ deletedForMe: true });
        }

        function deleteForAll(chatId, messageKey) {
            if (!confirm('Удалить сообщение для всех? Это действие нельзя отменить.')) return;
            getChatRef(chatId).child(messageKey).remove();
        }

        function editMessage(chatId, messageKey, oldText) {
            const newText = prompt('Редактировать сообщение:', oldText);
            if (newText === null || newText.trim() === '') return;
            getChatRef(chatId).child(messageKey).update({
                text: newText.trim(),
                edited: true,
                editTime: Date.now()
            });
        }

        function replyToMessageAction(chatId, messageKey, data) {
            replyTo = messageKey;
            msgInput.placeholder = 'Ответ на сообщение...';
            msgInput.focus();
            const msgDiv = document.querySelector(`.msg[data-key="${messageKey}"]`);
            if (msgDiv) {
                msgDiv.style.border = '2px solid #ffd200';
                setTimeout(() => {
                    msgDiv.style.border = 'none';
                }, 3000);
            }
        }

        function copyMessage(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Сообщение скопировано!');
            }).catch(() => {
                alert('❌ Не удалось скопировать');
            });
        }

        function pinMessageAction(chatId, messageKey, data) {
            getChatRef(chatId).child('pin').set({
                key: messageKey,
                text: data.text || 'Сообщение',
                from: data.from,
                time: Date.now()
            });
            alert('📌 Сообщение закреплено!');
        }

        function getChatRef(chatId) {
            if (currentChat.type === 'user') {
                return db.ref('chats/' + chatId);
            } else {
                return db.ref('groups/' + chatId);
            }
        }

        // =========================================================
        // 26. ПОДАРКИ
        // =========================================================
        function sendGift(targetCode) {
            db.ref('users/' + myCode + '/stars').once('value').then(snap => {
                const stars = snap.val() || 0;
                const minPrice = Math.min(...GIFTS.map(g => g.price));
                if (stars < minPrice) {
                    alert('❌ Недостаточно звёзд! Нужно минимум ' + minPrice + ' ⭐');
                    return;
                }
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0,0,0,0.8); display: flex; justify-content: center;
                    align-items: center; z-index: 1001;
                `;
                modal.innerHTML = `
                    <div style="background: #1a1a2e; padding: 20px; border-radius: 16px; width: 90%; max-width: 380px; text-align:center; max-height: 80vh; overflow-y: auto;">
                        <h3 style="color: #fff; margin-bottom: 12px;">🎁 Выбери подарок</h3>
                        <div style="display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;">
                            ${GIFTS.map(g => `
                                <button class="gift-select-btn" data-emoji="${g.emoji}" data-price="${g.price}" style="font-size:28px; background:#1e2a4a; border:none; border-radius:12px; cursor:pointer; padding:8px; transition:transform .2s; min-width:60px; color:#fff; display:flex; flex-direction:column; align-items:center;">
                                    ${g.emoji}
                                    <span style="font-size:10px; color:#ffd200;">${g.price}⭐</span>
                                </button>
                            `).join('')}
                        </div>
                        <button id="closeGiftModal" style="margin-top: 12px; padding: 8px 16px; border: none; border-radius: 12px; background: #e94560; color: #fff; cursor: pointer; width: 100%;">Отмена</button>
                    </div>
                `;
                document.body.appendChild(modal);

                modal.querySelectorAll('.gift-select-btn').forEach(btn => {
                    btn.addEventListener('mouseover', function() {
                        this.style.transform = 'scale(1.05)';
                    });
                    btn.addEventListener('mouseout', function() {
                        this.style.transform = 'scale(1)';
                    });
                    btn.addEventListener('click', function() {
                        const emoji = this.dataset.emoji;
                        const price = parseInt(this.dataset.price);
                        if (stars < price) {
                            alert('❌ Недостаточно звёзд! Нужно ' + price + ' ⭐');
                            return;
                        }
                        modal.remove();
                        db.ref('users/' + myCode + '/stars').set(stars - price);
                        const gift = { emoji, from: myCode, date: Date.now() };
                        db.ref('users/' + targetCode + '/gifts').push(gift);
                        db.ref('users/' + targetCode + '/stars').transaction(current => {
                            return (current || 0) + 1;
                        });
                        sendNotification(targetCode, '🎁 Вы получили подарок от ' + myCode);
                        alert('✅ Подарок отправлен!');
                        loadUserData();
                    });
                });

                modal.querySelector('#closeGiftModal').addEventListener('click', function() {
                    modal.remove();
                });
            });
        }

        // =========================================================
        // 27. УВЕДОМЛЕНИЯ
        // =========================================================
        function sendNotification(targetCode, message) {
            db.ref('users/' + targetCode + '/fcmToken').once('value').then(snap => {
                const token = snap.val();
                if (!token) return;
                console.log('📨 Уведомление для ' + targetCode + ': ' + message);
            });
        }

        // =========================================================
        // 28. РЕАКЦИИ
        // =========================================================
        const reactionPanel = document.getElementById('reactionPanel');
        let selectedMessageKey = null;
        let selectedChatId = null;

        document.addEventListener('contextmenu', function(e) {
            const msgDiv = e.target.closest('.msg');
            if (!msgDiv) return;
            const key = msgDiv.dataset.key;
            const chatId = msgDiv.dataset.chatId;
            if (!key || !chatId) return;
            e.preventDefault();
            showReactionPanel(e.clientX, e.clientY, key, chatId);
        });

        let longPressTimer = null;
        document.addEventListener('touchstart', function(e) {
            const msgDiv = e.target.closest('.msg');
            if (!msgDiv) return;
            const key = msgDiv.dataset.key;
            const chatId = msgDiv.dataset.chatId;
            if (!key || !chatId) return;
            longPressTimer = setTimeout(() => {
                const touch = e.touches[0];
                showReactionPanel(touch.clientX, touch.clientY, key, chatId);
            }, 600);
        });
        document.addEventListener('touchend', function() {
            clearTimeout(longPressTimer);
        });
        document.addEventListener('touchmove', function() {
            clearTimeout(longPressTimer);
        });

        function showReactionPanel(x, y, key, chatId) {
            selectedMessageKey = key;
            selectedChatId = chatId;
            reactionPanel.style.left = (x - 80) + 'px';
            reactionPanel.style.top = (y - 60) + 'px';
            reactionPanel.classList.add('active');
            clearTimeout(window.reactionTimeout);
            window.reactionTimeout = setTimeout(() => {
                reactionPanel.classList.remove('active');
            }, 5000);
        }

        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const emoji = this.dataset.emoji;
                if (!selectedMessageKey || !selectedChatId) return;
                addReaction(selectedChatId, selectedMessageKey, emoji);
                reactionPanel.classList.remove('active');
                selectedMessageKey = null;
                selectedChatId = null;
            });
        });

        document.addEventListener('click', function(e) {
            if (!reactionPanel.contains(e.target)) {
                reactionPanel.classList.remove('active');
            }
        });

        function addReaction(chatId, messageKey, emoji) {
            const ref = db.ref('chats/' + chatId + '/' + messageKey + '/reactions/' + myCode);
            ref.once('value').then(snap => {
                if (snap.exists() && snap.val() === emoji) {
                    ref.remove();
                } else {
                    ref.set(emoji);
                }
            });
        }

        // =========================================================
        // 29. ОТРИСОВКА СООБЩЕНИЙ
        // =========================================================
        function renderMessage(container, data, myCode) {
            if (data.deletedForMe) return;
            const div = document.createElement('div');
            div.className = 'msg';
            div.dataset.key = data._key || '';
            div.dataset.chatId = data._chatId || '';
            const isMy = data.from === myCode;
            if (isMy) div.classList.add('my');

            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            if (!data.deleted) {
                actions.innerHTML = `
                    <button class="reply-btn" title="Ответить">↩️</button>
                    <button class="forward-btn" title="Переслать">➡️</button>
                    ${isMy ? `<button class="edit-btn" title="Редактировать">✏️</button>` : ''}
                    ${isMy ? `<button class="delete-for-me-btn" title="Удалить у себя">🗑️</button>` : ''}
                    ${isMy ? `<button class="delete-for-all-btn" title="Удалить для всех">💥</button>` : ''}
                    <button class="pin-btn" title="Закрепить">📌</button>
                    <button class="copy-btn" title="Копировать">📋</button>
                `;
                actions.querySelector('.reply-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    replyToMessageAction(data._chatId, data._key, data);
                });
                actions.querySelector('.forward-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    forwardMessage(data._chatId, data._key, data);
                });
                if (isMy) {
                    actions.querySelector('.edit-btn').addEventListener('click', function(e) {
                        e.stopPropagation();
                        editMessage(data._chatId, data._key, data.text);
                    });
                    actions.querySelector('.delete-for-me-btn').addEventListener('click', function(e) {
                        e.stopPropagation();
                        deleteForMe(data._chatId, data._key);
                    });
                    actions.querySelector('.delete-for-all-btn').addEventListener('click', function(e) {
                        e.stopPropagation();
                        deleteForAll(data._chatId, data._key);
                    });
                }
                actions.querySelector('.pin-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    pinMessageAction(data._chatId, data._key, data);
                });
                actions.querySelector('.copy-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    copyMessage(data.text || '');
                });
            }
            div.appendChild(actions);

            if (data.type === 'forwarded' || data.forwardedFrom) {
                const forwarded = document.createElement('div');
                forwarded.className = 'forwarded';
                forwarded.textContent = '📩 Переслано от ' + (data.forwardedFrom || 'неизвестного');
                div.appendChild(forwarded);
                if (data.originalText) {
                    data.text = data.originalText;
                }
            }

            if (data.replyTo && data.replyText) {
                const replyDiv = document.createElement('div');
                replyDiv.className = 'reply-to';
                replyDiv.textContent = '↩️ ' + (data.replyFrom || '') + ': ' + (data.replyText || 'Сообщение');
                div.appendChild(replyDiv);
            }

            if (data.from && data.from !== myCode) {
                const userSpan = document.createElement('span');
                userSpan.className = 'user';
                db.ref('users/' + data.from + '/username').once('value').then(snap => {
                    userSpan.textContent = (snap.val() || data.from) + ':';
                });
                div.appendChild(userSpan);
            }

            if (data.text && data.type !== 'contact') {
                const textSpan = document.createElement('span');
                textSpan.textContent = data.text;
                div.appendChild(textSpan);
            }

            if (data.type === 'contact' && data.contactCode) {
                const contactDiv = document.createElement('div');
                contactDiv.className = 'contact-card';
                db.ref('users/' + data.contactCode + '/avatar').once('value').then(snap => {
                    const avatar = snap.val();
                    contactDiv.innerHTML = `
                        ${avatar ? `<img src="${avatar}" class="avatar-small" />` : '👤'}
                        <span class="contact-name">${data.contactName || data.contactCode}</span>
                        <span class="contact-code">${data.contactCode}</span>
                        <button onclick="addContact('${data.contactCode}')" style="background:#4caf50;border:none;color:#fff;padding:2px 8px;border-radius:8px;cursor:pointer;">➕</button>
                    `;
                });
                div.appendChild(contactDiv);
            }

            if (data.fileUrl) {
                if (data.type === 'image') {
                    const img = document.createElement('img');
                    img.src = data.fileUrl;
                    img.loading = 'lazy';
                    img.style.cursor = 'pointer';
                    img.onclick = function() {
                        window.open(data.fileUrl, '_blank');
                    };
                    div.appendChild(img);
                } else if (data.type === 'video') {
                    const video = document.createElement('video');
                    video.src = data.fileUrl;
                    video.controls = true;
                    video.preload = 'metadata';
                    video.style.maxWidth = '200px';
                    div.appendChild(video);
                } else if (data.type === 'video_circle') {
                    const video = document.createElement('video');
                    video.src = data.fileUrl;
                    video.className = 'video-circle';
                    video.controls = false;
                    video.preload = 'metadata';
                    video.muted = true;
                    video.loop = true;
                    video.playsinline = true;
                    video.onclick = function() {
                        if (video.paused) {
                            video.play();
                            video.muted = false;
                        } else {
                            video.pause();
                            video.muted = true;
                        }
                    };
                    div.appendChild(video);
                } else if (data.type === 'audio') {
                    const audio = document.createElement('audio');
                    audio.src = data.fileUrl;
                    audio.controls = true;
                    div.appendChild(audio);
                } else {
                    const link = document.createElement('a');
                    link.href = data.fileUrl;
                    link.textContent = '📎 ' + data.text;
                    link.target = '_blank';
                    div.appendChild(link);
                }
            }

            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            if (data.time) {
                const date = new Date(data.time);
                timeSpan.textContent = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
            }
            div.appendChild(timeSpan);

            if (data.edited) {
                const editedSpan = document.createElement('span');
                editedSpan.className = 'edited';
                editedSpan.textContent = '(ред.)';
                div.appendChild(editedSpan);
            }

            if (data.from === myCode && data.to) {
                const statusSpan = document.createElement('span');
                statusSpan.className = 'status';
                if (data.read) {
                    statusSpan.classList.add('read');
                    statusSpan.textContent = '✅✅';
                } else {
                    statusSpan.classList.add('delivered');
                    statusSpan.textContent = '✅';
                }
                div.appendChild(statusSpan);
            }

            if (data.from === myCode && data.readBy) {
                const statusSpan = document.createElement('span');
                statusSpan.className = 'status';
                const readers = Object.keys(data.readBy || {});
                if (readers.length > 1) {
                    statusSpan.classList.add('read');
                    statusSpan.textContent = '✅✅';
                } else {
                    statusSpan.classList.add('delivered');
                    statusSpan.textContent = '✅';
                }
                div.appendChild(statusSpan);
            }

            if (data.reactions && Object.keys(data.reactions).length > 0) {
                const reactionsDiv = document.createElement('div');
                reactionsDiv.className = 'reactions';
                const counts = {};
                for (let user in data.reactions) {
                    const emoji = data.reactions[user];
                    counts[emoji] = (counts[emoji] || 0) + 1;
                }
                for (let emoji in counts) {
                    const item = document.createElement('span');
                    item.className = 'reaction-item';
                    item.innerHTML = `${emoji} <span class="count">${counts[emoji]}</span>`;
                    reactionsDiv.appendChild(item);
                }
                div.appendChild(reactionsDiv);
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // =========================================================
        // 30. ЗАГРУЗКА ФАЙЛОВ
        // =========================================================
        async function uploadFile(file) {
            const path = 'files/' + Date.now() + '_' + file.name;

            await ref.put(file);

        // =========================================================
        // 32. ПРОФИЛЬ (МОДАЛКА) — ОБРАБОТЧИКИ
        // =========================================================
        const profileModal = document.getElementById('profileModal');
        const profileBtn = document.getElementById('profileBtn');
        const closeProfileBtn = document.getElementById('closeProfileBtn');
        const profileAvatar = document.getElementById('profileAvatar');
        const profileUsername = document.getElementById('profileUsername');
        const profileBio = document.getElementById('profileBio');
        const profileCode = document.getElementById('profileCode');
        const avatarContainer = document.getElementById('avatarContainer');
        const avatarInput = document.getElementById('avatarInput');
        const saveProfileBtn = document.getElementById('saveProfileBtn');
        const changeCodeBtnProfile = document.getElementById('changeCodeBtnProfile');
        const clearCacheBtnProfile = document.getElementById('clearCacheBtnProfile');
        const logoutBtn = document.getElementById('logoutBtn');
        const privacyGroups = document.getElementById('privacyGroups');
        const privacyCalls = document.getElementById('privacyCalls');
        const privacyOnline = document.getElementById('privacyOnline');
        const privacyAvatar = document.getElementById('privacyAvatar');
        const privacyGifts = document.getElementById('privacyGifts');
        const privacyMessages = document.getElementById('privacyMessages');

        function openProfile() {
            profileModal.classList.add('active');
            db.ref('users/' + myCode).once('value').then(snap => {
                const data = snap.val() || {};
                profileUsername.value = data.username || '';
                profileBio.value = data.bio || '';
                profileCode.textContent = myCode;
                if (data.avatar) {
                    profileAvatar.src = data.avatar;
                } else {
                    profileAvatar.src = '';
                }
                const privacy = data.privacy || { groups: true, calls: false, online: false, avatar: false, gifts: false, messages: true };
                privacyGroups.checked = privacy.groups !== false;
                privacyCalls.checked = privacy.calls === true;
                privacyOnline.checked = privacy.online === true;
                privacyAvatar.checked = privacy.avatar === true;
                privacyGifts.checked = privacy.gifts === true;
                privacyMessages.checked = privacy.messages !== false;
                document.getElementById('profileDate').textContent = data.createdAt ? new Date(data.createdAt).toLocaleDateString() : '----';
                document.getElementById('profileStars').textContent = data.stars || 0;
                renderGifts(data.gifts || []);
            });
        }

        profileBtn.addEventListener('click', openProfile);
        closeProfileBtn.addEventListener('click', function() {
            profileModal.classList.remove('active');
        });
        profileModal.addEventListener('click', function(e) {
            if (e.target === profileModal) {
                profileModal.classList.remove('active');
            }
        });

        avatarContainer.addEventListener('click', function() {
            avatarInput.click();
        });
        avatarInput.addEventListener('change', async function(e) {
            const file = this.files[0];
            if (!file) return;
            loader.style.display = 'block';
            try {
                const path = 'avatars/' + myCode + '/' + file.name;
                const ref = storage.ref(path);
                await ref.put(file);
                const url = await ref.getDownloadURL();
                await db.ref('users/' + myCode + '/avatar').set(url);
                profileAvatar.src = url;
                const btn = document.getElementById('profileBtn');
                btn.innerHTML = `<img src="${url}" alt="avatar" />`;
                alert('✅ Аватар обновлён!');
            } catch (err) {
                alert('Ошибка загрузки аватарки!');
            }
            loader.style.display = 'none';
            this.value = '';
        });

        saveProfileBtn.addEventListener('click', function() {
            const username = profileUsername.value.trim();
            const bio = profileBio.value.trim();
            if (!username) return alert('Введи username!');
            if (username.length < 3) return alert('Username минимум 3 символа!');
            const privacy = {
                groups: privacyGroups.checked,
                calls: privacyCalls.checked,
                online: privacyOnline.checked,
                avatar: privacyAvatar.checked,
                gifts: privacyGifts.checked,
                messages: privacyMessages.checked
            };
            db.ref('users').orderByChild('username').equalTo(username).once('value').then(snap => {
                let isTaken = false;
                snap.forEach(child => {
                    if (child.key !== myCode) isTaken = true;
                });
                if (isTaken) {
                    alert('❌ Username уже занят!');
                    return;
                }
                db.ref('users/' + myCode).update({
                    username: username,
                    bio: bio,
                    privacy: privacy
                }).then(() => {
                    alert('✅ Профиль сохранён!');
                    loadUserData();
                });
            });
        });

        changeCodeBtnProfile.addEventListener('click', function() {
            profileModal.classList.remove('active');
            const newCode = prompt('Введи новый код (минимум 3 символа):');
            if (!newCode || newCode.length < 3) return alert('Код должен быть минимум 3 символа!');
            if (newCode === myCode) return alert('Это твой текущий код!');
            loader.style.display = 'block';
            db.ref('users/' + newCode).once('value').then(snap => {
                if (snap.exists()) {
                    loader.style.display = 'none';
                    alert('❌ Этот код уже занят!');
                    return;
                }
                db.ref('users/' + myCode).once('value').then(snap => {
                    const userData = snap.val() || {};
                    userData.code = newCode;
                    db.ref('users/' + newCode).set(userData).then(() => {
                        db.ref('users/' + myCode).remove().then(() => {
                            myCode = newCode;
                            saveMyCode(newCode);
                            loader.style.display = 'none';
                            document.getElementById('myCodeDisplay').innerHTML = 'Код: ' + myCode;
                            alert('✅ Код успешно изменён на: ' + newCode);
                        });
                    });
                });
            }).catch(err => {
                loader.style.display = 'none';
                alert('Ошибка! Проверь интернет.');
            });
        });

        clearCacheBtnProfile.addEventListener('click', function() {
            if (confirm('🗑️ Очистить кеш? Это удалит временные файлы, но не сообщения.')) {
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        for (let name of names) {
                            caches.delete(name);
                        }
                    });
                }
                const savedCode = localStorage.getItem('myCode');
                localStorage.clear();
                if (savedCode) localStorage.setItem('myCode', savedCode);
                alert('✅ Кеш очищен! Перезагрузи приложение.');
                location.reload();
            }
        });

        logoutBtn.addEventListener('click', function() {
            if (confirm('Точно выйти? Данные сохранятся.')) {
                localStorage.removeItem('myCode');
                window.location.reload();
            }
        });

        // =========================================================
        // 33. ДОБАВЛЯЕМ КНОПКУ ПОДАРКА В КОНТАКТЫ
        // =========================================================
        document.addEventListener('click', function(e) {
            const target = e.target.closest('.send-gift-btn');
            if (target) {
                const code = target.dataset.code;
                if (code) sendGift(code);
            }
        });

        // =========================================================
        // 34. ИНИЦИАЛИЗАЦИЯ
        // =========================================================
        console.log('🔥 GURU запущен! Код: ' + myCode);
    </script>
</body>
</html>
